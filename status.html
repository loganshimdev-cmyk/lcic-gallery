<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive">
<title>내 준비 현황 · LCIC</title>
<link rel="icon" type="image/png" href="assets/brand/lcic-logo.png">
<script src="assets/background.js?v=8"></script>
<link rel="stylesheet" href="assets/shared.css?v=13">
<script src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
<style>
  /* ── 로그인 게이트 (summer-2026.html 패턴 재사용) ── */
  .gate-wrap {
    min-height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    padding: 120px 20px 60px;
  }
  .gate-card { max-width: 440px; width: 100%; }
  .gate-card .bezel-inner { padding: 36px 32px; }
  .gate-icon {
    width: 64px; height: 64px; border-radius: 999px;
    background: var(--accent-soft); color: var(--accent-deep);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; margin: 0 auto 20px;
  }
  .gate-title {
    text-align: center; font-size: 1.35rem; font-weight: 600;
    letter-spacing: -0.01em; margin-bottom: 8px;
  }
  .gate-sub {
    text-align: center; color: var(--text-dim);
    font-size: 0.92rem; line-height: 1.55; margin-bottom: 24px;
  }
  .gate-form { display: flex; flex-direction: column; gap: 12px; }
  .gate-field { display: flex; flex-direction: column; gap: 6px; text-align: left; }
  .gate-label { font-size: 0.82rem; font-weight: 600; color: var(--text-dim); padding-left: 2px; }
  .gate-input {
    width: 100%; padding: 13px 15px;
    border: 1px solid var(--hairline-strong);
    border-radius: 13px; background: var(--bg-elev);
    font-family: inherit; font-size: 1rem; color: var(--text);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .gate-input:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-soft);
  }
  .gate-btn {
    width: 100%; padding: 14px 16px; margin-top: 4px;
    border: none; border-radius: 14px;
    background: var(--accent); color: white;
    font-family: inherit; font-size: 1rem; font-weight: 600;
    cursor: pointer; transition: background 0.15s, transform 0.05s;
    box-shadow: var(--shadow-accent);
  }
  .gate-btn:hover { background: var(--accent-hover); }
  .gate-btn:active { transform: translateY(1px); }
  .gate-btn[disabled] { opacity: 0.55; cursor: not-allowed; transform: none; }
  .gate-err { color: #dc2626; font-size: 0.86rem; text-align: center; min-height: 20px; line-height: 1.5; }
  .gate-privacy {
    text-align: center; font-size: 0.8rem; color: var(--text-faint);
    margin-top: 8px; display: flex; align-items: center; justify-content: center; gap: 5px;
  }

  /* ── 대시보드 ── */
  .dash { display: none; }
  .dash-head { text-align: center; margin-bottom: 26px; }
  .dash-greet { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
  .dash-greet .nm { color: var(--accent-deep); }
  .dash-sub { color: var(--text-dim); font-size: 0.95rem; margin-top: 6px; }

  .card {
    background: var(--bg-elev); border: 1px solid var(--hairline);
    border-radius: 20px; box-shadow: var(--shadow-sm);
    padding: 22px 24px; margin-bottom: 16px;
  }
  .card-title {
    font-size: 0.82rem; font-weight: 700; letter-spacing: 0.02em;
    color: var(--text-dim); text-transform: uppercase; margin-bottom: 14px;
    display: flex; align-items: center; gap: 7px;
  }

  /* 완료율 진행바 */
  .prog-top { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 12px; }
  .prog-msg { font-size: 1.05rem; font-weight: 700; letter-spacing: -0.01em; }
  .prog-count { font-size: 0.95rem; font-weight: 700; color: var(--accent-deep); font-variant-numeric: tabular-nums; }
  .prog-bar { height: 12px; border-radius: 999px; background: var(--accent-soft); overflow: hidden; }
  .prog-fill { height: 100%; border-radius: 999px; background: var(--accent); transition: width 0.5s ease; }
  .prog-fill.done { background: #16a34a; }

  /* 체크리스트 */
  .check-item {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 0; border-top: 1px solid var(--hairline);
  }
  .check-item:first-child { border-top: none; }
  .check-mark {
    width: 34px; height: 34px; border-radius: 999px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.05rem; font-weight: 700;
  }
  .check-mark.ok { background: rgba(22,163,74,0.12); color: #16a34a; }
  .check-mark.miss { background: rgba(220,38,38,0.10); color: #dc2626; }
  .check-body { flex: 1; min-width: 0; }
  .check-name { font-size: 1.02rem; font-weight: 600; letter-spacing: -0.01em; }
  .check-desc { font-size: 0.84rem; color: var(--text-faint); margin-top: 2px; }
  .check-pill {
    font-size: 0.8rem; font-weight: 700; padding: 5px 12px; border-radius: 999px; white-space: nowrap;
  }
  .check-pill.ok { background: rgba(22,163,74,0.12); color: #15803d; }
  .check-pill.miss { background: rgba(220,38,38,0.10); color: #b91c1c; }

  /* 항공편 */
  .flight-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .flight-cell {
    background: var(--surface); border: 1px solid var(--hairline);
    border-radius: 14px; padding: 13px 15px;
  }
  .flight-cell .fl-label { font-size: 0.76rem; font-weight: 600; color: var(--text-faint); }
  .flight-cell .fl-val { font-size: 1.12rem; font-weight: 700; letter-spacing: -0.01em; margin-top: 3px; font-variant-numeric: tabular-nums; }
  .flight-note {
    margin-top: 14px; font-size: 0.9rem; color: var(--text-dim);
    display: flex; align-items: center; gap: 7px;
  }
  .flight-empty { color: var(--text-dim); font-size: 0.95rem; line-height: 1.6; }
  .flight-warn { margin-top: 14px; padding: 12px 14px; border-radius: 12px;
    background: rgba(220,38,38,0.06); border: 1px solid rgba(220,38,38,0.28);
    color: #b91c1c; font-size: 0.88rem; line-height: 1.65; display: flex; gap: 9px; align-items: flex-start; }
  .flight-warn iconify-icon { font-size: 19px; flex-shrink: 0; margin-top: 1px; color: #dc2626; }
  .flight-warn b { color: #991b1b; font-weight: 800; }
  .flight-leg { margin-bottom: 14px; padding: 14px; border: 1px solid var(--hairline); border-radius: 14px; background: var(--surface); }
  .flight-leg .leg-tag { display: inline-flex; align-items: center; gap: 6px; font-size: 0.8rem; font-weight: 800;
    padding: 4px 11px; border-radius: 999px; margin-bottom: 11px; }
  .flight-leg .leg-tag.go { background: var(--accent-soft); color: var(--accent-deep); }
  .flight-leg .leg-tag.back { background: rgba(22,163,74,0.12); color: #15803d; }
  .stay-line { margin-top: 14px; font-size: 0.9rem; color: var(--text-dim); }
  .stay-line b { color: var(--text); font-weight: 700; }
  @media (max-width: 520px) { .flight-grid { grid-template-columns: 1fr; } }

  /* 다음 단계 */
  .step-item { display: flex; gap: 11px; padding: 11px 0; border-top: 1px solid var(--hairline); font-size: 0.95rem; line-height: 1.55; }
  .step-item:first-child { border-top: none; }
  .step-item .sx { color: #dc2626; flex-shrink: 0; font-weight: 700; }
  .all-done {
    text-align: center; padding: 8px 0; color: #15803d; font-weight: 700; font-size: 1.02rem;
  }
  .link-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
  .link-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 16px; border-radius: 12px; font-size: 0.9rem; font-weight: 600;
    text-decoration: none; border: 1px solid var(--hairline-strong);
    color: var(--text); background: var(--bg-elev); cursor: pointer;
    font-family: inherit;
  }
  .link-btn:hover { border-color: var(--accent); color: var(--accent-deep); }
  .link-btn.primary { background: var(--accent); color: #fff; border-color: transparent; box-shadow: var(--shadow-accent); }
  .link-btn.primary:hover { background: var(--accent-hover); color: #fff; }

  /* 수강신청 */
  .course-ask { font-size: 0.96rem; line-height: 1.6; color: var(--text); }
  .course-done { display: flex; align-items: center; gap: 9px; padding: 12px 14px; border-radius: 12px;
    background: var(--accent-soft); color: #15803d; font-weight: 700; font-size: 1rem; }
  .course-done iconify-icon { font-size: 22px; }
  .course-undo { margin-top: 10px; }
  .course-undo button { background: none; border: none; color: var(--text-faint); font-size: 0.82rem;
    text-decoration: underline; cursor: pointer; font-family: inherit; padding: 0; }

  /* 신고 박스 */
  .report-box { display: none; margin-top: 14px; padding: 14px; background: var(--surface); border: 1px solid var(--hairline); border-radius: 14px; }
  .report-box.show { display: block; }
  .report-msg {
    width: 100%; min-height: 76px; resize: vertical; border: 1px solid var(--hairline-strong);
    border-radius: 10px; padding: 10px 12px; font-family: inherit; font-size: 0.9rem; color: var(--text);
    background: var(--bg-elev); line-height: 1.5;
  }
  .report-hint { font-size: 0.82rem; color: var(--text-faint); margin: 8px 0; }
  .file-pick {
    display: inline-flex; align-items: center; gap: 7px; margin-top: 10px;
    padding: 10px 14px; border: 1px dashed var(--hairline-strong); border-radius: 12px;
    font-size: 0.88rem; font-weight: 600; color: var(--text-dim); cursor: pointer;
    background: var(--bg-elev); transition: border-color .15s, color .15s; max-width: 100%;
  }
  .file-pick:hover { border-color: var(--accent); color: var(--accent-deep); }
  .file-pick.has-file { border-style: solid; border-color: var(--accent); color: var(--accent-deep); background: var(--accent-soft); }
  .file-pick span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .dash-foot { text-align: center; margin: 22px 0 60px; color: var(--text-faint); font-size: 0.82rem; }
  .logout-btn {
    background: none; border: none; color: var(--text-dim); font-family: inherit;
    font-size: 0.88rem; cursor: pointer; text-decoration: underline; padding: 4px;
  }
  .logout-btn:hover { color: var(--accent-deep); }
</style>
</head>
<body>

<!-- ── 로그인 ── -->
<section id="login" class="gate-wrap">
  <div class="bezel gate-card fade-up">
    <div class="bezel-inner">
      <div class="gate-icon"><iconify-icon icon="solar:user-check-rounded-bold-duotone"></iconify-icon></div>
      <div class="gate-title">내 연수 준비 현황 확인</div>
      <div class="gate-sub">2026 여름 필리핀 연수 신청 정보를 본인만 확인할 수 있습니다.<br>아래 정보로 로그인해 주세요.</div>
      <form id="login-form" class="gate-form" autocomplete="off">
        <div class="gate-field">
          <label class="gate-label" for="in-email">이메일 (신청 시 입력한 이메일)</label>
          <input id="in-email" class="gate-input" type="email" inputmode="email"
            placeholder="example@email.com" autocomplete="email" required>
        </div>
        <div class="gate-field">
          <label class="gate-label" for="in-birth">생년월일</label>
          <input id="in-birth" class="gate-input" type="date" required>
        </div>
        <div class="gate-field">
          <label class="gate-label" for="in-phone">휴대폰 번호 끝 4자리</label>
          <input id="in-phone" class="gate-input" type="tel" inputmode="numeric" maxlength="4"
            placeholder="예: 1451" autocomplete="off" required>
        </div>
        <button id="login-btn" class="gate-btn" type="submit"><span id="login-btn-label">확인</span></button>
        <div id="login-err" class="gate-err" role="alert"></div>
        <div class="gate-privacy">
          <iconify-icon icon="solar:lock-keyhole-minimalistic-bold"></iconify-icon>
          본인 정보만 표시되며 다른 학생은 볼 수 없습니다.
        </div>
      </form>
    </div>
  </div>
</section>

<!-- ── 대시보드 ── -->
<main id="dash" class="dash container-narrow" style="padding: 110px 14px 0;">
  <div class="dash-head fade-up">
    <div class="dash-greet"><span class="nm" id="d-name"></span>님, 안녕하세요 👋</div>
    <div class="dash-sub">연수 준비 현황입니다. 빠진 항목이 있으면 출국 전에 채워 주세요.</div>
  </div>

  <!-- 완료율 -->
  <section class="card fade-up">
    <div class="prog-top">
      <div class="prog-msg" id="d-prog-msg"></div>
      <div class="prog-count" id="d-prog-count"></div>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="d-prog-fill" style="width:0%"></div></div>
  </section>

  <!-- 체크리스트 -->
  <section class="card fade-up">
    <div class="card-title"><iconify-icon icon="solar:clipboard-check-bold-duotone"></iconify-icon> 제출 현황</div>
    <div id="d-checklist"></div>
  </section>

  <!-- 항공편 -->
  <section class="card fade-up">
    <div class="card-title"><iconify-icon icon="solar:plane-bold-duotone"></iconify-icon> 항공편 정보 확인</div>
    <div id="d-flight"></div>
    <div id="d-report-wrap"></div>
  </section>

  <!-- 다음 단계 -->
  <section class="card fade-up">
    <div class="card-title"><iconify-icon icon="solar:list-check-bold-duotone"></iconify-icon> 다음 단계</div>
    <div id="d-steps"></div>
  </section>

  <!-- 수강신청 (마지막 단계) -->
  <section class="card fade-up">
    <div class="card-title"><iconify-icon icon="solar:notebook-bookmark-bold-duotone"></iconify-icon> 수강신청</div>
    <div id="d-course"></div>
  </section>

  <div class="dash-foot">
    <div>기준일: <span id="d-updated"></span></div>
    <div style="margin-top:8px;"><button class="logout-btn" id="logout-btn">로그아웃</button></div>
  </div>
</main>

  // ── crypto helpers (summer-2026.html과 동일) ──
  function b64ToBytes(b64) {
    const bin = atob(b64); const arr = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
    return arr;
  }
  async function decrypt(blobB64, password) {
    const raw = b64ToBytes(blobB64);
    const salt = raw.slice(0, 16), iv = raw.slice(16, 28), tag = raw.slice(28, 44), ct = raw.slice(44);
    const ctWithTag = new Uint8Array(ct.length + tag.length);
    ctWithTag.set(ct); ctWithTag.set(tag, ct.length);
    const pwKey = await crypto.subtle.importKey("raw", new TextEncoder().encode(password), "PBKDF2", false, ["deriveKey"]);
    const key = await crypto.subtle.deriveKey(
      { name: "PBKDF2", salt, iterations: PBKDF2_ITER, hash: "SHA-256" },
      pwKey, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);
    const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ctWithTag);
    return JSON.parse(new TextDecoder().decode(plain));
  }
  async function sha256hex(str) {
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
    return [...new Uint8Array(buf)].map((b) => b.toString(16).padStart(2, "0")).join("");
  }

  // ── normalizers (encrypt-status.cjs와 반드시 일치) ──
  const normEmail = (e) => String(e || "").trim().toLowerCase();
  const birth8 = (d) => String(d || "").replace(/-/g, "");           // date input "YYYY-MM-DD" → "YYYYMMDD"
  const phone4 = (p) => String(p || "").replace(/\D/g, "").slice(-4);

  function escapeHtml(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, (c) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }

  const ITEM_META = {
    passport:  { label: "여권 정보",   desc: "여권번호 · 만료일",        fix: "신청서에 여권번호를 입력해 주세요." },
    flight:    { label: "항공편 정보", desc: "편명 · 출발일/도착일",     fix: "왕복 항공권(편명·날짜)을 입력해 주세요." },
    leveltest: { label: "레벨테스트",  desc: "반 배정용 레벨 점수",      fix: "레벨테스트 자료를 제출해 주세요." },
    emergency: { label: "비상연락처",  desc: "보호자 연락처",            fix: "비상연락처(이름·전화)를 입력해 주세요." },

    const cl = rec.checklist || {};

    // 진행바

        legGo + legBack +
        stay +
        `<div class="flight-note"><iconify-icon icon="solar:check-read-bold"></iconify-icon> 위 <b>가는 편·오는 편</b> 항공권 정보(편명·날짜·시간)가 실제 e-ticket과 맞는지 꼭 확인해 주세요. 다르면 아래로 알려주세요.</div>` +
        `<div class="flight-warn"><iconify-icon icon="solar:danger-triangle-bold"></iconify-icon><span>항공편 정보가 <b>비어 있거나 실제와 다르면</b> 공항 <b>픽업·드랍 서비스를 받으실 수 없으며</b>, 픽업·드랍이 <b>필요 없는 것으로 간주</b>됩니다. 위 정보가 맞는지 <b>꼭 확인</b>해 주세요.</span></div>`;
      $("d-report-wrap").innerHTML =
        `<div class="link-row"><button class="link-btn" id="report-toggle">
          <iconify-icon icon="solar:danger-triangle-bold"></iconify-icon> 정보가 틀려요</button></div>
        <div class="report-box" id="report-box">
          <div class="report-hint">올바른 정보를 적거나, 실제 항공권(e-ticket) 사진·PDF를 첨부해 주세요. 담당자에게 바로 접수됩니다.</div>
          <textarea class="report-msg" id="report-msg" placeholder="예: 편명 KE123 / 출발 2026-07-06 / 도착 2026-07-06"></textarea>
          <div><label class="file-pick" id="report-file-label">
            <iconify-icon icon="solar:paperclip-2-bold"></iconify-icon>
            <span id="report-file-name">사진·PDF 첨부 (선택, 최대 5장)</span>
            <input type="file" id="report-file" accept="image/*,application/pdf" multiple hidden>
          </label></div>
          <div class="link-row"><button class="link-btn primary" id="report-send">
            <iconify-icon icon="solar:plain-2-bold"></iconify-icon> 보내기</button></div>
          <div class="report-hint" id="report-status" style="min-height:18px;"></div>
        </div>`;
      wireReport(rec);
    } else {
      flightEl.innerHTML =
        `<div class="flight-empty">아직 등록된 항공권 정보가 없습니다.<br>왕복 항공권(가는 편 · 오는 편 · 날짜 · 시간)을 신청서에 입력해 주세요.</div>` +
        `<div class="flight-warn"><iconify-icon icon="solar:danger-triangle-bold"></iconify-icon><span>항공편을 <b>입력하지 않으시면</b> 공항 <b>픽업·드랍이 불가</b>하며, 픽업·드랍이 <b>필요 없는 것으로 간주</b>됩니다. 픽업·드랍이 필요하시면 반드시 정확한 항공편 정보를 입력해 주세요.</span></div>`;
      $("d-report-wrap").innerHTML = "";
    }

    // 다음 단계
    const missing = (rec.missingItems && rec.missingItems.length)
      ? ORDER.filter((k) => !cl[k]) : [];
    $("d-steps").innerHTML = missing.length
      ? missing.map((k) => `<div class="step-item"><span class="sx">✗</span><span>${escapeHtml(ITEM_META[k].fix)}</span></div>`).join("")
      : `<div class="all-done">✓ 제출해야 할 항목을 모두 완료했습니다.</div>`;

    // 수강신청 (마지막 단계) — 본인 보고, 결과는 관리자 집계
    renderCourse(rec);

    $("login").style.display = "none";
    $("dash").style.display = "block";
    window.scrollTo(0, 0);
  }

  const MAX_FILE = 10 * 1024 * 1024;   // 10MB
  const MAX_COUNT = 5;
  const FILE_DEFAULT = "사진·PDF 첨부 (선택, 최대 5장)";

  function wireReport(rec) {
    const toggle = $("report-toggle"), box = $("report-box"), send = $("report-send"),
      msg = $("report-msg"), statusEl = $("report-status"),
      fileInput = $("report-file"), fileLabel = $("report-file-label"), fileName = $("report-file-name");
    const f = rec.flight || {};
    const onFile = `편명 ${f.flightNo || "-"} / 출발 ${f.departure || "-"} / 도착 ${f.arrival || "-"}`;
    const setStatus = (color, text) => { statusEl.style.color = color; statusEl.textContent = text; };
    const resetFiles = () => { fileInput.value = ""; fileLabel.classList.remove("has-file"); fileName.textContent = FILE_DEFAULT; };

    toggle.addEventListener("click", () => box.classList.toggle("show"));
    fileInput.addEventListener("change", () => {
      const files = [...fileInput.files];
      if (!files.length) { resetFiles(); return; }
      if (files.length > MAX_COUNT) { setStatus("#dc2626", `최대 ${MAX_COUNT}장까지 첨부할 수 있습니다.`); resetFiles(); return; }
      const big = files.find((x) => x.size > MAX_FILE);
      if (big) { setStatus("#dc2626", `"${big.name}"이(가) 너무 큽니다 (최대 10MB).`); resetFiles(); return; }
      fileLabel.classList.add("has-file");
      fileName.textContent = files.length === 1 ? files[0].name : `${files.length}장 선택됨`;
      setStatus("", "");
    });

    send.addEventListener("click", async () => {
      const correction = msg.value.trim();
      const files = [...fileInput.files];
      if (!correction && !files.length) { setStatus("#dc2626", "올바른 정보를 적거나 파일을 첨부해 주세요."); return; }
      if (!window.lcicSubmitReport) { setStatus("#dc2626", "잠시 후 다시 시도해 주세요."); return; }
      const restore = () => { send.disabled = false; send.innerHTML = '<iconify-icon icon="solar:plain-2-bold"></iconify-icon> 보내기'; };
      send.disabled = true; send.innerHTML = '<iconify-icon icon="svg-spinners:ring-resize" inline></iconify-icon> 보내는 중…';
      setStatus("", "");

      const paths = [];
      for (let i = 0; i < files.length; i++) {
        send.innerHTML = `<iconify-icon icon="svg-spinners:ring-resize" inline></iconify-icon> 첨부 올리는 중 (${i + 1}/${files.length})…`;
        const up = await window.lcicUploadReportFile(files[i]);
        if (up.error) { restore(); setStatus("#dc2626", "파일 업로드 실패: " + up.error); return; }
        paths.push(up.path);
      }

      const err = await window.lcicSubmitReport({
        student_name: rec.name || "", student_email: CUR_EMAIL || "",
        category: "flight", on_file: onFile, correction, file_paths: paths.length ? paths : null,
      });
      if (err) { restore(); setStatus("#dc2626", "전송 실패: " + err + " 잠시 후 다시 시도해 주세요."); return; }
      setStatus("#15803d", "✓ 접수되었습니다. 확인 후 정정해 드릴게요.");
      msg.value = ""; resetFiles();
      send.disabled = true; send.innerHTML = '<iconify-icon icon="solar:check-circle-bold"></iconify-icon> 접수됨';
    });
  }

  // ── 수강신청 자기보고 (결과는 Supabase에 저장 → 관리자 집계) ──
  function courseKey() { return "lcic.coursereg." + (CUR_EMAIL || ""); }
  function renderCourse(rec) {
    const el = $("d-course");
    let done = false;
    try { done = localStorage.getItem(courseKey()) === "1"; } catch (_) {}
    if (done) {
      el.innerHTML =
        `<div class="course-done"><iconify-icon icon="solar:check-circle-bold"></iconify-icon> 수강신청을 완료로 보고했습니다.</div>
         <div class="course-undo"><button id="course-undo-btn">아직 안 했어요 (취소)</button></div>`;
      $("course-undo-btn").addEventListener("click", () => {
        try { localStorage.removeItem(courseKey()); } catch (_) {}
        renderCourse(rec);
      });
      return;
    }
    el.innerHTML =
      `<div class="course-ask">MyCamu에서 <b>수강신청</b>을 완료하셨나요?</div>
       <div class="link-row">
         <button class="link-btn primary" id="course-done-btn"><iconify-icon icon="solar:check-circle-bold"></iconify-icon> 네, 완료했어요</button>
         <a class="link-btn" href="assets/manual/MyCamu-User-Guide-Korean.pdf" target="_blank" rel="noopener"><iconify-icon icon="solar:document-text-bold"></iconify-icon> 수강신청 방법 (MyCamu 안내)</a>
       </div>
       <div class="report-hint">아직이라면 위 <b>MyCamu 안내(PDF)</b>를 보고 수강신청을 먼저 완료해 주세요.</div>
       <div class="report-hint" id="course-status" style="min-height:18px;"></div>`;
    const cbtn = $("course-done-btn"), cst = $("course-status");
    cbtn.addEventListener("click", async () => {
      if (!window.lcicSubmitCourseReg) { cst.style.color = "#dc2626"; cst.textContent = "잠시 후 다시 시도해 주세요."; return; }
      cbtn.disabled = true; cbtn.innerHTML = '<iconify-icon icon="svg-spinners:ring-resize" inline></iconify-icon> 보내는 중…';
      const err = await window.lcicSubmitCourseReg({ student_name: rec.name || "", student_email: CUR_EMAIL || "" });
      if (err) {
        cbtn.disabled = false; cbtn.innerHTML = '<iconify-icon icon="solar:check-circle-bold"></iconify-icon> 네, 완료했어요';
        cst.style.color = "#dc2626"; cst.textContent = "전송 실패: " + err + " 잠시 후 다시 시도해 주세요."; return;
      }
      try { localStorage.setItem(courseKey(), "1"); } catch (_) {}
      renderCourse(rec);
    });
  }

  // ── 로그인 ──
  const errEl = $("login-err"), btn = $("login-btn"), btnLabel = $("login-btn-label");
  function showErr() {
    errEl.textContent = "정보가 일치하지 않습니다. 이메일·생년월일·휴대폰 끝 4자리를 확인해 주세요.";
  }
  async function tryLogin(email, birthVal, phoneVal, silent) {
    const id = (await sha256hex(normEmail(email) + STATUS_PEPPER)).slice(0, 32);
    const entry = STATUS_BLOBS.find((e) => e.k === id);
    const cred = normEmail(email) + "|" + birth8(birthVal) + "|" + phone4(phoneVal);
    if (!entry) throw new Error("nomatch");
    const rec = await decrypt(entry.b, cred);   // 비번 틀리면 GCM 태그 실패 → throw
    CUR_EMAIL = normEmail(email);
    try { sessionStorage.setItem(SS_KEY, JSON.stringify({ e: email, b: birthVal, p: phoneVal })); } catch (_) {}
    render(rec);
  }

  $("login-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    errEl.textContent = "";
    const email = $("in-email").value, birth = $("in-birth").value, phone = $("in-phone").value;
    if (!email || !birth || !phone) { showErr(); return; }
    btn.disabled = true; btnLabel.textContent = "확인 중…";
    try { await tryLogin(email, birth, phone, false); }
    catch (_) { showErr(); }
    finally { btn.disabled = false; btnLabel.textContent = "확인"; }
  });

  $("logout-btn").addEventListener("click", () => {
    try { sessionStorage.removeItem(SS_KEY); } catch (_) {}
    location.reload();
  });

  // 새로고침 시 자동 복원
  (async function () {
    let s = null;
    try { s = JSON.parse(sessionStorage.getItem(SS_KEY) || "null"); } catch (_) {}
    if (s && s.e) { try { await tryLogin(s.e, s.b, s.p, true); return; } catch (_) {} }
    setTimeout(() => { const el = $("in-email"); if (el) el.focus(); }, 60);
  })();
})();
</script>

<!-- 신고 전송 브리지: Supabase status_reports INSERT + 비공개 버킷 업로드 -->
<script type="module">
import { supabase } from "./assets/supabase.js";
const BUCKET = "status-reports";
window.lcicSubmitReport = async (payload) => {
  try {
    const { error } = await supabase.from("status_reports").insert(payload);
    return error ? (error.message || "오류") : null;
  } catch (e) {
    return e && e.message ? e.message : "네트워크 오류";
  }
};
window.lcicUploadReportFile = async (file) => {
  try {
    const ext = (file.name.split(".").pop() || "dat").toLowerCase().replace(/[^a-z0-9]/g, "").slice(0, 8) || "dat";
    const id = (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random().toString(16).slice(2));
    const path = `reports/${id}.${ext}`;
    const { data, error } = await supabase.storage.from(BUCKET).upload(path, file, {
      contentType: file.type || "application/octet-stream", upsert: false,
    });
    return error ? { error: error.message || "오류" } : { path: data.path };
  } catch (e) {
    return { error: e && e.message ? e.message : "네트워크 오류" };
  }
};
// 수강신청 완료 자기보고 → course_registrations INSERT (관리자만 집계 조회)
window.lcicSubmitCourseReg = async (payload) => {
  try {
    const { error } = await supabase.from("course_registrations").insert({ ...payload, completed: true });
    return error ? (error.message || "오류") : null;
  } catch (e) {
    return e && e.message ? e.message : "네트워크 오류";
  }
};
</script>
