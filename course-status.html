<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive">
<title>수강신청 현황 · LCIC</title>
<link rel="icon" type="image/png" href="assets/brand/lcic-logo.png">
<script src="assets/background.js?v=8"></script>
<link rel="stylesheet" href="assets/shared.css?v=13">
<script src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
<style>
  .login-card {
    max-width: 420px; margin: 120px auto 0; padding: 40px 36px;
    background: var(--bg-elev); border: 1px solid var(--hairline);
    border-radius: 28px; box-shadow: var(--shadow-lg);
  }
  .login-card h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; }
  .login-card p { color: var(--text-dim); font-size: 0.88rem; margin-bottom: 24px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 0.78rem; color: var(--text-dim); margin-bottom: 7px; }

  .admin-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
  .admin-head h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.02em; }
  .admin-head .meta { color: var(--text-dim); font-size: 0.85rem; margin-top: 4px; }
  .toolbar { display: flex; gap: 8px; align-items: center; }

  .stat-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
  .stat-card { flex: 1; min-width: 150px; background: var(--bg-elev); border: 1px solid var(--hairline);
    border-radius: 16px; padding: 18px 20px; box-shadow: var(--shadow-sm); }
  .stat-card .n { font-size: 2rem; font-weight: 800; letter-spacing: -0.02em; color: var(--accent-deep); }
  .stat-card .l { font-size: 0.82rem; color: var(--text-dim); margin-top: 2px; }

  .table-wrap { background: var(--bg-elev); border: 1px solid var(--hairline); border-radius: 18px; overflow: auto; box-shadow: var(--shadow-sm); }
  table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
  th, td { padding: 12px 14px; text-align: left; border-bottom: 1px solid var(--hairline); vertical-align: middle; }
  th { font-size: 0.74rem; letter-spacing: 0.04em; color: var(--text-faint); text-transform: uppercase; position: sticky; top: 0; background: var(--bg-elev); white-space: nowrap; }
  tbody tr:hover { background: var(--accent-tint); }
  td.muted { color: var(--text-faint); white-space: nowrap; }
  td.nm { font-weight: 600; white-space: nowrap; }
  .ok-pill { display: inline-block; font-size: 0.74rem; font-weight: 700; padding: 3px 10px; border-radius: 999px; background: rgba(22,163,74,0.12); color: #15803d; }
  .del-btn { background: none; border: none; color: var(--text-faint); cursor: pointer; font-size: 18px; padding: 4px; border-radius: 8px; }
  .del-btn:hover { color: #dc2626; background: rgba(220,38,38,0.1); }
  .user-chip { display: inline-flex; align-items: center; gap: 6px; font-size: 0.82rem; color: var(--text-dim); }
  a.mail { color: var(--accent-deep); text-decoration: none; }
  a.mail:hover { text-decoration: underline; }
  .search-row { margin-bottom: 14px; }
  .search-row input { max-width: 320px; }
</style>
</head>
<body>

<main class="container-app" style="padding: 40px 20px 120px;">
  <!-- 로그인 -->
  <div id="login-view">
    <div class="login-card">
      <h2>관리자 로그인</h2>
      <p>수강신청 완료 현황은 관리자만 열람할 수 있습니다.</p>
      <form id="login-form">
        <div class="field">
          <label>이메일</label>
          <input class="input" type="email" id="email" required autocomplete="username">
        </div>
        <div class="field">
          <label>비밀번호</label>
          <input class="input" type="password" id="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-primary" id="login-btn" style="width:100%; margin-top:6px;">
          <iconify-icon icon="solar:login-3-bold-duotone" inline></iconify-icon> 로그인
        </button>
      </form>
    </div>
  </div>

  <!-- 관리 화면 -->
  <div id="admin-view" class="hidden">
    <div class="admin-head">
      <div>
        <h1>수강신청 완료 현황</h1>
        <div class="meta" id="count-meta">불러오는 중…</div>
      </div>
      <div class="toolbar">
        <span class="user-chip"><iconify-icon icon="solar:user-circle-bold-duotone"></iconify-icon> <span id="user-email"></span></span>
        <button class="btn-ghost" id="refresh-btn"><iconify-icon icon="solar:refresh-bold" inline></iconify-icon> 새로고침</button>
        <button class="btn-ghost" id="logout-btn"><iconify-icon icon="solar:logout-3-bold-duotone" inline></iconify-icon> 로그아웃</button>
      </div>
    </div>

    <div class="stat-row">
      <div class="stat-card"><div class="n" id="stat-students">–</div><div class="l">수강신청 완료 보고 학생</div></div>
      <div class="stat-card"><div class="n" id="stat-rows">–</div><div class="l">총 보고 건수</div></div>
    </div>

    <div class="search-row">
      <input class="input" type="search" id="search" placeholder="이름·이메일 검색">
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>최근 보고</th><th>학생</th><th>이메일</th><th>상태</th><th></th></tr>
        </thead>
        <tbody id="rows">
          <tr><td colspan="5" class="muted" style="text-align:center; padding:50px;">
            <iconify-icon icon="svg-spinners:ring-resize" inline style="font-size:22px;"></iconify-icon>
          </td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script type="module">
import { supabase } from "./assets/supabase.js";

const $ = (id) => document.getElementById(id);
const toast = $("toast");
function showToast(msg, type = "") { toast.textContent = msg; toast.className = `toast show ${type}`; setTimeout(() => toast.classList.remove("show"), 2800); }
const esc = (s) => (s == null ? "" : String(s)).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

let students = [];   // deduped-by-email, latest first

async function refreshAuthUI() {
  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    $("login-view").classList.add("hidden");
    $("admin-view").classList.remove("hidden");
    $("user-email").textContent = session.user.email;
    loadRows();
  } else {
    $("admin-view").classList.add("hidden");
    $("login-view").classList.remove("hidden");
  }
}

$("login-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = $("login-btn");
  btn.disabled = true; btn.innerHTML = '<iconify-icon icon="svg-spinners:ring-resize" inline></iconify-icon> 로그인 중…';
  const { error } = await supabase.auth.signInWithPassword({ email: $("email").value.trim(), password: $("password").value });
  btn.disabled = false; btn.innerHTML = '<iconify-icon icon="solar:login-3-bold-duotone" inline></iconify-icon> 로그인';
  if (error) { showToast(`로그인 실패: ${error.message}`, "error"); return; }
  $("password").value = "";
  refreshAuthUI();
});

$("logout-btn").addEventListener("click", async () => { await supabase.auth.signOut(); refreshAuthUI(); });
$("refresh-btn").addEventListener("click", loadRows);
$("search").addEventListener("input", renderRows);
supabase.auth.onAuthStateChange(() => refreshAuthUI());

function fmtTime(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  const p = (n) => String(n).padStart(2, "0");
  return `${d.getFullYear()}.${p(d.getMonth() + 1)}.${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}

async function loadRows() {
  $("rows").innerHTML = `<tr><td colspan="5" class="muted" style="text-align:center; padding:50px;"><iconify-icon icon="svg-spinners:ring-resize" inline style="font-size:22px;"></iconify-icon></td></tr>`;
  const { data, error } = await supabase
    .from("course_registrations")
    .select("*")
    .order("created_at", { ascending: false });
  if (error) { showToast(`불러오기 실패: ${error.message}`, "error"); return; }
  const rows = data || [];
  // 같은 이메일은 최신 1건만 (중복 보고 제거)
  const byEmail = new Map();
  for (const r of rows) {
    const key = (r.student_email || "").trim().toLowerCase();
    if (!byEmail.has(key)) byEmail.set(key, { ...r, _ids: [r.id] });
    else byEmail.get(key)._ids.push(r.id);
  }
  students = [...byEmail.values()];
  $("stat-students").textContent = students.length;
  $("stat-rows").textContent = rows.length;
  $("count-meta").textContent = `완료 보고 ${students.length}명 · 총 ${rows.length}건`;
  renderRows();
}

function renderRows() {
  const q = ($("search").value || "").trim().toLowerCase();
  const list = q
    ? students.filter((s) => (s.student_name || "").toLowerCase().includes(q) || (s.student_email || "").toLowerCase().includes(q))
    : students;
  if (!list.length) {
    $("rows").innerHTML = `<tr><td colspan="5" class="muted" style="text-align:center; padding:60px;">${students.length ? "검색 결과가 없습니다." : "아직 수강신청 완료 보고가 없습니다."}</td></tr>`;
    return;
  }
  $("rows").innerHTML = list.map((s) => {
    const mail = s.student_email ? `<a class="mail" href="mailto:${esc(s.student_email)}">${esc(s.student_email)}</a>` : "";
    return `<tr>
      <td class="muted">${esc(fmtTime(s.created_at))}</td>
      <td class="nm">${esc(s.student_name || "")}</td>
      <td>${mail}</td>
      <td><span class="ok-pill">✓ 완료</span></td>
      <td><button class="del-btn" title="이 학생 보고 삭제" data-emails="${esc((s._ids || []).join(","))}"><iconify-icon icon="solar:trash-bin-trash-bold-duotone"></iconify-icon></button></td>
    </tr>`;
  }).join("");

  document.querySelectorAll(".del-btn").forEach((btn) => {
    btn.addEventListener("click", async () => {
      if (!confirm("이 학생의 수강신청 보고를 삭제할까요?")) return;
      const ids = (btn.dataset.emails || "").split(",").filter(Boolean);
      const { error } = await supabase.from("course_registrations").delete().in("id", ids);
      if (error) { showToast(`삭제 실패: ${error.message}`, "error"); return; }
      showToast("삭제되었습니다.", "success");
      loadRows();
    });
  });
}

refreshAuthUI();
</script>
</body>
</html>
