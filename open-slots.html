<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex,nofollow" />
<title>Open Slots · LCIC</title>
<link rel="stylesheet" href="assets/shared.css" />
<style>
  body { font-family: Pretendard, system-ui, sans-serif; background:#f5f7fb; color:#1f2937; margin:0; }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 24px 16px 80px; }
  h1 { font-size: 1.5rem; margin: 8px 0 4px; }
  .sub { color:#6b7280; font-size:.85rem; margin-bottom:20px; }
  .gate { max-width:340px; margin:16vh auto; text-align:center; }
  .gate input { width:100%; padding:12px; border:1px solid #cbd5e1; border-radius:10px; font-size:1rem; }
  .gate button.primary { margin-top:10px; width:100%; padding:12px; border:0; border-radius:10px; background:#2563eb; color:#fff; font-size:1rem; cursor:pointer; }
  .gate .err { color:#dc2626; font-size:.85rem; min-height:1.2em; margin-top:8px; }
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:24px; }
  .card { background:#fff; border:1px solid #e5e7eb; border-radius:12px; padding:14px 16px; }
  .card .v { font-size:1.6rem; font-weight:700; color:#111827; }
  .card .l { font-size:.78rem; color:#6b7280; margin-top:2px; }
  section { background:#fff; border:1px solid #e5e7eb; border-radius:12px; padding:16px; margin-bottom:20px; }
  section h2 { font-size:1.05rem; margin:0 0 12px; }
  table { width:100%; border-collapse:collapse; font-size:.85rem; }
  th, td { padding:8px 10px; border-bottom:1px solid #eef2f7; text-align:center; }
  th { background:#f8fafc; color:#374151; cursor:pointer; user-select:none; white-space:nowrap; }
  td.name, th.name { text-align:left; }
  tr.past td { color:#9ca3af; }
  .toggle { display:inline-flex; gap:6px; margin-bottom:10px; }
  .toggle button { padding:6px 12px; border:1px solid #cbd5e1; background:#fff; border-radius:8px; cursor:pointer; font-size:.8rem; }
  .toggle button.on { background:#2563eb; color:#fff; border-color:#2563eb; }
  .langbar { display:flex; justify-content:flex-end; gap:4px; margin-bottom:8px; }
  .langbar button { padding:4px 10px; border:1px solid #cbd5e1; background:#fff; border-radius:999px; cursor:pointer; font-size:.75rem; color:#6b7280; }
  .langbar button.on { background:#111827; color:#fff; border-color:#111827; }
  .slotA { color:#2563eb; } .slotB { color:#7c3aed; }
  .bar { height:6px; background:#e5e7eb; border-radius:3px; overflow:hidden; }
  .bar > i { display:block; height:100%; background:#2563eb; }
</style>
</head>
<body>
<div id="gate" class="gate">
  <div class="langbar"><button data-lang="ko">한국어</button><button data-lang="en">EN</button></div>
  <h1 id="g-title"></h1>
  <p class="sub" id="g-prompt"></p>
  <input id="pw" type="password" />
  <button id="go" class="primary"></button>
  <div id="err" class="err"></div>
</div>

<div id="app" class="wrap" style="display:none">
  <div class="langbar"><button data-lang="ko">한국어</button><button data-lang="en">EN</button></div>
  <h1 id="a-title"></h1>
  <div class="sub" id="meta"></div>
  <div class="cards" id="cards"></div>

  <section>
    <h2 id="s-weekday"></h2>
    <div class="toggle">
      <button id="tUp" class="on"></button>
      <button id="tCum"></button>
    </div>
    <div id="weekday"></div>
  </section>

  <section>
    <h2 id="s-rank"></h2>
    <div id="rank"></div>
  </section>

  <section>
    <h2 id="s-bydate"></h2>
    <div id="bydate"></div>
  </section>
</div>

function b64ToBytes(b64){ const bin=atob(b64); const a=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i); return a; }
async function decrypt(blobB64, password){
  const raw=b64ToBytes(blobB64);
  const salt=raw.slice(0,16), iv=raw.slice(16,28), tag=raw.slice(28,44), ct=raw.slice(44);
  const ctWithTag=new Uint8Array(ct.length+tag.length); ctWithTag.set(ct); ctWithTag.set(tag,ct.length);
  const pwKey=await crypto.subtle.importKey("raw", new TextEncoder().encode(password), "PBKDF2", false, ["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:PBKDF2_ITER,hash:"SHA-256"}, pwKey, {name:"AES-GCM",length:256}, false, ["decrypt"]);
  const plain=await crypto.subtle.decrypt({name:"AES-GCM",iv}, key, ctWithTag);
  return JSON.parse(new TextDecoder().decode(plain));
}

let R = null;
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s).replace(/[&<>]/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;" }[c]));
const wdLabel = (w) => T().wd[w] || w;

function applyStatic(){
  const t = T();
  document.documentElement.lang = LANG;
  $("g-title").textContent = t.title;
  $("g-prompt").textContent = t.pwPrompt;
  $("pw").placeholder = t.pwPlaceholder;
  $("go").textContent = t.open;
  $("a-title").textContent = t.title;
  $("s-weekday").textContent = t.secWeekday;
  $("tUp").textContent = t.tUp;
  $("tCum").textContent = t.tCum;
  $("s-rank").textContent = t.secRank;
  $("s-bydate").textContent = t.secByDate;
  document.querySelectorAll(".langbar button").forEach((b)=> b.classList.toggle("on", b.dataset.lang===LANG));
}

let weekdayWhich = "up";
function renderCards(s){
  const t = T();
  const items = [
    [t.cards.totalOffered, s.totalOffered], [t.cards.openA, s.openA], [t.cards.openB, s.openB],
    [t.cards.closed, s.closed], [t.cards.buddyCount, s.buddyCount], [t.cards.snapshotCount, s.snapshotCount],
  ];
  $("cards").innerHTML = items.map(([l,v]) => `<div class="card"><div class="v">${v}</div><div class="l">${l}</div></div>`).join("");
  $("meta").textContent = t.lastUpdated + ": " + (s.lastUpdated || "-") + " " + t.tz;
}

function renderWeekday(which){
  weekdayWhich = which;
  const t = T();
  const rows = which === "up" ? R.weekdayUpcoming : R.weekdayCumulative;
  $("tUp").classList.toggle("on", which==="up");
  $("tCum").classList.toggle("on", which!=="up");
  let h = `<table><thead><tr><th>${t.thWeekday}</th><th class='slotA'>${t.th45}</th><th class='slotB'>${t.th56}</th></tr></thead><tbody>`;
  const order = [1,2,3,4,5];
  for (const i of order){
    const w = rows[i];
    h += `<tr><td><b>${wdLabel(w.weekday)}</b></td><td>${w.A.buddies}</td><td>${w.B.buddies}</td></tr>`;
  }
  h += "</tbody></table>";
  $("weekday").innerHTML = h;
}

let sortKey = "days", sortDir = -1;
function renderRank(){
  const r = T().rank;
  const cols = [
    ["name",r.name,"name"], ["skill",r.skill], ["days",r.days], ["rate",r.rate],
    ["total",r.total], ["a",r.a], ["b",r.b], ["open",r.open], ["closed",r.closed],
  ];
  const data = [...R.buddies].sort((x,y)=>{
    const a=x[sortKey], b=y[sortKey];
    const c = (typeof a==="number") ? a-b : String(a).localeCompare(String(b));
    return c*sortDir;
  });
  let h = "<table><thead><tr>";
  for (const [k,label,cls] of cols){ h += `<th class="${cls||""}" data-k="${k}">${label}${sortKey===k?(sortDir<0?" ▼":" ▲"):""}</th>`; }
  h += "</tr></thead><tbody>";
  for (const b of data){
    h += `<tr><td class="name">${esc(b.name)}</td><td>${esc(b.skill||"")}</td><td>${b.days}</td>
      <td><div class="bar"><i style="width:${b.rate}%"></i></div>${b.rate}%</td>
      <td>${b.total}</td><td>${b.a}</td><td>${b.b}</td><td>${b.open}</td><td>${b.closed}</td></tr>`;
  }
  h += "</tbody></table>";
  $("rank").innerHTML = h;
  $("rank").querySelectorAll("th").forEach((th)=>{
    th.onclick = () => { const k=th.dataset.k; if(sortKey===k) sortDir*=-1; else { sortKey=k; sortDir = (k==="name"||k==="skill")?1:-1; } renderRank(); };
  });
}

function renderByDate(){
  const b = T().bd;
  let h = `<table><thead><tr><th>${b.date}</th><th>${b.weekday}</th><th class='slotA'>${b.open45}</th><th class='slotB'>${b.open56}</th><th>${b.slots}</th><th>${b.buddies}</th></tr></thead><tbody>`;
  for (const d of R.byDate){
    const oa = d.openA == null ? "-" : d.openA;
    const ob = d.openB == null ? "-" : d.openB;
    h += `<tr class="${d.past?"past":""}"><td>${d.date}</td><td>${wdLabel(d.weekday)}</td><td>${oa}</td><td>${ob}</td><td>${d.slots}</td><td>${d.buddies}</td></tr>`;
  }
  h += "</tbody></table>";
  $("bydate").innerHTML = h;
}

function renderAll(){
  renderCards(R.summary);
  renderWeekday(weekdayWhich);
  renderRank();
  renderByDate();
}

function setLang(lang){
  LANG = lang;
  try { localStorage.setItem(LANG_KEY, lang); } catch {}
  applyStatic();
  if (R) renderAll();
}
document.querySelectorAll(".langbar button").forEach((b)=>{ b.onclick = () => setLang(b.dataset.lang); });

const PW_KEY = "lcic_openslots_pw";
async function tryUnlock(pw, fromUser){
  $("err").textContent = "";
  try {
    R = await decrypt(BLOB, pw);
  } catch {
    if (fromUser) $("err").textContent = T().pwErr;
    try { localStorage.removeItem(PW_KEY); } catch {}
    return false;
  }
  try { localStorage.setItem(PW_KEY, pw); } catch {}
  $("gate").style.display = "none";
  $("app").style.display = "block";
  renderAll();
  $("tUp").onclick = () => renderWeekday("up");
  $("tCum").onclick = () => renderWeekday("cum");
  return true;
}
$("go").onclick = () => tryUnlock($("pw").value, true);
$("pw").addEventListener("keydown", (e)=>{ if(e.key==="Enter") tryUnlock($("pw").value, true); });
