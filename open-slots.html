<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex,nofollow" />
<title>Open Slots 참여 현황 · LCIC</title>
<link rel="stylesheet" href="assets/shared.css" />
<style>
  body { font-family: Pretendard, system-ui, sans-serif; background:#f5f7fb; color:#1f2937; margin:0; }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 24px 16px 80px; }
  h1 { font-size: 1.5rem; margin: 8px 0 4px; }
  .sub { color:#6b7280; font-size:.85rem; margin-bottom:20px; }
  .gate { max-width:340px; margin:18vh auto; text-align:center; }
  .gate input { width:100%; padding:12px; border:1px solid #cbd5e1; border-radius:10px; font-size:1rem; }
  .gate button { margin-top:10px; width:100%; padding:12px; border:0; border-radius:10px; background:#2563eb; color:#fff; font-size:1rem; cursor:pointer; }
  .gate .err { color:#dc2626; font-size:.85rem; min-height:1.2em; margin-top:8px; }
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:24px; }
  .card { background:#fff; border:1px solid #e5e7eb; border-radius:12px; padding:14px 16px; }
  .card .v { font-size:1.6rem; font-weight:700; color:#111827; }
  .card .l { font-size:.78rem; color:#6b7280; margin-top:2px; }
  section { background:#fff; border:1px solid #e5e7eb; border-radius:12px; padding:16px; margin-bottom:20px; }
  section h2 { font-size:1.05rem; margin:0 0 12px; }
  table { width:100%; border-collapse:collapse; font-size:.85rem; }
  th, td { padding:8px 10px; border-bottom:1px solid #eef2f7; text-align:center; }
  th { background:#f8fafc; color:#374151; cursor:pointer; user-select:none; white-space:nowrap; }
  td.name, th.name { text-align:left; }
  tr.past td { color:#9ca3af; }
  .toggle { display:inline-flex; gap:6px; margin-bottom:10px; }
  .toggle button { padding:6px 12px; border:1px solid #cbd5e1; background:#fff; border-radius:8px; cursor:pointer; font-size:.8rem; }
  .toggle button.on { background:#2563eb; color:#fff; border-color:#2563eb; }
  .slotA { color:#2563eb; } .slotB { color:#7c3aed; }
  .bar { height:6px; background:#e5e7eb; border-radius:3px; overflow:hidden; }
  .bar > i { display:block; height:100%; background:#2563eb; }
</style>
</head>
<body>
<div id="gate" class="gate">
  <h1>Open Slots 참여 현황</h1>
  <p class="sub">비밀번호를 입력하세요</p>
  <input id="pw" type="password" placeholder="비밀번호" />
  <button id="go">열기</button>
  <div id="err" class="err"></div>
</div>

<div id="app" class="wrap" style="display:none">
  <h1>Open Slots 참여 현황</h1>
  <div class="sub" id="meta"></div>
  <div class="cards" id="cards"></div>

  <section>
    <h2>요일별 참여</h2>
    <div class="toggle">
      <button id="tUp" class="on">다가오는(열린 슬롯)</button>
      <button id="tCum">누적(오퍼 전체)</button>
    </div>
    <div id="weekday"></div>
  </section>

  <section>
    <h2>버디별 참여 순위</h2>
    <div id="rank"></div>
  </section>

  <section>
    <h2>날짜별 현황</h2>
    <div id="bydate"></div>
  </section>
</div>

const PBKDF2_ITER = 100000;
function b64ToBytes(b64){ const bin=atob(b64); const a=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i); return a; }
async function decrypt(blobB64, password){
  const raw=b64ToBytes(blobB64);
  const salt=raw.slice(0,16), iv=raw.slice(16,28), tag=raw.slice(28,44), ct=raw.slice(44);
  const ctWithTag=new Uint8Array(ct.length+tag.length); ctWithTag.set(ct); ctWithTag.set(tag,ct.length);
  const pwKey=await crypto.subtle.importKey("raw", new TextEncoder().encode(password), "PBKDF2", false, ["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:PBKDF2_ITER,hash:"SHA-256"}, pwKey, {name:"AES-GCM",length:256}, false, ["decrypt"]);
  const plain=await crypto.subtle.decrypt({name:"AES-GCM",iv}, key, ctWithTag);
  return JSON.parse(new TextDecoder().decode(plain));
}

let R = null;
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s).replace(/[&<>]/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;" }[c]));

function renderCards(s){
  const items = [
    ["누적 오퍼 슬롯", s.totalOffered],
    ["현재 열림 · 4–5시", s.openA],
    ["현재 열림 · 5–6시", s.openB],
    ["매칭(마감)", s.closed],
    ["참여 버디", s.buddyCount],
    ["스냅샷 수", s.snapshotCount],
  ];
  $("cards").innerHTML = items.map(([l,v]) => `<div class="card"><div class="v">${v}</div><div class="l">${l}</div></div>`).join("");
  $("meta").textContent = "마지막 갱신: " + (s.lastUpdated || "-") + " (필리핀 시간)";
}

function renderWeekday(which){
  const rows = which === "up" ? R.weekdayUpcoming : R.weekdayCumulative;
  $("tUp").classList.toggle("on", which==="up");
  $("tCum").classList.toggle("on", which!=="up");
  let h = "<table><thead><tr><th>요일</th><th class='slotA'>4–5시 버디</th><th class='slotA'>4–5시 슬롯</th><th class='slotB'>5–6시 버디</th><th class='slotB'>5–6시 슬롯</th></tr></thead><tbody>";
  const order = [1,2,3,4,5]; // 월~금 (rows는 일~토 순). 토·일은 프로그램 없음
  for (const i of order){
    const w = rows[i];
    h += `<tr><td><b>${w.weekday}</b></td><td>${w.A.buddies}</td><td>${w.A.slots}</td><td>${w.B.buddies}</td><td>${w.B.slots}</td></tr>`;
  }
  h += "</tbody></table>";
  $("weekday").innerHTML = h;
}

let sortKey = "days", sortDir = -1;
function renderRank(){
  const cols = [
    ["name","버디","name"], ["skill","Lv"], ["days","열린 날짜"], ["rate","참여율%"],
    ["total","총 슬롯"], ["a","4–5시"], ["b","5–6시"], ["open","현재열림"], ["closed","매칭"],
  ];
  const data = [...R.buddies].sort((x,y)=>{
    const a=x[sortKey], b=y[sortKey];
    const c = (typeof a==="number") ? a-b : String(a).localeCompare(String(b));
    return c*sortDir;
  });
  let h = "<table><thead><tr>";
  for (const [k,label,cls] of cols){ h += `<th class="${cls||""}" data-k="${k}">${label}${sortKey===k?(sortDir<0?" ▼":" ▲"):""}</th>`; }
  h += "</tr></thead><tbody>";
  for (const b of data){
    h += `<tr><td class="name">${esc(b.name)}</td><td>${esc(b.skill||"")}</td><td>${b.days}</td>
      <td><div class="bar"><i style="width:${b.rate}%"></i></div>${b.rate}%</td>
      <td>${b.total}</td><td>${b.a}</td><td>${b.b}</td><td>${b.open}</td><td>${b.closed}</td></tr>`;
  }
  h += "</tbody></table>";
  $("rank").innerHTML = h;
  $("rank").querySelectorAll("th").forEach((th)=>{
    th.onclick = () => { const k=th.dataset.k; if(sortKey===k) sortDir*=-1; else { sortKey=k; sortDir = (k==="name"||k==="skill")?1:-1; } renderRank(); };
  });
}

function renderByDate(){
  let h = "<table><thead><tr><th>날짜</th><th>요일</th><th>버디</th><th>슬롯</th></tr></thead><tbody>";
  for (const d of R.byDate){
    h += `<tr class="${d.past?"past":""}"><td>${d.date}</td><td>${d.weekday}</td><td>${d.buddies}</td><td>${d.slots}</td></tr>`;
  }
  h += "</tbody></table>";
  $("bydate").innerHTML = h;
}

async function unlock(){
  $("err").textContent = "";
  try {
    R = await decrypt(BLOB, $("pw").value);
  } catch { $("err").textContent = "비밀번호가 올바르지 않습니다."; return; }
  $("gate").style.display = "none";
  $("app").style.display = "block";
  renderCards(R.summary);
  renderWeekday("up");
  renderRank();
  renderByDate();
  $("tUp").onclick = () => renderWeekday("up");
  $("tCum").onclick = () => renderWeekday("cum");
}
$("go").onclick = unlock;
$("pw").addEventListener("keydown", (e)=>{ if(e.key==="Enter") unlock(); });
</script>
