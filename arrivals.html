<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive">
<title>도착 · 기숙사 입소 명단 · LCIC</title>
<link rel="icon" type="image/png" href="assets/brand/lcic-logo.png">
<script src="assets/background.js?v=8"></script>
<link rel="stylesheet" href="assets/shared.css?v=13">
<script src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
<style>
  .gate { max-width: 400px; margin: 90px auto 0; padding: 36px 32px; background: var(--bg-elev);
    border: 1px solid var(--hairline); border-radius: 24px; box-shadow: var(--shadow-lg); }
  .gate h2 { font-size: 1.25rem; font-weight: 700; margin-bottom: 6px; }
  .gate p { color: var(--text-dim); font-size: .85rem; margin-bottom: 20px; }
  .gate input { width: 100%; margin-bottom: 12px; }

  .wrap { max-width: 1000px; margin: 0 auto; padding: 32px 20px 100px; }
  .head { display: flex; align-items: flex-end; justify-content: space-between; gap: 14px; flex-wrap: wrap; margin-bottom: 8px; }
  .head h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -.02em; }
  .head .meta { color: var(--text-dim); font-size: .84rem; margin-top: 3px; }
  .search { margin: 16px 0 24px; }
  .search input { max-width: 300px; }

  .sec { margin-bottom: 34px; }
  .sec-head { display: flex; align-items: center; gap: 10px; font-size: 1.15rem; font-weight: 800;
    padding: 12px 16px; border-radius: 14px; background: var(--accent-tint); color: var(--accent-deep);
    border: 1px solid var(--accent-soft); margin-bottom: 16px; }
  .sec-head .cnt { margin-left: auto; font-size: .9rem; font-weight: 700; color: var(--text-dim); }

  .flt { border: 1px solid var(--hairline); border-radius: 16px; margin-bottom: 14px; overflow: hidden; background: var(--bg-elev); box-shadow: var(--shadow-sm); }
  .flt-head { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; padding: 13px 16px; background: rgba(0,0,0,.025); border-bottom: 1px solid var(--hairline); }
  .flt-no { font-weight: 800; font-size: 1rem; letter-spacing: .01em; }
  .flt-when { color: var(--text-dim); font-size: .84rem; }
  .flt-cnt { margin-left: auto; font-size: .82rem; font-weight: 700; color: var(--accent-deep); }
  .carry { font-size: .72rem; font-weight: 700; padding: 3px 9px; border-radius: 999px;
    background: rgba(217,119,6,.12); color: #b45309; white-space: nowrap; }
  .names { display: flex; flex-wrap: wrap; gap: 8px; padding: 15px 16px; }
  .nm { display: inline-flex; align-items: baseline; gap: 5px; padding: 6px 11px; border-radius: 10px;
    background: rgba(0,0,0,.035); border: 1px solid var(--hairline); font-size: .9rem; }
  .nm b { font-weight: 700; }
  .nm .uni { font-size: .68rem; color: var(--text-faint); }
  .nm.hit { background: rgba(250,204,21,.28); border-color: rgba(202,138,4,.5); }
  .empty { color: var(--text-faint); text-align: center; padding: 40px; }
</style>
</head>
<body>

<div id="gate-view">
  <div class="gate">
    <h2><iconify-icon icon="solar:plain-2-bold-duotone" inline></iconify-icon> 도착 · 입소 명단</h2>
    <p>담당자 전용입니다. 비밀번호를 입력하세요.</p>
    <form id="gate-form">
      <input class="input" id="pw" type="password" autocomplete="current-password" placeholder="비밀번호" required>
      <button class="btn-primary" id="gate-btn" type="submit" style="width:100%;">열기</button>
    </form>
  </div>
</div>

<main id="app-view" class="wrap hidden">
  <div class="head">
    <div>
      <h1>🛬 도착 · 기숙사 입소 명단</h1>
      <div class="meta" id="meta"></div>
    </div>
  </div>
  <div class="search"><input class="input" id="q" type="search" placeholder="이름 검색"></div>
  <div id="list"></div>
</main>

<script>
const $ = (id) => document.getElementById(id);
const toast = $("toast");
function showToast(m, t = "") { toast.textContent = m; toast.className = `toast show ${t}`; setTimeout(() => toast.classList.remove("show"), 2400); }
const esc = (s) => (s == null ? "" : String(s)).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
const WD = ["일", "월", "화", "수", "목", "금", "토"];
function fmtDorm(iso) { const [y, m, d] = iso.split("-").map(Number); const wd = WD[new Date(Date.UTC(y, m - 1, d)).getUTCDay()]; return `${m}월 ${d}일 (${wd})`; }
function fmtArr(iso, t) { const [y, m, d] = iso.split("-").map(Number); const wd = WD[new Date(Date.UTC(y, m - 1, d)).getUTCDay()]; return `세부 ${m}/${d}(${wd}) ${t || ""} 도착`.replace(/\s+도착/, " 도착"); }

async function decryptBlob(b64, password) {
  const raw = Uint8Array.from(atob(b64), (c) => c.charCodeAt(0));
  const salt = raw.slice(0, 16), iv = raw.slice(16, 28), tag = raw.slice(28, 44), ct = raw.slice(44);
  const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(password), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey({ name: "PBKDF2", salt, iterations: 100000, hash: "SHA-256" }, km, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);
  const data = new Uint8Array(ct.length + tag.length); data.set(ct); data.set(tag, ct.length);
  const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, data);
  return JSON.parse(new TextDecoder().decode(pt));
}

let DATA = null;

$("gate-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = $("gate-btn"); btn.disabled = true; btn.textContent = "여는 중…";
  try {
    DATA = await decryptBlob(ARRIVALS_BLOB, $("pw").value);
    $("gate-view").classList.add("hidden");
    $("app-view").classList.remove("hidden");
    render();
  } catch (_) {
    btn.disabled = false; btn.textContent = "열기";
    showToast("비밀번호가 올바르지 않습니다.", "error");
  }
});

$("q") && $("q").addEventListener("input", render);

function render() {
  const q = ($("q").value || "").trim();
  const grand = DATA.sections.reduce((a, s) => a + s.count, 0);
  $("meta").textContent = `총 ${grand}명 · 비행기편별 · 가나다순${DATA.updated ? " · 갱신 " + DATA.updated : ""}`;

  let html = "";
  for (const s of DATA.sections) {
    let secHtml = "", secShown = 0;
    for (const f of s.flights) {
      const items = f.students.map((st) => {
        const hit = q && st.n.includes(q);
        if (q && !st.n.includes(q)) return null;
        return `<span class="nm${hit ? " hit" : ""}"><b>${esc(st.n)}</b>${st.u ? `<span class="uni">${esc(st.u)}</span>` : ""}</span>`;
      }).filter(Boolean);
      if (!items.length) continue;
      secShown += items.length;
      secHtml += `<div class="flt">
        <div class="flt-head">
          <span class="flt-no">✈️ ${esc(f.flightNo)}</span>
          <span class="flt-when">${esc(fmtArr(f.arrDate, f.arrTime))}</span>
          ${f.carry ? `<span class="carry">전날 밤 → 익일 새벽 입소</span>` : ""}
          <span class="flt-cnt">${f.students.length}명</span>
        </div>
        <div class="names">${items.join("")}</div>
      </div>`;
    }
    if (!secShown) continue;
    html += `<div class="sec">
      <div class="sec-head"><iconify-icon icon="solar:home-2-bold-duotone"></iconify-icon> ${fmtDorm(s.dorm)} 기숙사 입소
        <span class="cnt">${q ? secShown + " / " : ""}${s.count}명</span></div>
      ${secHtml}</div>`;
  }
  $("list").innerHTML = html || `<div class="empty">검색 결과가 없습니다.</div>`;
}
</script>
</body>
</html>
