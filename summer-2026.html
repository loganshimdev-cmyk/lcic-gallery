<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive">
<title>2026 Summer Program · LCIC</title>
<link rel="icon" type="image/png" href="assets/brand/lcic-logo.png">
<script src="assets/background.js?v=8"></script>
<link rel="stylesheet" href="assets/shared.css?v=13">
<script src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
<style>
  .gate-wrap {
    min-height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    padding: 120px 20px 60px;
  }
  .gate-card { max-width: 420px; width: 100%; }
  .gate-card .bezel-inner { padding: 36px 32px; }
  .gate-icon {
    width: 64px; height: 64px; border-radius: 999px;
    background: var(--accent-soft); color: var(--accent-deep);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; margin: 0 auto 20px;
  }
  .gate-title {
    text-align: center; font-size: 1.35rem; font-weight: 600;
    letter-spacing: -0.01em; margin-bottom: 8px;
  }
  .gate-sub {
    text-align: center; color: var(--text-dim);
    font-size: 0.92rem; line-height: 1.55; margin-bottom: 24px;
  }
  .gate-form { display: flex; flex-direction: column; gap: 12px; }
  .gate-input {
    width: 100%; padding: 14px 16px;
    border: 1px solid var(--hairline-strong);
    border-radius: 14px; background: var(--bg-elev);
    font-family: inherit; font-size: 1rem; color: var(--text);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .gate-input:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-soft);
  }
  .gate-btn {
    width: 100%; padding: 14px 16px;
    border: none; border-radius: 14px;
    background: var(--accent); color: white;
    font-family: inherit; font-size: 1rem; font-weight: 600;
    cursor: pointer; transition: background 0.15s, transform 0.05s;
    box-shadow: var(--shadow-accent);
  }
  .gate-btn:hover { background: var(--accent-hover); }
  .gate-btn:active { transform: translateY(1px); }
  .gate-btn[disabled] { opacity: 0.55; cursor: not-allowed; transform: none; }
  .gate-err { color: #dc2626; font-size: 0.86rem; text-align: center; min-height: 20px; }

  /* ── 요약 카드 ── */
  .summary-row { display: flex; gap: 12px; margin-bottom: 22px; }
  .summary-card {
    flex: 1; background: var(--bg-elev);
    border: 1px solid var(--hairline); border-radius: 18px;
    padding: 16px 20px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: var(--shadow-sm);
  }
  .summary-card.total { background: var(--accent-soft); border-color: transparent; }
  .summary-label {
    font-size: 0.92rem; font-weight: 600; color: var(--text-dim);
    display: flex; align-items: baseline; gap: 6px;
  }
  .summary-card.total .summary-label { color: var(--accent-deep); }
  .summary-value {
    font-size: 1.8rem; font-weight: 700; letter-spacing: -0.02em;
    color: var(--accent); font-variant-numeric: tabular-nums;
  }
  .summary-card.total .summary-value { color: var(--accent-deep); }
  .summary-value .unit { font-size: 0.9rem; font-weight: 600; color: var(--text-faint); margin-left: 2px; }
  .summary-value .gsplit {
    display: block; font-size: 0.72rem; font-weight: 600;
    color: var(--text-faint); margin-top: 2px; letter-spacing: 0;
  }
  .summary-card.total .summary-value .unit { color: var(--accent-deep); opacity: 0.7; }
  @media (max-width: 560px) {
    .summary-row { flex-wrap: wrap; }
    .summary-card { padding: 13px 16px; }
    .summary-value { font-size: 1.5rem; }
  }

  /* ── 피벗표 ── */
  .pivot-wrap {
    background: var(--bg-elev); border: 1px solid var(--hairline);
    border-radius: 18px; box-shadow: var(--shadow-sm);
    overflow-x: auto; margin-bottom: 8px;
  }
  table.pivot { width: 100%; border-collapse: collapse; font-variant-numeric: tabular-nums; min-width: 560px; }
  table.pivot th, table.pivot td {
    padding: 11px 12px; text-align: center;
    border-bottom: 1px solid var(--hairline); white-space: nowrap;
  }
  table.pivot thead th { font-size: 0.78rem; font-weight: 700; color: var(--text-dim); background: var(--surface); }
  table.pivot thead tr:first-child th { border-bottom: 1px solid var(--hairline-strong); }
  table.pivot th.uni, table.pivot td.uni {
    text-align: left; font-weight: 600; color: var(--text);
    position: sticky; left: 0; background: var(--bg-elev);
  }
  table.pivot thead th.uni { background: var(--surface); }
  table.pivot td.uni a.uni-link {
    color: var(--accent); cursor: pointer; text-decoration: none;
    border-bottom: 1px solid transparent;
  }
  table.pivot td.uni a.uni-link:hover { color: var(--accent-deep); border-bottom-color: currentColor; }
  table.pivot td.male { color: #2563eb; }
  table.pivot td.female { color: #db2777; }
  table.pivot td.dash { color: var(--text-faint); }
  table.pivot td.sub { font-weight: 600; color: var(--text); background: var(--surface); }
  table.pivot tbody tr:hover td, table.pivot tbody tr:hover td.uni { background: var(--accent-soft); }
  table.pivot tr.total-row td {
    font-weight: 700; color: var(--accent-deep); background: var(--accent-soft);
    border-top: 2px solid var(--accent); border-bottom: none;
  }
  table.pivot tr.total-row td.uni { background: var(--accent-soft); }
  table.pivot tbody tr.nav-row { cursor: pointer; }
  table.pivot tbody tr.nav-active td { background: var(--accent-soft); }
  table.pivot tbody tr.nav-active td.uni {
    color: var(--accent-deep); font-weight: 700;
    box-shadow: inset 3px 0 0 var(--accent);
  }
  .col-div { border-left: 1px solid var(--hairline-strong); }
  #table-pane { scroll-margin-top: 84px; }
  .pivot-note { font-size: 0.76rem; color: var(--text-faint); padding: 9px 4px 18px; line-height: 1.5; }

  /* ── 검색 ── */
  .search-bar {
    background: var(--bg-elev); border: 1px solid var(--hairline);
    border-radius: 16px; padding: 2px 8px 2px 14px;
    display: flex; align-items: center; gap: 10px;
    box-shadow: var(--shadow-sm); margin-bottom: 16px;
  }
  .search-bar iconify-icon { color: var(--text-faint); font-size: 19px; flex: 0 0 auto; }
  .search-bar input {
    flex: 1; min-width: 0; border: none; outline: none; background: transparent;
    font-family: inherit; font-size: 0.98rem; padding: 11px 0; color: var(--text);
  }
  .search-bar input::placeholder { color: var(--text-faint); }
  .clear-btn {
    border: none; background: transparent; color: var(--text-faint); cursor: pointer;
    padding: 6px; border-radius: 999px; display: none; align-items: center; justify-content: center;
  }
  .clear-btn.visible { display: flex; }
  .clear-btn:hover { color: var(--text); background: var(--surface); }

  /* ── 엑셀식 데이터 표 ── */
  .table-meta {
    display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap;
    margin: 0 4px 12px; padding: 0;
  }
  .table-title { font-size: 1.3rem; font-weight: 700; letter-spacing: -0.01em; }
  .table-sub { font-size: 0.82rem; color: var(--text-faint); font-variant-numeric: tabular-nums; }
  .table-sub .gm { color: #2563eb; } .table-sub .gf { color: #db2777; }

  /* 상세 명단 표만 넓게, 요약/피벗은 좁게(한눈에) */
  #roster.container-narrow { max-width: min(1560px, 98vw); }
  #summary-pane { max-width: 900px; margin-left: auto; margin-right: auto; }
  .grid-wrap {
    background: var(--bg-elev); border: 1px solid var(--hairline);
    border-radius: 16px; box-shadow: var(--shadow-sm); overflow: auto;
    max-height: calc(100dvh - 220px);
  }
  table.grid {
    width: 100%; border-collapse: separate; border-spacing: 0;
    font-size: 0.83rem; white-space: nowrap;
  }
  table.grid th, table.grid td {
    padding: 7px 8px; text-align: left;
    border-bottom: 1px solid var(--hairline);
    border-right: 1px solid var(--hairline);
  }
  table.grid td.col-email { max-width: 220px; overflow: hidden; text-overflow: ellipsis; }
  table.grid th:last-child, table.grid td:last-child { border-right: none; }
  table.grid thead th {
    position: sticky; top: 0; z-index: 2;
    background: var(--surface); color: var(--text-dim);
    font-size: 0.78rem; font-weight: 700;
    border-bottom: 1px solid var(--hairline-strong);
    cursor: pointer; user-select: none;
  }
  table.grid thead th.nosort { cursor: default; }
  table.grid thead th .arr { color: var(--accent); margin-left: 3px; font-size: 0.72rem; }
  table.grid thead th:hover:not(.nosort) { background: var(--accent-soft); color: var(--accent-deep); }
  table.grid tbody tr:nth-child(even) td { background: rgba(0,0,0,0.012); }
  table.grid tbody tr:hover td { background: var(--accent-soft); }
  table.grid td.num { font-variant-numeric: tabular-nums; }
  table.grid td.col-idx { color: var(--text-faint); text-align: right; font-variant-numeric: tabular-nums; }
  table.grid td.col-name { font-weight: 600; }
  table.grid td.col-eng, table.grid td.col-email { color: var(--text-dim); }
  table.grid td.col-email a { color: var(--text-dim); text-decoration: none; }
  table.grid td.col-email a:hover { color: var(--accent); text-decoration: underline; }
  table.grid td.col-note { color: var(--text-faint); font-style: italic; }
  .gtag {
    display: inline-block; min-width: 28px; text-align: center;
    font-size: 0.74rem; font-weight: 700; padding: 2px 7px; border-radius: 7px;
  }
  .gtag.male { background: #dbeafe; color: #1d4ed8; }
  .gtag.female { background: #fce7f3; color: #be185d; }
  .mtag { font-weight: 700; }
  .mtag.m7 { color: var(--accent); } .mtag.m8 { color: #c2410c; }
  .uni-cell { font-weight: 600; color: var(--text); }
  .prog-tag {
    font-size: 0.74rem; font-weight: 600; color: var(--text-dim);
    background: var(--surface); border-radius: 6px; padding: 1px 7px;
  }
  .regtag {
    display: inline-flex; align-items: center; gap: 3px;
    color: #15803d; font-weight: 700; font-size: 0.8rem;
  }
  .regtag iconify-icon { font-size: 14px; }
  .reg-no { color: var(--text-faint); }
  .reg-cnt { color: #16a34a; font-weight: 700; }
  table.grid tbody tr.reg-row td { background: rgba(22,163,74,0.07); }
  table.grid tbody tr.reg-row td.col-registered { box-shadow: inset 3px 0 0 #16a34a; }
  table.grid tbody tr.reg-row:hover td { background: rgba(22,163,74,0.14); }
  .reg-toggle {
    flex: 0 0 auto; border: 1px solid var(--hairline-strong); background: transparent;
    color: var(--text-dim); font-family: inherit; font-size: 0.82rem; font-weight: 600;
    padding: 7px 12px; border-radius: 10px; cursor: pointer; white-space: nowrap;
    display: inline-flex; align-items: center; gap: 5px; margin-right: 4px;
  }
  .reg-toggle iconify-icon { font-size: 15px; }
  .reg-toggle:hover { background: var(--surface); color: var(--text); }
  .reg-toggle.active { background: #dcfce7; border-color: #16a34a; color: #15803d; }
  .sens-toggle.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent-deep); }
  .sens-mask { color: var(--text-faint); letter-spacing: 2px; user-select: none; }
  .gate-modal {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(15,23,42,0.45);
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .gate-modal .gate-card { max-width: 390px; width: 100%; }
  .gate-cancel {
    width: 100%; padding: 11px; border: none; background: transparent;
    color: var(--text-faint); font: inherit; cursor: pointer; border-radius: 10px; margin-top: 2px;
  }
  .gate-cancel:hover { background: var(--surface); color: var(--text); }

  .pending-banner {
    display: flex; align-items: center; gap: 9px;
    margin: 12px 2px 0; padding: 11px 15px;
    background: var(--surface); border: 1px dashed var(--hairline-strong);
    border-radius: 12px; color: var(--text-faint); font-size: 0.86rem;
  }
  .pending-banner iconify-icon { font-size: 18px; flex: 0 0 auto; }

  mark.hl { background: var(--accent-soft); color: var(--accent-deep); border-radius: 4px; padding: 0 2px; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-faint); }
  .empty-state iconify-icon { font-size: 40px; opacity: 0.5; }
  .empty-state div { margin-top: 12px; font-size: 0.95rem; }

  .footer-meta {
    text-align: center; color: var(--text-faint); font-size: 0.78rem;
    padding: 36px 20px 80px; letter-spacing: 0.02em;
  }
  .footer-meta button {
    background: none; border: none; color: var(--text-faint); cursor: pointer;
    font: inherit; padding: 4px 8px; border-radius: 8px;
  }
  .footer-meta button:hover { color: var(--text); background: var(--surface); }
</style>
</head>

<!-- 민감정보(학번·연락처·이메일) 잠금 해제 모달 -->
<section id="gate" class="gate-modal" style="display:none;">
  <div class="bezel gate-card">
    <div class="bezel-inner">
      <div class="gate-icon"><iconify-icon icon="solar:lock-keyhole-bold-duotone"></iconify-icon></div>
      <div class="gate-title">민감정보 보기</div>
      <div class="gate-sub">학번 · 연락처 · 이메일을 보려면<br>비밀번호를 입력해 주세요.</div>
      <form id="gate-form" class="gate-form" autocomplete="off">
        <input id="gate-pw" class="gate-input" type="password"
          placeholder="비밀번호" autocomplete="off" required>
        <button id="gate-btn" class="gate-btn" type="submit"><span id="gate-btn-label">확인</span></button>
        <div id="gate-err" class="gate-err" role="alert"></div>
        <button id="gate-cancel" class="gate-cancel" type="button">취소</button>
      </form>
    </div>
  </div>
</section>

<!-- 명단 본문 -->
<main id="roster" class="container-narrow" style="padding: 120px 12px 0;">
  <header class="fade-up" style="text-align: center; margin-bottom: 28px;">
    <span class="eyebrow"><span class="dot"></span> SUMMER 2026</span>
    <h1 class="headline" style="margin-top: 16px;">대학별 학생 배정 명단</h1>
    <p class="subhead">표에서 대학을 누르면 아래에 해당 명단이 펼쳐집니다.</p>
  </header>

  <!-- 요약 + 네비게이션 표 -->
  <section id="summary-pane">
    <div class="summary-row fade-up delay-1">
      <div class="summary-card">
        <span class="summary-label"><span style="color:var(--accent);font-weight:700;">7</span>월 입교</span>
        <span class="summary-value" id="sum-july">–<span class="unit">명</span></span>
      </div>
      <div class="summary-card">
        <span class="summary-label"><span style="color:var(--accent);font-weight:700;">8</span>월 입교</span>
        <span class="summary-value" id="sum-august">–<span class="unit">명</span></span>
      </div>
      <div class="summary-card total">
        <span class="summary-label">전체</span>
        <span class="summary-value" id="sum-total">–<span class="unit">명</span></span>
      </div>
    </div>
    <div class="pivot-wrap fade-up delay-1">
      <table class="pivot">
        <thead>
          <tr>
            <th class="uni" rowspan="2">대학교</th>
            <th colspan="3">7월</th>
            <th colspan="3" class="col-div">8월</th>
            <th rowspan="2" class="col-div">합계</th>
            <th rowspan="2" class="col-div">등록</th>
          </tr>
          <tr><th>남</th><th>여</th><th>계</th><th class="col-div">남</th><th>여</th><th>계</th></tr>
        </thead>
        <tbody id="pivot-body"></tbody>
      </table>
    </div>
    <div class="pivot-note" id="pivot-note"></div>
  </section>

  <!-- 선택한 대학 명단 -->
  <section id="table-pane">
    <div class="search-bar fade-up">
      <iconify-icon icon="solar:magnifer-linear"></iconify-icon>
      <input id="search" type="search" placeholder="이름 · 학과 · 연락처 · 이메일 검색" autocomplete="off">
      <button id="search-clear" class="clear-btn" type="button" aria-label="검색어 지우기">
        <iconify-icon icon="solar:close-circle-bold" style="font-size: 18px;"></iconify-icon>
      </button>
      <button id="reg-toggle" class="reg-toggle" type="button">
        <iconify-icon icon="solar:check-circle-bold" inline></iconify-icon> 등록자만
      </button>
      <button id="sens-toggle" class="reg-toggle sens-toggle" type="button">
        <iconify-icon icon="solar:lock-keyhole-bold" inline></iconify-icon> <span id="sens-label">학번·연락처 보기</span>
      </button>
    </div>
    <div class="table-meta">
      <span class="table-title" id="table-title"></span>
      <span class="table-sub" id="table-sub"></span>
    </div>
    <div class="grid-wrap"><table class="grid" id="grid"><thead id="grid-head"></thead><tbody id="grid-body"></tbody></table></div>
    <div id="pending-banner-host"></div>
    <div id="grid-empty" class="empty-state" style="display:none;">
      <iconify-icon icon="solar:inbox-bold-duotone"></iconify-icon>
      <div>검색 결과가 없습니다.</div>
    </div>
  </section>

  <div class="footer-meta">
    Lapulapu Cebu International College · 2026 Summer Program
  </div>
</main>

<script>
(function () {

  function b64ToBytes(b64) {
    const bin = atob(b64); const arr = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
    return arr;
  }
  async function decrypt(blobB64, password) {
    const raw = b64ToBytes(blobB64);
    const salt = raw.slice(0, 16), iv = raw.slice(16, 28), tag = raw.slice(28, 44), ct = raw.slice(44);
    const ctWithTag = new Uint8Array(ct.length + tag.length);
    ctWithTag.set(ct); ctWithTag.set(tag, ct.length);
    const pwKey = await crypto.subtle.importKey("raw", new TextEncoder().encode(password), "PBKDF2", false, ["deriveKey"]);
    const key = await crypto.subtle.deriveKey(
      { name: "PBKDF2", salt, iterations: PBKDF2_ITER, hash: "SHA-256" },
      pwKey, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);
    const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ctWithTag);
    return JSON.parse(new TextDecoder().decode(plain));
  }

  function escapeHtml(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, (c) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }
  function highlight(text, q) {
    const safe = escapeHtml(text);
    if (!q) return safe;
    const pattern = q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    return safe.replace(new RegExp(pattern, "gi"), (m) => `<mark class="hl">${m}</mark>`);
  }

        g.students.forEach((s) => {
          records.push(Object.assign({}, s, {
            uni: u.name, uniShort: u.short || u.name, uniIndex: ui,
            month: g.month, program: g.label || ""
          }));
        });
      });
    });
    applySens();
  }

    { key: "program",   label: "프로그램",  kind: "prog", programCol: true },
    { key: "name",      label: "성명",     kind: "name", always: true },
    { key: "eng",       label: "영문명",    kind: "text" },
    { key: "gender",    label: "성별",     kind: "gender", always: true },
    { key: "dept",      label: "학과",     kind: "text" },
    { key: "studentId", label: "학번",     kind: "num",   sens: "hsid" },
    { key: "phone",     label: "연락처",    kind: "num",   sens: "hph" },
    { key: "email",     label: "이메일",    kind: "email", sens: "hem" },
    { key: "birth",     label: "생년월일",  kind: "num" },
    { key: "note",      label: "비고",     kind: "text" },
  ];

  function recordsForTab() {
    if (activeTab === "all") return records.slice();
    return records.filter((r) => r.uniIndex === activeTab);
  }
  function matches(r, q) {
    if (!q) return true;
    const keys = ["name", "eng", "dept", "birth", "note", "uni", "uniShort", "program"];
    if (sensShown) keys.push("studentId", "phone", "email");
    return keys.some((k) => (r[k] || "").toString().toLowerCase().includes(q));
  }
  function visibleColumns(rows, opts) {
    const distinctMonths = new Set(rows.map((r) => r.month));
    return COLUMNS.filter((c) => {
      if (c.always) return true;
      if (c.master) return opts.isMaster;
      if (c.monthCol) return opts.isMaster || distinctMonths.size > 1;
      if (c.programCol) return rows.some((r) => r.program);
      if (c.key === "idx") return true;
      if (c.sens) return rows.some((r) => r[c.sens]);
      return rows.some((r) => r[c.key]);
    });
  }
  function sortVal(r, c) {
    const v = r[c.key];
    if (c.key === "registered") return r.registered ? 1 : 0;
    if (c.kind === "num") return parseInt(String(v || "").replace(/\D/g, ""), 10) || 0;
    if (c.key === "month") return parseInt(v, 10) || 0;
    return (v || "").toString();
  }
  function applySort(rows, cols) {
    if (!sortKey) return rows;
    const c = cols.find((x) => x.key === sortKey);
    if (!c || c.nosort) return rows;
    const out = rows.slice();
    out.sort((a, b) => {
      const va = sortVal(a, c), vb = sortVal(b, c);
      if (typeof va === "number") return (va - vb) * sortDir;
      return va.localeCompare(vb, "ko") * sortDir;
    });
    return out;
  }
  function cellHtml(r, c, q) {
    if (c.sens) {
      if (!r[c.sens]) return "";
      if (!sensShown) return '<span class="sens-mask">••••••</span>';
      const v = r[c.key];
      if (!v) return '<span class="sens-mask">••••</span>';
      if (c.kind === "email") return `<a href="mailto:${escapeHtml(v)}">${highlight(v, q)}</a>`;
      return highlight(v, q);
    }
    if (c.kind === "reg") return r.registered
      ? '<span class="regtag"><iconify-icon icon="solar:check-circle-bold" inline></iconify-icon> 등록</span>'
      : '<span class="reg-no">–</span>';
    if (c.kind === "gender") {
      const m = r.gender === "M";
      return `<span class="gtag ${m ? "male" : "female"}">${m ? "남" : "여"}</span>`;
    }
    if (c.kind === "month") return `<span class="mtag m${r.month}">${r.month}월</span>`;
    if (c.kind === "uni") return `<span class="uni-cell">${highlight(r.uniShort, q)}</span>`;
    if (c.kind === "prog") return r.program ? `<span class="prog-tag">${escapeHtml(r.program)}</span>` : "";
    const v = r[c.key];
    if (!v) return "";
    return highlight(v, q);
  }

  function renderTable() {
    const q = query.trim().toLowerCase();
    const isMaster = activeTab === "all";
    let rows = recordsForTab().filter((r) => matches(r, q) && (!regOnly || r.registered));
    const cols = visibleColumns(recordsForTab(), { isMaster });
    rows = applySort(rows, cols);

    gridHead.innerHTML = "<tr>" + cols.map((c) => {
      const arr = sortKey === c.key ? `<span class="arr">${sortDir > 0 ? "▲" : "▼"}</span>` : "";
      const cls = c.nosort ? "nosort" : "";
      const dataAttr = c.nosort ? "" : ` data-sort="${c.key}"`;
      return `<th class="${cls}"${dataAttr}>${escapeHtml(c.label)}${arr}</th>`;
    }).join("") + "</tr>";

    if (rows.length === 0) {
      gridBody.innerHTML = ""; gridEmpty.style.display = "block";
    } else {
      gridEmpty.style.display = "none";
      gridBody.innerHTML = rows.map((r, i) => {
        const tds = cols.map((c) => {
          const cls = ["col-" + c.key];
          if (c.kind === "num" || c.kind === "idx") cls.push("num");
          const inner = c.kind === "idx" ? (i + 1) : cellHtml(r, c, q);
          return `<td class="${cls.join(" ")}">${inner}</td>`;
        }).join("");
        return `<tr class="${r.registered ? "reg-row" : ""}">${tds}</tr>`;
      }).join("");
    }

    const all = recordsForTab();
    let m = 0, f = 0, reg = 0; all.forEach((r) => { r.gender === "M" ? m++ : f++; if (r.registered) reg++; });
    const pend = (isMaster ? Object.values(pendingByUni).flat() : (pendingByUni[activeTab] || [])).reduce((a, p) => a + p.count, 0);
    tableTitle.textContent = isMaster ? "전체 명단" : data.universities[activeTab].name;
    const shownTxt = (q || regOnly) ? `${rows.length} / ${all.length}명` : `${all.length + pend}명`;
    tableSub.innerHTML = `${shownTxt} · <span class="gm">남 ${m}</span> · <span class="gf">여 ${f}</span>` +
      (pend ? ` · 미정 ${pend}` : "") + ` · <span class="reg-cnt">등록 ${reg}</span>`;

    const pends = isMaster
      ? Object.entries(pendingByUni).flatMap(([ui, arr]) => arr.map((p) => ({ uni: data.universities[ui].short, month: p.month, count: p.count, note: p.note })))
      : (pendingByUni[activeTab] || []).map((p) => ({ uni: data.universities[activeTab].short, month: p.month, count: p.count, note: p.note }));
    pendingHost.innerHTML = (!q && pends.length)
      ? pends.map((p) => `<div class="pending-banner"><iconify-icon icon="solar:clock-circle-bold-duotone"></iconify-icon>` +
          `${escapeHtml(p.uni)} ${escapeHtml(p.month)}월 — ${escapeHtml(p.note)} (${p.count}명, 인원수 포함)</div>`).join("")
      : "";
    searchClear.classList.toggle("visible", q.length > 0);
  }

  function computeTallies() {
    return data.universities.map((u) => {
      const t = { name: u.short || u.name, j: { M: 0, F: 0 }, a: { M: 0, F: 0 }, jPend: 0, aPend: 0, reg: 0 };
      u.groups.forEach((g) => {
        if (g.pending) { g.month === "7" ? (t.jPend += g.pending) : (t.aPend += g.pending); return; }
        const bucket = g.month === "7" ? t.j : t.a;
        g.students.forEach((s) => { bucket[s.gender === "M" ? "M" : "F"]++; if (s.registered) t.reg++; });
      });
      t.jTotal = t.j.M + t.j.F + t.jPend; t.aTotal = t.a.M + t.a.F + t.aPend;
      t.total = t.jTotal + t.aTotal; return t;
    });
  }
  function cell(v, cls) { return `<td class="${cls || ""}">${v}</td>`; }
  function renderPivot() {
    const rows = computeTallies();
    let hasPending = false, html = "";
    rows.forEach((r, i) => {
      const jp = r.jPend ? "<sup>*</sup>" : "", ap = r.aPend ? "<sup>*</sup>" : "";
      if (r.jPend || r.aPend) hasPending = true;
      html += `<tr data-nav="${i}" class="nav-row${activeTab === i ? " nav-active" : ""}">`;
      html += `<td class="uni">${escapeHtml(r.name)}</td>`;
      html += cell(r.jTotal ? (r.j.M || (r.jPend ? "–" : 0)) : "–", r.jTotal ? "male" : "dash");
      html += cell(r.jTotal ? (r.j.F || (r.jPend ? "–" : 0)) : "–", r.jTotal ? "female" : "dash");
      html += cell(r.jTotal ? (r.jTotal + jp) : "–", r.jTotal ? "sub" : "dash");
      html += cell(r.aTotal ? (r.a.M || (r.aPend ? "–" : 0)) : "–", (r.aTotal ? "male" : "dash") + " col-div");
      html += cell(r.aTotal ? (r.a.F || (r.aPend ? "–" : 0)) : "–", r.aTotal ? "female" : "dash");
      html += cell(r.aTotal ? (r.aTotal + ap) : "–", r.aTotal ? "sub" : "dash");
      html += cell(r.total, "sub col-div");
      html += cell(r.reg ? `<b style="color:#16a34a">${r.reg}</b>` : "–", "col-div " + (r.reg ? "" : "dash"));
      html += "</tr>";
    });
    const sum = rows.reduce((a, r) => {
      a.jM += r.j.M; a.jF += r.j.F; a.aM += r.a.M; a.aF += r.a.F; a.jPend += r.jPend; a.aPend += r.aPend; a.reg += r.reg; return a;
    }, { jM: 0, jF: 0, aM: 0, aF: 0, jPend: 0, aPend: 0, reg: 0 });
    const jTot = sum.jM + sum.jF + sum.jPend, aTot = sum.aM + sum.aF + sum.aPend;
    html += `<tr class="total-row nav-row${activeTab === "all" ? " nav-active" : ""}" data-nav="all"><td class="uni">전체</td>`;
    html += cell(sum.jM, "") + cell(sum.jF, "") + cell(jTot + (sum.jPend ? "<sup>*</sup>" : ""), "");
    html += cell(sum.aM, "col-div") + cell(sum.aF, "") + cell(aTot + (sum.aPend ? "<sup>*</sup>" : ""), "");
    html += cell(jTot + aTot, "col-div");
    html += cell(sum.reg ? `<b style="color:#16a34a">${sum.reg}</b>` : "0", "col-div");
    html += "</tr>";
    pivotBody.innerHTML = html;

    const totalPending = sum.jPend + sum.aPend;
    const navHint = "표에서 행(대학)을 누르면 아래에 해당 명단이 펼쳐집니다.";
    const regHint = `‘등록’ 열은 실제 등록 완료 인원입니다. 현재 등록 완료 <b style="color:#16a34a">${sum.reg}명</b> (순차 등록 중).`;
    pivotNote.innerHTML = (hasPending ? `<sup>*</sup> 백석대 8월 ${totalPending}명은 명단 미정(성별 미반영) — 인원수에는 포함. ` : "") + regHint + " " + navHint;

    $("sum-july").innerHTML = jTot + '<span class="unit">명</span><span class="gsplit">남 ' + sum.jM + ' · 여 ' + sum.jF + '</span>';
    $("sum-august").innerHTML = aTot + '<span class="unit">명</span><span class="gsplit">남 ' + sum.aM + ' · 여 ' + sum.aF + (sum.aPend ? ' · 미정 ' + sum.aPend : '') + '</span>';
    $("sum-total").innerHTML = (jTot + aTot) + '<span class="unit">명</span><span class="gsplit">' + data.universities.length + '개 대학</span>';
  }

  function setActiveTab(tab, scroll) {
    activeTab = tab;
    sortKey = null; sortDir = 1; query = ""; searchInput.value = "";
    regOnly = false; regToggle.classList.remove("active");
    renderPivot(); renderTable();
    if (scroll) tablePane.scrollIntoView({ behavior: "smooth", block: "start" });
  }

  function updateSensBtn() {
    const unlocked = !!sensMap;
    sensToggle.classList.toggle("active", unlocked && sensShown);
    sensLabel.textContent = (unlocked && sensShown) ? "학번·연락처 숨기기" : "학번·연락처 보기";
  }
  function openModal() { gate.style.display = "flex"; err.textContent = ""; pwInput.value = ""; setTimeout(() => pwInput.focus(), 50); }
  function closeModal() { gate.style.display = "none"; }
  async function unlockSens(password, silent) {
    err.textContent = ""; btn.disabled = true; btnLabel.textContent = "확인 중...";
    try {
      const obj = await decrypt(BLOB_SENS, password);
      sensMap = obj.map || obj;
      applySens();
      sensShown = !silent;
      try { sessionStorage.setItem(SS_SENS, password); } catch (_) {}
      closeModal(); updateSensBtn(); renderTable();
    } catch (e) {
      if (silent) { try { sessionStorage.removeItem(SS_SENS); } catch (_) {} }
      else { err.textContent = "비밀번호가 올바르지 않습니다."; pwInput.value = ""; pwInput.focus(); }
    } finally { btn.disabled = false; btnLabel.textContent = "확인"; }
  }

  form.addEventListener("submit", (e) => { e.preventDefault(); const pw = pwInput.value; if (pw) unlockSens(pw, false); });
  gateCancel.addEventListener("click", closeModal);
  gate.addEventListener("click", (e) => { if (e.target === gate) closeModal(); });

  sensToggle.addEventListener("click", () => {
    if (!sensMap) { openModal(); return; }
    sensShown = !sensShown; updateSensBtn(); renderTable();
  });

  pivotBody.addEventListener("click", (e) => {
    const tr = e.target.closest("tr[data-nav]"); if (!tr) return;
    const nav = tr.getAttribute("data-nav");
    setActiveTab(nav === "all" ? "all" : parseInt(nav, 10), true);
  });
  gridHead.addEventListener("click", (e) => {
    const th = e.target.closest("th"); if (!th) return;
    const key = th.getAttribute("data-sort"); if (!key) return;
    if (sortKey === key) sortDir = -sortDir; else { sortKey = key; sortDir = 1; }
    renderTable();
  });
  searchInput.addEventListener("input", (e) => { query = e.target.value; renderTable(); });
  searchClear.addEventListener("click", () => { query = ""; searchInput.value = ""; renderTable(); searchInput.focus(); });
  regToggle.addEventListener("click", () => { regOnly = !regOnly; regToggle.classList.toggle("active", regOnly); renderTable(); });

  (async function init() {
    try { data = await decrypt(BLOB_BASIC, BASIC_KEY); }
    catch (e) { document.getElementById("roster").innerHTML = '<p style="text-align:center;padding:140px 20px;color:var(--text-faint)">명단을 불러오지 못했습니다.</p>'; return; }
    flatten();
    setActiveTab("all", false);
    try { const sp = sessionStorage.getItem(SS_SENS); if (sp) unlockSens(sp, true); } catch (_) {}
  })();
})();
</script>
</body>
</html>
