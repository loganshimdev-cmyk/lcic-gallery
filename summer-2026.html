<style>
  .gate-wrap {
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 120px 20px 60px;
  }
  .gate-card { max-width: 420px; width: 100%; }
  .gate-card .bezel-inner { padding: 36px 32px; }
  .gate-icon {
    width: 64px; height: 64px; border-radius: 999px;
    background: var(--accent-soft); color: var(--accent-deep);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; margin: 0 auto 20px;
  }
  .gate-title {
    text-align: center; font-size: 1.35rem; font-weight: 600;
    letter-spacing: -0.01em; margin-bottom: 8px;
  }
  .gate-sub {
    text-align: center; color: var(--text-dim);
    font-size: 0.92rem; line-height: 1.55; margin-bottom: 24px;
  }
  .gate-form { display: flex; flex-direction: column; gap: 12px; }
  .gate-input {
    width: 100%; padding: 14px 16px;
    border: 1px solid var(--hairline-strong);
    border-radius: 14px;
    background: var(--bg-elev);
    font-family: inherit; font-size: 1rem;
    color: var(--text);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .gate-input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-soft);
  }
  .gate-btn {
    width: 100%; padding: 14px 16px;
    border: none; border-radius: 14px;
    background: var(--accent); color: white;
    font-family: inherit; font-size: 1rem; font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, transform 0.05s;
    box-shadow: var(--shadow-accent);
  }
  .gate-btn:hover { background: var(--accent-hover); }
  .gate-btn:active { transform: translateY(1px); }
  .gate-btn[disabled] { opacity: 0.55; cursor: not-allowed; transform: none; }
  .gate-err {
    color: #dc2626; font-size: 0.86rem;
    text-align: center; min-height: 20px;
  }

  .summary-row {
    display: flex; gap: 12px;
    margin-bottom: 24px;
  }
  .summary-card {
    flex: 1;
    background: var(--bg-elev);
    border: 1px solid var(--hairline);
    border-radius: 18px;
    padding: 18px 22px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: var(--shadow-sm);
  }
  .summary-card.total {
    background: var(--accent-soft);
    border-color: transparent;
  }
  .summary-label {
    font-size: 0.92rem; font-weight: 600;
    color: var(--text-dim);
    display: flex; align-items: baseline; gap: 6px;
  }
  .summary-card.total .summary-label { color: var(--accent-deep); }
  .summary-value {
    font-size: 1.9rem; font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
  }
  .summary-card.total .summary-value { color: var(--accent-deep); }
  .summary-value .unit {
    font-size: 0.9rem; font-weight: 600;
    color: var(--text-faint);
    margin-left: 2px;
  }
  .summary-card.total .summary-value .unit { color: var(--accent-deep); opacity: 0.7; }
  @media (max-width: 520px) {
    .summary-row { flex-wrap: wrap; }
    .summary-card { padding: 14px 18px; }
    .summary-value { font-size: 1.6rem; }
  }

  .search-bar {
    position: sticky; top: 90px; z-index: 5;
    background: var(--bg-elev);
    border: 1px solid var(--hairline);
    border-radius: 18px;
    padding: 4px 8px 4px 16px;
    display: flex; align-items: center; gap: 10px;
    box-shadow: var(--shadow-sm);
    margin-bottom: 32px;
  }
  .search-bar iconify-icon { color: var(--text-faint); font-size: 20px; flex: 0 0 auto; }
  .search-bar input {
    flex: 1; min-width: 0;
    border: none; outline: none;
    background: transparent;
    font-family: inherit; font-size: 1rem;
    padding: 12px 0;
    color: var(--text);
  }
  .search-bar input::placeholder { color: var(--text-faint); }
  .clear-btn {
    border: none; background: transparent;
    color: var(--text-faint); cursor: pointer;
    padding: 6px; border-radius: 999px;
    display: none; align-items: center; justify-content: center;
  }
  .clear-btn.visible { display: flex; }
  .clear-btn:hover { color: var(--text); background: var(--surface); }

  .month-section { margin-bottom: 56px; }
  .month-head {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 18px; padding: 0 4px;
  }
  .month-title {
    font-size: 1.6rem; font-weight: 600; letter-spacing: -0.01em;
    display: flex; align-items: baseline; gap: 12px;
  }
  .month-title .num {
    font-size: 2rem; font-weight: 700;
    color: var(--accent); letter-spacing: -0.02em;
  }
  .month-count {
    color: var(--text-faint); font-size: 0.85rem;
    font-variant-numeric: tabular-nums;
  }

  .roster-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
  }
  .student-card {
    background: var(--bg-elev);
    border: 1px solid var(--hairline);
    border-radius: 16px;
    padding: 16px 18px;
    transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
  }
  .student-card:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
  }
  .student-name {
    font-size: 1.05rem; font-weight: 600;
    letter-spacing: -0.005em;
    margin-bottom: 4px;
  }
  .student-dept {
    font-size: 0.85rem;
    color: var(--text-dim);
    line-height: 1.45;
  }
  .student-note {
    margin-top: 6px;
    font-size: 0.75rem;
    color: var(--text-faint);
    font-style: italic;
  }

  mark.hl {
    background: var(--accent-soft);
    color: var(--accent-deep);
    border-radius: 4px;
    padding: 0 2px;
  }

  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--text-faint);
  }
  .empty-state iconify-icon { font-size: 40px; opacity: 0.5; }
  .empty-state div { margin-top: 12px; font-size: 0.95rem; }

  .footer-meta {
    text-align: center;
    color: var(--text-faint);
    font-size: 0.78rem;
    padding: 40px 20px 80px;
    letter-spacing: 0.02em;
  }
  .footer-meta button {
    background: none; border: none;
    color: var(--text-faint); cursor: pointer;
    font: inherit; padding: 4px 8px;
    border-radius: 8px;
  }
  .footer-meta button:hover { color: var(--text); background: var(--surface); }
</style>
</head>

<!-- 비밀번호 게이트 -->
<section id="gate" class="gate-wrap">
  <div class="bezel gate-card fade-up">
    <div class="bezel-inner">
      <div class="gate-icon">
        <iconify-icon icon="solar:lock-keyhole-bold-duotone"></iconify-icon>
      </div>
      <div class="gate-title">2026 Summer Program</div>
      <div class="gate-sub">7·8월 배정 명단입니다.<br>전달받으신 비밀번호를 입력해 주세요.</div>
      <form id="gate-form" class="gate-form" autocomplete="off">
        <input
          id="gate-pw"
          class="gate-input"
          type="password"
          inputmode="numeric"
          placeholder="비밀번호"
          autocomplete="off"
          autofocus
          required
        >
        <button id="gate-btn" class="gate-btn" type="submit">
          <span id="gate-btn-label">확인</span>
        </button>
        <div id="gate-err" class="gate-err" role="alert"></div>
      </form>
    </div>
  </div>
</section>

<!-- 명단 본문 (복호화 성공 후 표시) -->
<main id="roster" class="container-narrow" style="padding: 130px 20px 0; display: none;">
  <header class="fade-up" style="text-align: center; margin-bottom: 36px;">
    <span class="eyebrow"><span class="dot"></span> SUMMER 2026</span>
    <h1 class="headline" style="margin-top: 18px;">학생 배정 명단</h1>
    <p class="subhead">7월 · 8월 입교 학생 명단입니다.</p>
  </header>

  <div class="summary-row fade-up delay-1">
    <div class="summary-card">
      <span class="summary-label"><span class="num" style="color:var(--accent);font-weight:700;">7</span>월 입교</span>
      <span class="summary-value" id="sum-july">–<span class="unit">명</span></span>
    </div>
    <div class="summary-card">
      <span class="summary-label"><span class="num" style="color:var(--accent);font-weight:700;">8</span>월 입교</span>
      <span class="summary-value" id="sum-august">–<span class="unit">명</span></span>
    </div>
    <div class="summary-card total">
      <span class="summary-label">전체</span>
      <span class="summary-value" id="sum-total">–<span class="unit">명</span></span>
    </div>
  </div>

  <div class="search-bar fade-up delay-1">
    <iconify-icon icon="solar:magnifer-linear"></iconify-icon>
    <input id="search" type="search" placeholder="이름 또는 학과 검색" autocomplete="off">
    <button id="search-clear" class="clear-btn" type="button" aria-label="검색어 지우기">
      <iconify-icon icon="solar:close-circle-bold" style="font-size: 18px;"></iconify-icon>
    </button>
  </div>

  <section id="july-section" class="month-section fade-up delay-2">
    <div class="month-head">
      <div class="month-title"><span class="num">7</span><span>월 입교</span></div>
      <div class="month-count" id="july-count"></div>
    </div>
    <div id="july-grid" class="roster-grid"></div>
    <div id="july-empty" class="empty-state" style="display:none;">
      <iconify-icon icon="solar:inbox-bold-duotone"></iconify-icon>
      <div>검색 결과가 없습니다.</div>
    </div>
  </section>

  <section id="august-section" class="month-section fade-up delay-3">
    <div class="month-head">
      <div class="month-title"><span class="num">8</span><span>월 입교</span></div>
      <div class="month-count" id="august-count"></div>
    </div>
    <div id="august-grid" class="roster-grid"></div>
    <div id="august-empty" class="empty-state" style="display:none;">
      <iconify-icon icon="solar:inbox-bold-duotone"></iconify-icon>
      <div>검색 결과가 없습니다.</div>
    </div>
  </section>

  <div class="footer-meta">
    Lapulapu Cebu International College · 2026 Summer Program
    <br>
    <button id="logout" type="button">
      <iconify-icon icon="solar:logout-2-linear" inline></iconify-icon> 잠그기
    </button>
  </div>
</main>

    for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
    return arr;
  }

  async function decrypt(password) {
    const raw = b64ToBytes(BLOB);
    const salt = raw.slice(0, 16);
    const iv = raw.slice(16, 28);
    const tag = raw.slice(28, 44);
    const ct = raw.slice(44);

    // SubtleCrypto AES-GCM expects ciphertext with auth tag appended
    const ctWithTag = new Uint8Array(ct.length + tag.length);
    ctWithTag.set(ct);
    ctWithTag.set(tag, ct.length);

    const pwKey = await crypto.subtle.importKey(
      "raw",
      new TextEncoder().encode(password),
      "PBKDF2",
      false,
      ["deriveKey"]
    );
    const key = await crypto.subtle.deriveKey(
      { name: "PBKDF2", salt, iterations: PBKDF2_ITER, hash: "SHA-256" },
      pwKey,
      { name: "AES-GCM", length: 256 },
      false,
      ["decrypt"]
    );
    const plain = await crypto.subtle.decrypt(
      { name: "AES-GCM", iv },
      key,
      ctWithTag
    );
    return JSON.parse(new TextDecoder().decode(plain));
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
    }[c]));
  }

  function highlight(text, query) {
    const safe = escapeHtml(text);
    if (!query) return safe;
    const q = query.trim();
    if (!q) return safe;
    const pattern = q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    return safe.replace(new RegExp(pattern, "gi"), (m) => `<mark class="hl">${m}</mark>`);
  }

  function renderGrid(grid, students, query) {
    grid.innerHTML = "";
    const frag = document.createDocumentFragment();
    students.forEach((s) => {
      const card = document.createElement("div");
      card.className = "student-card";
      const name = document.createElement("div");
      name.className = "student-name";
      name.innerHTML = highlight(s.name, query);
      const dept = document.createElement("div");
      dept.className = "student-dept";
      dept.innerHTML = highlight(s.dept, query);
      card.appendChild(name);
      card.appendChild(dept);
      if (s.note) {
        const note = document.createElement("div");
        note.className = "student-note";
        note.textContent = s.note;
        card.appendChild(note);
      }
      frag.appendChild(card);
    });
    grid.appendChild(frag);
  }

  function render(query) {
    if (!data) return;
    const q = (query || "").trim().toLowerCase();
    const filter = (rows) => {
      if (!q) return rows;
      return rows.filter((r) =>
        r.name.toLowerCase().includes(q) ||
        r.dept.toLowerCase().includes(q) ||
        (r.note || "").toLowerCase().includes(q)
      );
    };
    const j = filter(data.july);
    const a = filter(data.august);

    renderGrid(julyGrid, j, q);
    renderGrid(augustGrid, a, q);

    julyEmpty.style.display = j.length === 0 ? "block" : "none";
    augustEmpty.style.display = a.length === 0 ? "block" : "none";
    julyGrid.style.display = j.length === 0 ? "none" : "grid";
    augustGrid.style.display = a.length === 0 ? "none" : "grid";

    if (q) {
      julyCount.textContent = `${j.length} / ${data.july.length}명`;
      augustCount.textContent = `${a.length} / ${data.august.length}명`;
    } else {
      julyCount.textContent = `${data.july.length}명`;
      augustCount.textContent = `${data.august.length}명`;
    }
    searchClear.classList.toggle("visible", q.length > 0);
  }

  function showRoster() {
    gate.style.display = "none";
    roster.style.display = "block";
    if (data) {
      const total = data.july.length + data.august.length;
      document.getElementById("sum-july").innerHTML = data.july.length + '<span class="unit">명</span>';
      document.getElementById("sum-august").innerHTML = data.august.length + '<span class="unit">명</span>';
      document.getElementById("sum-total").innerHTML = total + '<span class="unit">명</span>';
    }
    render("");
    setTimeout(() => searchInput.focus({ preventScroll: true }), 50);
  }

  async function tryUnlock(password, fromStorage) {
    err.textContent = "";
    btn.disabled = true;
    btnLabel.textContent = "확인 중...";
    try {
      data = await decrypt(password);
      try { sessionStorage.setItem(SS_KEY, password); } catch (_) {}
      showRoster();
    } catch (e) {
      if (fromStorage) {
        try { sessionStorage.removeItem(SS_KEY); } catch (_) {}
      } else {
        err.textContent = "비밀번호가 올바르지 않습니다.";
        pwInput.value = "";
        pwInput.focus();
      }
    } finally {
      btn.disabled = false;
      btnLabel.textContent = "확인";
    }
  }

  form.addEventListener("submit", (e) => {
    e.preventDefault();
    const pw = pwInput.value;
    if (!pw) return;
    tryUnlock(pw, false);
  });

  searchInput.addEventListener("input", (e) => render(e.target.value));
  searchClear.addEventListener("click", () => {
    searchInput.value = "";
    render("");
    searchInput.focus();
  });

  logoutBtn.addEventListener("click", () => {
    try { sessionStorage.removeItem(SS_KEY); } catch (_) {}
    data = null;
    roster.style.display = "none";
    gate.style.display = "flex";
    pwInput.value = "";
    err.textContent = "";
    setTimeout(() => pwInput.focus(), 50);
  });

  // Auto-unlock if sessionStorage already has a valid password
  try {
    const saved = sessionStorage.getItem(SS_KEY);
    if (saved) tryUnlock(saved, true);
  } catch (_) {}
})();
</script>
