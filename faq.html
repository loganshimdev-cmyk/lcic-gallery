<style>
  .search-wrap {
    position: relative;
    margin-bottom: 32px;
  }
  .search-wrap iconify-icon {
    position: absolute;
    top: 50%; left: 20px;
    transform: translateY(-50%);

    font-size: 18px;
    pointer-events: none;

  .search-wrap input {

  }

  .faq-cat-title {
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 36px 0 14px;
    padding-left: 4px;
    scroll-margin-top: 100px;
  }
  .faq-cat-title:first-of-type { margin-top: 0; }

  /* 카테고리 빠른 이동 칩 */
  .cat-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 28px;
    padding: 14px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--hairline);
    border-radius: 18px;

  .cat-chip {
    padding: 7px 14px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid var(--hairline);
    color: var(--text-dim);
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    font-family: inherit;
    white-space: nowrap;
  }
  .cat-chip:hover {
    background: rgba(233, 69, 96, 0.15);
    border-color: rgba(233, 69, 96, 0.4);
    color: var(--text);
    transform: translateY(-1px);
  }
  .cat-chip .count {
    margin-left: 6px;
    opacity: 0.6;
    font-size: 0.75rem;
  }
  .cat-nav.hidden { display: none; }

  .faq-item {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--hairline);
    border-radius: 18px;
    overflow: hidden;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    margin-bottom: 8px;
  }
  .faq-item:hover {
    background: rgba(255, 255, 255, 0.05);
    border-color: var(--hairline-strong);
  }
  .faq-item[open] {
    background: rgba(255, 255, 255, 0.04);
    border-color: rgba(233, 69, 96, 0.25);
  }
  .faq-item summary {
    list-style: none;
    cursor: pointer;
    padding: 18px 22px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--text);
    transition: color 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .faq-item summary::-webkit-details-marker { display: none; }
  .faq-item summary .icon-wrap {
    flex-shrink: 0;
    width: 32px; height: 32px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.05);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .faq-item[open] summary .icon-wrap {
    background: var(--accent);
    transform: rotate(45deg);
  }
  .faq-item[open] summary .icon-wrap iconify-icon { color: #fff; }
  .faq-item .answer {
    padding: 4px 22px 22px 22px;
    color: var(--text-dim);
    font-size: 0.92rem;
    line-height: 1.75;
    white-space: pre-wrap;
    border-top: 1px solid var(--hairline);
    margin-top: 0;
    padding-top: 18px;
  }
  .faq-untranslated-note {
    margin-bottom: 12px;
    padding: 8px 12px;
    border-radius: 8px;
    background: var(--accent-tint);
    border: 1px solid var(--accent-soft);
    color: var(--accent-deep);
    font-size: 0.78rem;
    line-height: 1.5;
    white-space: normal;
  }

<header style="padding: 140px 20px 60px; text-align: center;">
  <div class="fade-up">
    <span class="eyebrow"><span class="dot"></span> FREQUENTLY ASKED</span>
  </div>
  <h1 class="headline fade-up delay-1" style="margin-top: 24px;" data-i18n-en="FAQ" data-i18n-zh="常見問題" data-i18n-ja="よくある質問">궁금한 사항</h1>
  <p class="subhead fade-up delay-2" data-i18n-en="Frequently asked questions, grouped by topic." data-i18n-zh="依主題分類整理的常見問題與解答。" data-i18n-ja="よくある質問をテーマ別にまとめました。">자주 묻는 질문과 답변을 카테고리별로 정리했습니다.</p>
</header>

<main class="container-narrow" style="padding-bottom: 120px;">
  <div class="search-wrap fade-up delay-3">
    <iconify-icon icon="solar:magnifer-linear"></iconify-icon>
    <input type="text" id="search" class="input" placeholder="질문 또는 답변에서 검색…" data-i18n-en-attr="placeholder|Search questions or answers…" data-i18n-zh-attr="placeholder|搜尋問題或答案…" data-i18n-ja-attr="placeholder|質問や回答を検索…">
  </div>

  <div id="cat-nav" class="cat-nav fade-up delay-3"></div>

  <div id="list" class="fade-up delay-4">
    <div style="text-align:center; padding: 60px 20px; color: var(--text-faint);">
      <iconify-icon icon="svg-spinners:ring-resize" inline style="font-size: 24px;"></iconify-icon>
    </div>
  </div>
</main>

<script type="module">
import { supabase } from "./assets/supabase.js?v=2";

const listEl = document.getElementById("list");
const searchEl = document.getElementById("search");
const catNavEl = document.getElementById("cat-nav");
let allFaqs = [];

const lang = () => (window.lcicLang && window.lcicLang.current) || "ko";
const isEn = () => lang() === "en";
const isZh = () => lang() === "zh";
const isJa = () => lang() === "ja";
const t = (ko, en, zh, ja) => {
  const cur = lang();
  if (cur === "ja") return (ja !== undefined && ja !== "") ? ja : ((zh !== undefined && zh !== "") ? zh : (en || ko));
  if (cur === "zh") return (zh !== undefined && zh !== "") ? zh : (en || ko);
  if (cur === "en") return en || ko;
  return ko;
};
const fallbackCat = () => t("기타", "Other", "其他", "その他");

// Prefer the active-language column (`<base>_ja`, `<base>_zh`, or `<base>_en`)
// and fall back silently through the other translations to the Korean source —
// so admins can fill translations into the DB row-by-row without breaking the page.
function pickField(row, base) {
  if (!row) return "";
  const tryKey = (key) => {
    const v = row[key];
    return (v !== undefined && v !== null && String(v).trim() !== "") ? v : null;
  };
  if (isJa()) {
    return tryKey(base + "_ja") || tryKey(base + "_zh") || tryKey(base + "_en") || (row[base] ?? "");
  }
  if (isZh()) {
    return tryKey(base + "_zh") || tryKey(base + "_en") || (row[base] ?? "");
  }
  if (isEn()) {
    return tryKey(base + "_en") || (row[base] ?? "");
  }
  return row[base] ?? "";
}
const pickCategory = (f) => pickField(f, "category") || fallbackCat();
const pickQuestion = (f) => pickField(f, "question");
const pickAnswer   = (f) => pickField(f, "answer");

// Anchor IDs stay tied to the Korean source so jump-to-category links keep
// working when the user switches languages.
function slugifyCatKey(koCat) {
  return "cat-" + (koCat || "etc").replace(/[^\w가-힣]+/g, "-");
}

// For a group of FAQs that share the same Korean category, pick the first
// non-empty `category_<lang>` to use as the localized label. Falls back to the
// other translation first, then to the Korean source.
function groupCategoryLabel(items) {
  const firstNonEmpty = (key) => {
    for (const f of items) {
      const v = f[key];
      if (v !== undefined && v !== null && String(v).trim() !== "") return v;
    }
    return null;
  };
  if (isJa()) {
    return firstNonEmpty("category_ja") || firstNonEmpty("category_zh") || firstNonEmpty("category_en") || items[0]?.category || fallbackCat();
  }
  if (isZh()) {
    return firstNonEmpty("category_zh") || firstNonEmpty("category_en") || items[0]?.category || fallbackCat();
  }
  if (isEn()) {
    return firstNonEmpty("category_en") || items[0]?.category || fallbackCat();
  }
  return items[0]?.category || fallbackCat();
}

function renderCatNav(faqs) {
  // Group by the Korean category key so the chip menu stays stable across languages.
  const groups = new Map();
  faqs.forEach((f) => {
    const key = f.category || "";
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(f);
  });

  catNavEl.innerHTML = "";
  catNavEl.classList.remove("hidden");
  groups.forEach((items, koCat) => {
    const label = groupCategoryLabel(items);
    const btn = document.createElement("button");
    btn.className = "cat-chip";
    btn.type = "button";
    btn.innerHTML = `<span class="cat-chip-label"></span><span class="count">${items.length}</span>`;
    btn.querySelector(".cat-chip-label").textContent = label;
    btn.addEventListener("click", () => {
      const target = document.getElementById(slugifyCatKey(koCat));
      if (target) target.scrollIntoView({ behavior: "smooth", block: "start" });
    });
    catNavEl.appendChild(btn);
  });
}

function emptyState(msg, icon = "solar:inbox-bold-duotone") {
  return `<div style="text-align:center; padding: 80px 20px; color: var(--text-faint);">
    <iconify-icon icon="${icon}" style="font-size: 48px; opacity: 0.5;"></iconify-icon>
    <div style="margin-top: 16px;">${msg}</div>
  </div>`;
}

function hasTranslation(row, base, suffix) {
  const v = row?.[base + "_" + suffix];
  return v !== undefined && v !== null && String(v).trim() !== "";
}

function appendFaqItem(parent, f) {
  const details = document.createElement("details");
  details.className = "faq-item";
  const summary = document.createElement("summary");
  summary.innerHTML = `
    <span></span>
    <span class="icon-wrap"><iconify-icon icon="solar:add-circle-linear" style="font-size: 18px; color: var(--text-dim);"></iconify-icon></span>
  `;
  summary.querySelector("span").textContent = pickQuestion(f);
  const answer = document.createElement("div");
  answer.className = "answer";
  answer.textContent = pickAnswer(f);

  // If the active language is missing either question or answer, show a small
  // inline note so the reader knows we're falling back. The fallback text
  // (English, or Korean as a last resort) is still readable below.
  let missing = false;
  let noteText = "";
  if (isJa() && (!hasTranslation(f, "question", "ja") || !hasTranslation(f, "answer", "ja"))) {
    missing = true;
    const hasZh = hasTranslation(f, "question", "zh") && hasTranslation(f, "answer", "zh");
    const hasEn = hasTranslation(f, "question", "en") && hasTranslation(f, "answer", "en");
    noteText = hasZh
      ? "日本語訳は近日公開 — ひとまず中国語版を表示しています。"
      : (hasEn
        ? "日本語訳は近日公開 — ひとまず英語版を表示しています。"
        : "日本語訳は近日公開 — ひとまず韓国語版を表示しています。");
  } else if (isZh() && (!hasTranslation(f, "question", "zh") || !hasTranslation(f, "answer", "zh"))) {
    missing = true;
    const hasEn = hasTranslation(f, "question", "en") && hasTranslation(f, "answer", "en");
    noteText = hasEn
      ? "中文翻譯即將上線 — 暫時顯示英文版本。"
      : "中文翻譯即將上線 — 暫時顯示韓文版本。";
  } else if (isEn() && (!hasTranslation(f, "question", "en") || !hasTranslation(f, "answer", "en"))) {
    missing = true;
    noteText = "English translation coming soon — showing the Korean version for now.";
  }
  if (missing) {
    const note = document.createElement("div");
    note.className = "faq-untranslated-note";
    note.textContent = noteText;
    answer.insertBefore(note, answer.firstChild);
  }

  details.appendChild(summary);
  details.appendChild(answer);
  parent.appendChild(details);
}

function renderGrouped(faqs) {
  // No search active: group by the Korean category key (display label is localized).
  const groups = new Map();
  faqs.forEach((f) => {
    const key = f.category || "";
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(f);
  });

  listEl.innerHTML = "";
  groups.forEach((items, koCat) => {
    const title = document.createElement("div");
    title.className = "faq-cat-title";
    title.id = slugifyCatKey(koCat);
    title.textContent = groupCategoryLabel(items);
    listEl.appendChild(title);
    items.forEach((f) => appendFaqItem(listEl, f));
  });
}

function renderRanked(scored) {
  if (!scored || scored.length === 0) {
    listEl.innerHTML = emptyState(t("검색 결과가 없습니다.", "No matching questions.", "找不到相符的問題。", "該当する質問が見つかりませんでした。"), "solar:magnifer-linear");
    return;
  }
  listEl.innerHTML = "";
  scored.forEach(({ faq }) => appendFaqItem(listEl, faq));
}

function scoreFaq(f, q) {
  const ql = q;
  // Search across the currently-visible language so users can type English
  // queries against the English content.
  const question = (pickQuestion(f) || "").toLowerCase();
  const answer   = (pickAnswer(f)   || "").toLowerCase();
  const category = (pickCategory(f) || "").toLowerCase();

  let score = 0;
  if (question.includes(ql)) {
    score += 100;
    if (question.startsWith(ql)) score += 20;
  }
  if (category.includes(ql)) score += 30;
  if (answer.includes(ql)) {
    score += 10;
    const matches = answer.split(ql).length - 1;
    score += Math.min(matches, 10);
  }
  return score;
}

function applyFilter() {
  const q = searchEl.value.trim().toLowerCase();
  if (!q) {
    renderGrouped(allFaqs);
    catNavEl.classList.remove("hidden");
    return;
  }

  const scored = allFaqs
    .map((faq) => ({ faq, score: scoreFaq(faq, q) }))
    .filter((x) => x.score > 0)
    .sort((a, b) => b.score - a.score);

  renderRanked(scored);
  catNavEl.classList.add("hidden");
}

function render(faqs) {
  if (!faqs || faqs.length === 0) {
    listEl.innerHTML = emptyState(t("아직 등록된 FAQ가 없습니다.", "No FAQs have been posted yet.", "目前還沒有任何常見問題。", "まだ登録されている FAQ はありません。"));
    catNavEl.classList.add("hidden");
    return;
  }
  renderCatNav(faqs);
  renderGrouped(faqs);
}

searchEl.addEventListener("input", applyFilter);

document.addEventListener("lcic:langchange", () => {
  if (!allFaqs.length) return;
  // Re-render the chip menu too if it's currently visible (no active search).
  if (!searchEl.value.trim()) renderCatNav(allFaqs);
  applyFilter();
});

async function loadFaqs() {
  const { data, error } = await supabase
    .from("faqs")
    .select("*")
    .order("category", { ascending: true, nullsFirst: false })
    .order("sort_order", { ascending: true })
    .order("created_at", { ascending: true });

  if (error) {
    listEl.innerHTML = emptyState(t(`불러오기 실패: ${error.message}`, `Failed to load: ${error.message}`, `載入失敗:${error.message}`, `読み込みに失敗しました:${error.message}`), "solar:danger-triangle-bold-duotone");
    return;
  }
  if (!data || data.length === 0) {
    listEl.innerHTML = emptyState(t("아직 등록된 FAQ가 없습니다.", "No FAQs have been posted yet.", "目前還沒有任何常見問題。", "まだ登録されている FAQ はありません。"));
    return;
  }

  allFaqs = data;
  render(allFaqs);
}

loadFaqs();
</script>
