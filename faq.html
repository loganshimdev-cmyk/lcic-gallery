<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>궁금한 사항 · LCIC</title>
<link rel="icon" type="image/png" href="assets/brand/lcic-logo.png">
<script src="assets/background.js?v=8"></script>
<link rel="stylesheet" href="assets/shared.css?v=8">
<script src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
<style>
  .search-wrap {
    position: relative;
    margin-bottom: 32px;
  }
  .search-wrap iconify-icon {
    position: absolute;
    top: 50%; left: 20px;
    transform: translateY(-50%);
    color: var(--text-faint);
    font-size: 18px;
    pointer-events: none;
  }
  .search-wrap input {
    padding-left: 50px;
    border-radius: 999px;
  }

  .faq-cat-title {
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 36px 0 14px;
    padding-left: 4px;
    scroll-margin-top: 100px;
  }
  .faq-cat-title:first-of-type { margin-top: 0; }

  /* 카테고리 빠른 이동 칩 */
  .cat-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 28px;
    padding: 14px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--hairline);
    border-radius: 18px;
  }
  .cat-chip {
    padding: 7px 14px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid var(--hairline);
    color: var(--text-dim);
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    font-family: inherit;
    white-space: nowrap;
  }
  .cat-chip:hover {
    background: rgba(233, 69, 96, 0.15);
    border-color: rgba(233, 69, 96, 0.4);
    color: var(--text);
    transform: translateY(-1px);
  }
  .cat-chip .count {
    margin-left: 6px;
    opacity: 0.6;
    font-size: 0.75rem;
  }
  .cat-nav.hidden { display: none; }

  /* Back to top 플로팅 버튼 */
  .back-to-top {
    position: fixed;
    right: 28px;
    bottom: 28px;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    border: none;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(233, 69, 96, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    opacity: 0;
    visibility: hidden;
    transform: translateY(10px);
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    z-index: 50;
  }
  .back-to-top.visible {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
  }
  .back-to-top:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(233, 69, 96, 0.55);
  }
  @media (max-width: 640px) {
    .back-to-top {
      right: 16px;
      bottom: 16px;
      width: 44px;
      height: 44px;
    }
  }

  .faq-item {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--hairline);
    border-radius: 18px;
    overflow: hidden;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    margin-bottom: 8px;
  }
  .faq-item:hover {
    background: rgba(255, 255, 255, 0.05);
    border-color: var(--hairline-strong);
  }
  .faq-item[open] {
    background: rgba(255, 255, 255, 0.04);
    border-color: rgba(233, 69, 96, 0.25);
  }
  .faq-item summary {
    list-style: none;
    cursor: pointer;
    padding: 18px 22px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--text);
    transition: color 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .faq-item summary::-webkit-details-marker { display: none; }
  .faq-item summary .icon-wrap {
    flex-shrink: 0;
    width: 32px; height: 32px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.05);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .faq-item[open] summary .icon-wrap {
    background: var(--accent);
    transform: rotate(45deg);
  }
  .faq-item[open] summary .icon-wrap iconify-icon { color: #fff; }
  .faq-item .answer {
    padding: 4px 22px 22px 22px;
    color: var(--text-dim);
    font-size: 0.92rem;
    line-height: 1.75;
    white-space: pre-wrap;
    border-top: 1px solid var(--hairline);
    margin-top: 0;
    padding-top: 18px;
  }
</style>
</head>
<body>

<a class="brand-mark" href="index.html" aria-label="LCIC 홈으로">
  <img src="assets/brand/lcic-logo.png" alt="LCIC 로고">
  <span class="brand-name">
    <span>Lapulapu Cebu</span>
    <span>International</span>
    <span>College</span>
  </span>
</a>

<nav class="nav-pill">
  <a href="index.html"><iconify-icon icon="solar:home-2-bold-duotone" inline></iconify-icon> 홈</a>
  <a href="notice.html"><iconify-icon icon="solar:bell-bold" inline></iconify-icon> 공지사항</a>
  <a href="procedure.html"><iconify-icon icon="solar:list-check-bold-duotone" inline></iconify-icon> 입학 절차</a>
  <a href="curriculum.html"><iconify-icon icon="solar:notebook-bold-duotone" inline></iconify-icon> 커리큘럼</a>
  <a href="life-guide.html"><iconify-icon icon="solar:book-bookmark-bold-duotone" inline></iconify-icon> 생활백서</a>
  <a href="faq.html" class="active"><iconify-icon icon="solar:question-circle-bold-duotone" inline></iconify-icon> 궁금한 사항</a>
    <a href="gallery.html"><iconify-icon icon="solar:gallery-bold-duotone" inline></iconify-icon> 갤러리</a>
</nav>

<header style="padding: 140px 20px 60px; text-align: center;">
  <div class="fade-up">
    <span class="eyebrow"><span class="dot"></span> FREQUENTLY ASKED</span>
  </div>
  <h1 class="headline fade-up delay-1" style="margin-top: 24px;">궁금한 사항</h1>
  <p class="subhead fade-up delay-2">자주 묻는 질문과 답변을 카테고리별로 정리했습니다.</p>
</header>

<main class="container-narrow" style="padding-bottom: 120px;">
  <div class="search-wrap fade-up delay-3">
    <iconify-icon icon="solar:magnifer-linear"></iconify-icon>
    <input type="text" id="search" class="input" placeholder="질문 또는 답변에서 검색…">
  </div>

  <div id="cat-nav" class="cat-nav fade-up delay-3"></div>

  <button id="back-to-top" class="back-to-top" type="button" aria-label="맨 위로 이동">
    <iconify-icon icon="solar:alt-arrow-up-linear"></iconify-icon>
  </button>

  <div id="list" class="fade-up delay-4">
    <div style="text-align:center; padding: 60px 20px; color: var(--text-faint);">
      <iconify-icon icon="svg-spinners:ring-resize" inline style="font-size: 24px;"></iconify-icon>
    </div>
  </div>
</main>

<script type="module">
import { supabase } from "./assets/supabase.js";

const listEl = document.getElementById("list");
const searchEl = document.getElementById("search");
const catNavEl = document.getElementById("cat-nav");
let allFaqs = [];

function slugifyCat(cat) {
  return "cat-" + (cat || "기타").replace(/[^\w가-힣]+/g, "-");
}

function renderCatNav(faqs) {
  // 카테고리별 카운트 집계 (순서 유지)
  const counts = new Map();
  faqs.forEach((f) => {
    const cat = f.category || "기타";
    counts.set(cat, (counts.get(cat) || 0) + 1);
  });

  catNavEl.innerHTML = "";
  catNavEl.classList.remove("hidden");
  counts.forEach((count, cat) => {
    const btn = document.createElement("button");
    btn.className = "cat-chip";
    btn.type = "button";
    btn.innerHTML = `${cat}<span class="count">${count}</span>`;
    btn.addEventListener("click", () => {
      const target = document.getElementById(slugifyCat(cat));
      if (target) target.scrollIntoView({ behavior: "smooth", block: "start" });
    });
    catNavEl.appendChild(btn);
  });
}

function emptyState(msg, icon = "solar:inbox-bold-duotone") {
  return `<div style="text-align:center; padding: 80px 20px; color: var(--text-faint);">
    <iconify-icon icon="${icon}" style="font-size: 48px; opacity: 0.5;"></iconify-icon>
    <div style="margin-top: 16px;">${msg}</div>
  </div>`;
}

function appendFaqItem(parent, f) {
  const details = document.createElement("details");
  details.className = "faq-item";
  const summary = document.createElement("summary");
  summary.innerHTML = `
    <span></span>
    <span class="icon-wrap"><iconify-icon icon="solar:add-circle-linear" style="font-size: 18px; color: var(--text-dim);"></iconify-icon></span>
  `;
  summary.querySelector("span").textContent = f.question;
  const answer = document.createElement("div");
  answer.className = "answer";
  answer.textContent = f.answer;
  details.appendChild(summary);
  details.appendChild(answer);
  parent.appendChild(details);
}

function renderGrouped(faqs) {
  // 검색이 없을 때: 카테고리별로 묶어서 렌더
  const groups = new Map();
  faqs.forEach((f) => {
    const cat = f.category || "기타";
    if (!groups.has(cat)) groups.set(cat, []);
    groups.get(cat).push(f);
  });

  listEl.innerHTML = "";
  groups.forEach((items, category) => {
    const title = document.createElement("div");
    title.className = "faq-cat-title";
    title.id = slugifyCat(category);
    title.textContent = category;
    listEl.appendChild(title);
    items.forEach((f) => appendFaqItem(listEl, f));
  });
}

function renderRanked(scored) {
  // 검색 결과: 점수 기반 정렬, 카테고리 그룹 없이 단일 리스트
  if (!scored || scored.length === 0) {
    listEl.innerHTML = emptyState("검색 결과가 없습니다.", "solar:magnifer-linear");
    return;
  }
  listEl.innerHTML = "";
  scored.forEach(({ faq }) => appendFaqItem(listEl, faq));
}

function scoreFaq(f, q) {
  // 높은 점수일수록 위로. 0이면 매치 안 됨.
  const ql = q;
  const question = (f.question || "").toLowerCase();
  const answer = (f.answer || "").toLowerCase();
  const category = (f.category || "").toLowerCase();

  let score = 0;

  // 제목 매치 (가장 강함)
  if (question.includes(ql)) {
    score += 100;
    if (question.startsWith(ql)) score += 20; // 제목 앞쪽일수록 가점
  }

  // 카테고리 매치
  if (category.includes(ql)) score += 30;

  // 본문 매치 (가장 약함, 빈도 가점)
  if (answer.includes(ql)) {
    score += 10;
    // 본문 등장 횟수만큼 약하게 가점 (최대 +10)
    const matches = answer.split(ql).length - 1;
    score += Math.min(matches, 10);
  }

  return score;
}

function applyFilter() {
  const q = searchEl.value.trim().toLowerCase();
  if (!q) {
    renderGrouped(allFaqs);
    catNavEl.classList.remove("hidden");
    return;
  }

  const scored = allFaqs
    .map((faq) => ({ faq, score: scoreFaq(faq, q) }))
    .filter((x) => x.score > 0)
    .sort((a, b) => b.score - a.score);

  renderRanked(scored);
  catNavEl.classList.add("hidden"); // 검색 중엔 칩 메뉴 숨김
}

function render(faqs) {
  // 초기 로딩용 (검색 없는 상태)
  if (!faqs || faqs.length === 0) {
    listEl.innerHTML = emptyState("아직 등록된 FAQ가 없습니다.");
    catNavEl.classList.add("hidden");
    return;
  }
  renderCatNav(faqs);
  renderGrouped(faqs);
}

searchEl.addEventListener("input", applyFilter);

async function loadFaqs() {
  const { data, error } = await supabase
    .from("faqs")
    .select("*")
    .order("category", { ascending: true, nullsFirst: false })
    .order("sort_order", { ascending: true })
    .order("created_at", { ascending: true });

  if (error) {
    listEl.innerHTML = emptyState(`불러오기 실패: ${error.message}`, "solar:danger-triangle-bold-duotone");
    return;
  }
  if (!data || data.length === 0) {
    listEl.innerHTML = emptyState("아직 등록된 FAQ가 없습니다.");
    return;
  }

  allFaqs = data;
  render(allFaqs);
}

loadFaqs();

// Back to top 버튼 동작
const backToTopBtn = document.getElementById("back-to-top");
const TOP_THRESHOLD = 400;

function updateBackToTop() {
  if (window.scrollY > TOP_THRESHOLD) {
    backToTopBtn.classList.add("visible");
  } else {
    backToTopBtn.classList.remove("visible");
  }
}

window.addEventListener("scroll", updateBackToTop, { passive: true });

backToTopBtn.addEventListener("click", () => {
  window.scrollTo({ top: 0, behavior: "smooth" });
});

updateBackToTop();
</script>
</body>
</html>
