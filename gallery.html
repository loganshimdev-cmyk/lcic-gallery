<style>
  /* Tabs */
  .cat-tabs {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px;
    max-width: 1000px;
    margin: 36px auto 0;
    padding: 0 16px;
  }
  .cat-tab {
    padding: 8px 18px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid var(--hairline);
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    user-select: none;
  }
  .cat-tab:hover {
    background: rgba(255, 255, 255, 0.07);
    color: var(--text);
  }
  .cat-tab.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    box-shadow: 0 0 24px rgba(233, 69, 96, 0.45);
  }
  .cat-tab .count {
    margin-left: 6px;
    font-size: 0.7rem;
    opacity: 0.7;
  }

  /* Gallery */
  .gallery {
    max-width: 1400px;
    margin: 40px auto;
    padding: 0 20px 120px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
  }

  .cat-divider {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 28px 0 6px;
  }
  .cat-divider .label {
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    white-space: nowrap;
  }
  .cat-divider .line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--hairline), transparent);
  }

  .photo-card {
    position: relative;
    border-radius: 18px;
    overflow: hidden;
    background: #0d0d0e;
    border: 1px solid var(--hairline);
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    aspect-ratio: 4/3;
  }
  .photo-card:hover {
    transform: translateY(-3px);
    border-color: rgba(233, 69, 96, 0.3);
    box-shadow: 0 16px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(233, 69, 96, 0.15);
  }
  .photo-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
    image-orientation: from-image;
  }
  .photo-card:hover img { transform: scale(1.06); }
  .photo-card .spinner {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: var(--text-faint);
    font-size: 22px;
  }
  .photo-card .gloss {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, transparent 60%, rgba(0,0,0,0.55) 100%);
    opacity: 0;
    transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    pointer-events: none;
  }
  .photo-card:hover .gloss { opacity: 1; }

  /* Lightbox */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(5, 5, 5, 0.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    z-index: 1500;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  .lightbox.active { display: flex; }
  .lightbox img {
    max-width: 92vw;
    max-height: 78vh;
    object-fit: contain;
    border-radius: 14px;
    box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8);
    image-orientation: from-image;
  }
  .lightbox .info {
    margin-top: 18px;
    text-align: center;
    color: var(--text-dim);
    font-size: 0.85rem;
    letter-spacing: 0.05em;
  }
  .lightbox .lb-btn {
    position: absolute;
    width: 48px; height: 48px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid var(--hairline);
    color: var(--text);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    font-size: 22px;
  }
  .lightbox .lb-btn:hover {
    background: rgba(255, 255, 255, 0.12);
    border-color: var(--hairline-strong);
    transform: scale(1.05);
  }
  .lightbox .lb-close { top: 28px; right: 28px; }
  .lightbox .lb-prev { left: 28px; top: 50%; transform: translateY(-50%); }
  .lightbox .lb-next { right: 28px; top: 50%; transform: translateY(-50%); }
  .lightbox .lb-prev:hover,
  .lightbox .lb-next:hover { transform: translateY(-50%) scale(1.05); }
  .lightbox .lb-counter {
    position: absolute;
    top: 36px; left: 36px;
    color: var(--text-faint);
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    padding: 8px 16px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid var(--hairline);
    border-radius: 999px;
  }

  @media (max-width: 768px) {
    .gallery {
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
      padding: 0 12px 80px;
    }
    .cat-tab { padding: 6px 14px; font-size: 0.75rem; }
    .lightbox .lb-btn { width: 40px; height: 40px; font-size: 18px; }
    .lightbox .lb-prev { left: 12px; }
    .lightbox .lb-next { right: 12px; }
    .lightbox .lb-close { top: 16px; right: 16px; }
    .lightbox .lb-counter { top: 20px; left: 16px; font-size: 0.75rem; }
  }
</style>
</head>

const STORAGE = "https://rzsmcysgijeshiiuyqjn.supabase.co/storage/v1/object/public/lcic-gallery";
const categories = ["All", ...new Set(photos.map(p => p.cat))];
const tabsEl = document.getElementById("tabs");
const galleryEl = document.getElementById("gallery");

categories.forEach(cat => {
  const count = cat === "All" ? photos.length : photos.filter(p => p.cat === cat).length;
  const tab = document.createElement("div");
  tab.className = "cat-tab" + (cat === "All" ? " active" : "");
  tab.dataset.cat = cat;
  tab.innerHTML = `${cat === "All" ? "전체" : cat}<span class="count">${count}</span>`;
  tab.onclick = () => filterCategory(cat);
  tabsEl.appendChild(tab);
});

let currentFilter = "All";
let visiblePhotos = [...photos];
let currentIndex = 0;

function filterCategory(cat) {
  currentFilter = cat;
  document.querySelectorAll(".cat-tab").forEach(t => {
    t.classList.toggle("active", t.dataset.cat === cat);
  });
  renderGallery();
}

function renderGallery() {
  visiblePhotos = currentFilter === "All" ? [...photos] : photos.filter(p => p.cat === currentFilter);
  galleryEl.innerHTML = "";

  let lastCat = "";
  visiblePhotos.forEach((photo, i) => {
    if (currentFilter === "All" && photo.cat !== lastCat) {
      const divider = document.createElement("div");
      divider.className = "cat-divider";
      divider.innerHTML = `<span class="label">${photo.cat}</span><span class="line"></span>`;
      galleryEl.appendChild(divider);
      lastCat = photo.cat;
    }

    const card = document.createElement("div");
    card.className = "photo-card";
    const thumbSrc = `${STORAGE}/thumbs/${photo.src}`;
    card.innerHTML = `
      <iconify-icon class="spinner" icon="svg-spinners:ring-resize"></iconify-icon>
      <img data-src="${encodeURI(thumbSrc)}" alt="${photo.name}" loading="lazy" onload="this.previousElementSibling.style.display='none'">
      <div class="gloss"></div>
    `;
    card.onclick = () => openLightbox(i);
    galleryEl.appendChild(card);
  });

  observeImages();
}

// Lightbox
const lightbox = document.getElementById("lightbox");
const lbImg = document.getElementById("lb-img");
const lbInfo = document.getElementById("lb-info");
const lbCounter = document.getElementById("lb-counter");

function openLightbox(index) {
  currentIndex = index;
  updateLightbox();
  lightbox.classList.add("active");
  document.body.style.overflow = "hidden";
}

function closeLightbox() {
  lightbox.classList.remove("active");
  document.body.style.overflow = "";
}

function updateLightbox() {
  const photo = visiblePhotos[currentIndex];
  lbImg.src = encodeURI(`${STORAGE}/photos/${photo.src}`);
  lbInfo.textContent = `${photo.cat} · ${photo.name}`;
  lbCounter.textContent = `${currentIndex + 1} / ${visiblePhotos.length}`;
}

document.getElementById("lb-close").onclick = closeLightbox;
document.getElementById("lb-prev").onclick = () => {
  currentIndex = (currentIndex - 1 + visiblePhotos.length) % visiblePhotos.length;
  updateLightbox();
};
document.getElementById("lb-next").onclick = () => {
  currentIndex = (currentIndex + 1) % visiblePhotos.length;
  updateLightbox();
};

document.addEventListener("keydown", e => {
  if (!lightbox.classList.contains("active")) return;
  if (e.key === "Escape") closeLightbox();
  if (e.key === "ArrowLeft") {
    currentIndex = (currentIndex - 1 + visiblePhotos.length) % visiblePhotos.length;
    updateLightbox();
  }
  if (e.key === "ArrowRight") {
    currentIndex = (currentIndex + 1) % visiblePhotos.length;
    updateLightbox();
  }
});

lightbox.addEventListener("click", e => { if (e.target === lightbox) closeLightbox(); });

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const img = entry.target;
      if (img.dataset.src) {
        img.src = img.dataset.src;
        img.removeAttribute("data-src");
      }
      observer.unobserve(img);
    }
  });
}, { rootMargin: "200px" });

function observeImages() {
  document.querySelectorAll("img[data-src]").forEach(img => observer.observe(img));
}

renderGallery();
</script>
