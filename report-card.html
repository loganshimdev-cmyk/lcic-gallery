<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive">
<title>English Achievement Report · LCIC</title>
<link rel="icon" type="image/png" href="assets/brand/lcic-logo.png">
<script src="assets/background.js?v=8"></script>
<link rel="stylesheet" href="assets/shared.css?v=13">
<script src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
<style>
  /* ── 진입 게이트 ── */
  .gate-wrap { min-height: 100dvh; display: flex; align-items: center; justify-content: center; padding: 120px 20px 60px; }
  .gate-card { max-width: 420px; width: 100%; }
  .gate-card .bezel-inner { padding: 36px 32px; }
  .gate-icon { width: 64px; height: 64px; border-radius: 999px; background: var(--accent-soft); color: var(--accent-deep); display: flex; align-items: center; justify-content: center; font-size: 28px; margin: 0 auto 20px; }
  .gate-title { text-align: center; font-size: 1.35rem; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 8px; }
  .gate-sub { text-align: center; color: var(--text-dim); font-size: 0.92rem; line-height: 1.55; margin-bottom: 24px; }
  .gate-form { display: flex; flex-direction: column; gap: 12px; }
  .gate-input { width: 100%; padding: 14px 16px; border: 1px solid var(--hairline-strong); border-radius: 14px; background: var(--bg-elev); font-family: inherit; font-size: 1rem; color: var(--text); transition: border-color 0.15s, box-shadow 0.15s; }
  .gate-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft); }
  .gate-btn { width: 100%; padding: 14px 16px; border: none; border-radius: 14px; background: var(--accent); color: white; font-family: inherit; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.15s, transform 0.05s; box-shadow: var(--shadow-accent); }
  .gate-btn:hover { background: var(--accent-hover); }
  .gate-btn:active { transform: translateY(1px); }
  .gate-btn[disabled] { opacity: 0.55; cursor: not-allowed; transform: none; }
  .gate-err { color: #dc2626; font-size: 0.86rem; text-align: center; min-height: 20px; }

  /* ── 관리자 목록 ── */
  .summary-row { display: flex; gap: 12px; margin-bottom: 22px; flex-wrap: wrap; }
  .summary-card { flex: 1; min-width: 150px; }
  .summary-card .bezel-inner { padding: 18px 20px; text-align: center; }
  .summary-num { font-size: 1.9rem; font-weight: 700; letter-spacing: -0.02em; line-height: 1.1; }
  .summary-num .unit { font-size: 0.95rem; font-weight: 500; color: var(--text-dim); margin-left: 3px; }
  .summary-label { font-size: 0.82rem; color: var(--text-dim); margin-top: 4px; }
  .toolbar { display: flex; gap: 10px; margin-bottom: 14px; align-items: center; flex-wrap: wrap; }
  .search-box { position: relative; flex: 1; min-width: 200px; }
  .search-box iconify-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-faint); font-size: 18px; }
  .search-input { width: 100%; padding: 11px 14px 11px 40px; border: 1px solid var(--hairline-strong); border-radius: 12px; background: var(--bg-elev); font-family: inherit; font-size: 0.95rem; color: var(--text); }
  .search-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft); }
  .list-wrap { overflow-x: auto; border-radius: 18px; }
  table.list { width: 100%; border-collapse: collapse; font-size: 0.92rem; background: var(--bg-elev); }
  table.list th, table.list td { padding: 13px 14px; text-align: center; border-bottom: 1px solid var(--hairline); white-space: nowrap; }
  table.list th { background: var(--surface); font-weight: 600; color: var(--text-dim); font-size: 0.82rem; cursor: pointer; user-select: none; }
  table.list th .arrow { font-size: 0.7em; opacity: 0.5; }
  table.list td.name { text-align: left; font-weight: 600; }
  table.list td.name .sub { display: block; font-size: 0.76rem; color: var(--text-faint); font-weight: 500; }
  table.list tbody tr { cursor: pointer; transition: background 0.12s; }
  table.list tbody tr:hover { background: var(--accent-tint); }
  .grow-up { color: #16a34a; font-weight: 700; }
  .grow-down { color: #dc2626; font-weight: 700; }
  .grow-flat { color: var(--text-faint); font-weight: 600; }
  .arrow-to { color: var(--text-faint); margin: 0 4px; font-size: 0.85em; }
  .lvl-pill { display: inline-flex; align-items: center; justify-content: center; min-width: 28px; padding: 2px 6px; border-radius: 6px; font-weight: 700; font-size: 0.76rem; }
  .cefr-A1 { background:#fee2e2; color:#b91c1c; } .cefr-A2 { background:#ffedd5; color:#c2410c; }
  .cefr-B1 { background:#dbeafe; color:#1d4ed8; } .cefr-B2 { background:#cfe0fd; color:#1e40af; }
  .cefr-C1 { background:#dcfce7; color:#15803d; } .cefr-C2 { background:#bbf7d0; color:#166534; }
  .cefr-x  { background:var(--surface); color:var(--text-faint); }

  /* ── 성적표 문서(Student Progress Report) ── */
  .detail-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(15,23,42,0.5); backdrop-filter: blur(3px); display: none; justify-content: center; padding: 28px 16px 60px; overflow-y: auto; }
  .detail-overlay.open { display: block; }
  .detail-inner { max-width: 900px; margin: 0 auto; }
  .spr-toolbar { display: flex; gap: 10px; justify-content: flex-end; margin-bottom: 12px; }
  .spr-toolbar button { padding: 10px 18px; border-radius: 10px; font-family: inherit; font-weight: 600; font-size: 0.9rem; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 7px; }
  .tb-print { background: #ea580c; color: #fff; }
  .tb-print:hover { background: #c2410c; }
  .tb-close { background: rgba(255,255,255,0.9); color: #334155; }
  .tb-close:hover { background: #fff; }

  .spr { background: #fff; border-radius: 14px; box-shadow: var(--shadow-lg); padding: 40px 44px 44px; color: #1f2937; }
  .spr-head { display: flex; align-items: center; gap: 22px; }
  .spr-logo { height: 58px; width: auto; flex-shrink: 0; }
  .spr-eyebrow { font-size: 0.72rem; letter-spacing: 0.14em; color: #64748b; font-weight: 600; text-transform: uppercase; }
  .spr-title { font-size: 1.9rem; font-weight: 800; color: #0f172a; letter-spacing: -0.01em; margin-top: 2px; line-height: 1.1; }
  .spr-rule { height: 4px; background: linear-gradient(90deg, #f59e0b, #f0b429); border-radius: 3px; margin: 16px 0 24px; }

  .info-tbl { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 0.9rem; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; }
  .info-tbl td { padding: 12px 16px; border-bottom: 1px solid #eef2f7; border-right: 1px solid #eef2f7; vertical-align: middle; }
  .info-tbl tr:last-child td { border-bottom: none; }
  .info-tbl td.lbl { background: #f6f8fb; color: #1e3a8a; font-weight: 700; white-space: nowrap; width: 1%; }
  .info-tbl td.val { color: #1f2937; }
  .gender .on { color: #0f172a; font-weight: 800; }
  .gender .off { color: #cbd5e1; font-weight: 600; }

  .sect-head { display: flex; align-items: center; gap: 16px; margin: 30px 0 16px; color: #ea580c; font-weight: 800; font-size: 0.95rem; letter-spacing: 0.16em; text-transform: uppercase; }
  .sect-head::before, .sect-head::after { content: ""; flex: 1; height: 2px; background: #fbcfa3; border-radius: 2px; }

  .score-tbl { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 0.92rem; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; text-align: center; }
  .score-tbl th, .score-tbl td { padding: 11px 10px; border-bottom: 1px solid #eef2f7; border-right: 1px solid #eef2f7; }
  .score-tbl thead th { background: #f1f5f9; color: #334155; font-weight: 700; font-size: 0.86rem; }
  .score-tbl tbody th { background: #f6f8fb; color: #0f172a; font-weight: 700; text-align: left; white-space: nowrap; }
  .score-tbl tr:last-child td, .score-tbl tr:last-child th { border-bottom: none; }
  .score-tbl th:last-child, .score-tbl td:last-child { border-right: none; }
  .score-tbl .tot { font-weight: 800; }
  .score-tbl tr.change th, .score-tbl tr.change td { background: #fffbeb; font-weight: 700; }
  .score-tbl tr.change td.pos { color: #c2410c; }
  .score-tbl tr.change td.neg { color: #dc2626; }

  .cefr-legend { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 10px; font-size: 0.82rem; border: 1px solid #e2e8f0; border-radius: 10px; overflow: hidden; }
  .cefr-legend td { padding: 9px 12px; border-right: 1px solid #eef2f7; }
  .cefr-legend td:last-child { border-right: none; }
  .cefr-legend td.band { background: #f6f8fb; font-weight: 800; color: #0f172a; white-space: nowrap; width: 1%; }
  .cefr-legend td.desc { color: #475569; }

  .charts { display: flex; gap: 18px; margin-top: 20px; flex-wrap: wrap; }
  .chart-box { flex: 1; min-width: 280px; display: flex; flex-direction: column; align-items: center; }
  .chart-box svg { width: 100%; height: auto; }
  .chart-legend { display: flex; gap: 18px; justify-content: center; font-size: 0.8rem; color: #475569; margin-top: 4px; }
  .chart-legend .lg { display: inline-block; width: 11px; height: 11px; border-radius: 3px; margin-right: 5px; vertical-align: -1px; }
  .lg.en { background: #2563eb; } .lg.fi { background: #ea580c; }

  /* ── Comment ── */
  .comment-box { margin-top: 18px; border: 1px solid #e2e8f0; border-radius: 10px; overflow: hidden; }
  .comment-head { background: #fff7ed; color: #c2410c; font-weight: 800; font-size: 0.8rem; padding: 8px 14px; border-bottom: 1px solid #fed7aa; letter-spacing: 0.05em; text-transform: uppercase; }
  .comment-body { padding: 12px 14px; font-size: 0.88rem; color: #1f2937; line-height: 1.65; min-height: 44px; white-space: pre-wrap; }

  /* ── TOR-style 인증·서명 (실제 LCIC TOR 양식) ── */
  .tor-divider { border: none; border-top: 1.6px dashed #94a3b8; margin: 30px 0 9px; }
  .tor-closed { text-align: center; font-size: 0.82rem; font-weight: 700; color: #334155; margin-bottom: 22px; }
  .tor-remarks { font-size: 0.88rem; color: #1f2937; margin-bottom: 28px; }
  .tor-remarks b { color: #0f172a; }
  /* 서명란: 실제 서명은 공란(손글씨용). 영역 작게. */
  .tor-signs { margin: 10px 0 4px; }
  .sig-block { display: flex; align-items: flex-end; justify-content: center; gap: 12px; }
  .sig-by { font-size: 0.84rem; color: #334155; padding-bottom: 2px; }
  .sig-col { width: 250px; }
  .sig-space { height: 56px; }
  .sig-line { border-bottom: 1px solid #475569; }
  .sig-name { font-weight: 800; font-size: 0.85rem; color: #0f172a; margin-top: 4px; }
  .sig-title { font-size: 0.72rem; color: #475569; letter-spacing: .03em; }
  .tor-foot2 { position: relative; display: flex; justify-content: space-between; align-items: flex-end; gap: 24px; margin-top: 30px; min-height: 110px; }
  .tor-tag { font-style: italic; font-weight: 700; color: #334155; font-size: 0.88rem; align-self: flex-end; }
  .tor-seal-area { position: relative; text-align: center; flex-shrink: 0; min-width: 200px; padding: 8px 0; }
  .tor-seal { position: absolute; left: 50%; top: 42%; transform: translate(-50%, -50%); width: 124px; height: 124px; opacity: 0.10; pointer-events: none; }
  .tor-date { position: relative; font-size: 0.8rem; font-weight: 700; color: #334155; }
  .tor-novalid { position: relative; font-size: 0.82rem; font-weight: 800; color: #0f172a; margin-top: 10px; }
  .spr-foot { margin-top: 22px; padding-top: 14px; border-top: 1px solid #eef2f7; font-size: 0.74rem; color: #94a3b8; line-height: 1.6; }

  /* ── 인쇄: A4 ── */
  @media print {
    #entry-gate, #board, #site-bg, .bg-canvas, canvas, .spr-toolbar { display: none !important; }
    .detail-overlay { position: static !important; display: block !important; padding: 0 !important; overflow: visible !important; background: #fff !important; backdrop-filter: none !important; }
    .detail-inner { max-width: 100% !important; }
    .spr { box-shadow: none !important; border-radius: 0 !important; padding: 2mm 3mm !important; }
    .spr-logo { height: 46px !important; }
    .spr-title { font-size: 1.4rem !important; }
    .spr-rule { margin: 9px 0 12px !important; }
    .sect-head { margin: 13px 0 7px !important; font-size: 0.82rem !important; }
    .info-tbl, .score-tbl { font-size: 0.82rem !important; }
    .info-tbl td, .score-tbl th, .score-tbl td { padding: 7px 12px !important; }
    .cefr-legend { margin-top: 7px !important; font-size: 0.74rem !important; }
    .cefr-legend td { padding: 6px 10px !important; }
    .charts { margin-top: 6px !important; gap: 10px !important; }
    .chart-box svg { height: 150px !important; }
    .chart-legend { margin-top: 0 !important; font-size: 0.72rem !important; }
    .comment-box { margin-top: 7px !important; }
    .comment-head { padding: 4px 12px !important; font-size: 0.72rem !important; }
    .comment-body { padding: 6px 12px !important; font-size: 0.78rem !important; min-height: 22px !important; }
    .tor-divider { margin: 10px 0 5px !important; }
    .tor-closed { margin-bottom: 7px !important; font-size: 0.76rem !important; }
    .tor-remarks { margin-bottom: 7px !important; font-size: 0.8rem !important; }
    .tor-signs { margin: 6px 0 2px !important; }
    .sig-space { height: 48px !important; }
    .sig-name { font-size: 0.78rem !important; }
    .sig-title { font-size: 0.66rem !important; }
    .tor-foot2 { min-height: 28px !important; margin-top: 4px !important; }
    .spr-foot { margin-top: 8px !important; padding-top: 5px !important; font-size: 0.66rem !important; }
    .info-tbl, .score-tbl, .cefr-legend, .comment-box, .comment-head, .spr, .charts, .chart-box { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .info-tbl td.lbl, .score-tbl thead th, .score-tbl tbody th, .score-tbl tr.change th, .score-tbl tr.change td, .cefr-legend td.band, .spr-rule, [class^="cefr-"] { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    @page { size: A4 portrait; margin: 10mm; }
  }
</style>
</head>
<body>

<!-- 진입 게이트 -->
<section id="entry-gate" class="gate-wrap">
  <div class="bezel gate-card fade-up">
    <div class="bezel-inner">
      <div class="gate-icon"><iconify-icon icon="solar:document-text-bold-duotone"></iconify-icon></div>
      <div class="gate-title">English Achievement Reports</div>
      <div class="gate-sub">EF-SET 입학·수료 성적표입니다.<br>전달받으신 비밀번호를 입력해 주세요.</div>
      <form id="entry-form" class="gate-form" autocomplete="off">
        <input id="entry-pw" class="gate-input" type="password" placeholder="비밀번호" autocomplete="off" autofocus required>
        <button id="entry-btn" class="gate-btn" type="submit"><span id="entry-btn-label">확인</span></button>
        <div id="entry-err" class="gate-err" role="alert"></div>
      </form>
    </div>
  </div>
</section>

<!-- 관리자 목록 -->
<main id="board" class="container-narrow" style="padding: 110px 12px 80px; display: none;">
  <header class="fade-up" style="text-align: center; margin-bottom: 26px;">
    <span class="eyebrow"><iconify-icon icon="solar:graph-up-bold-duotone"></iconify-icon> EF-SET · Entrance → Final</span>
    <h1 style="font-size: 2rem; font-weight: 700; letter-spacing: -0.02em; margin: 14px 0 6px;">English Achievement Reports</h1>
    <p style="color: var(--text-dim); font-size: 0.95rem;" id="program-line"></p>
  </header>
  <div class="summary-row fade-up delay-1">
    <div class="bezel summary-card"><div class="bezel-inner"><div class="summary-num" id="sum-count">0<span class="unit">명</span></div><div class="summary-label">학생 수</div></div></div>
    <div class="bezel summary-card"><div class="bezel-inner"><div class="summary-num" id="sum-grow">+0</div><div class="summary-label">평균 총점 성장 (/400)</div></div></div>
    <div class="bezel summary-card"><div class="bezel-inner"><div class="summary-num" id="sum-up">0<span class="unit">명</span></div><div class="summary-label">CEFR 레벨 상승</div></div></div>
  </div>
  <div class="toolbar fade-up delay-2">
    <div class="search-box"><iconify-icon icon="solar:magnifer-linear"></iconify-icon><input id="search" class="search-input" type="text" placeholder="이름 검색…" autocomplete="off"></div>
  </div>
  <div class="bezel fade-up delay-2"><div class="bezel-inner" style="padding: 6px;">
    <div class="list-wrap">
      <table class="list">
        <thead><tr>
          <th data-sort="name" style="text-align:left">Name <span class="arrow"></span></th>
          <th data-sort="nat">Nationality <span class="arrow"></span></th>
          <th data-sort="entrance">Entrance <span class="arrow"></span></th>
          <th data-sort="final">Final <span class="arrow"></span></th>
          <th data-sort="grow">Change <span class="arrow"></span></th>
          <th data-sort="lvl">CEFR <span class="arrow"></span></th>
        </tr></thead>
        <tbody id="list-body"></tbody>
      </table>
    </div>
  </div></div>
  <p style="text-align:center; color: var(--text-faint); font-size: 0.82rem; margin-top: 14px;">행을 누르면 학생 성적표가 열립니다. 성적표에서 <b>Print / PDF</b>로 저장해 전달하세요.</p>
</main>

<!-- 성적표 문서 -->
<div id="detail" class="detail-overlay">
  <div class="detail-inner">
    <div class="spr-toolbar">
      <button class="tb-print" id="rc-print"><iconify-icon icon="solar:printer-bold"></iconify-icon> Print / PDF</button>
      <button class="tb-close" id="rc-close"><iconify-icon icon="solar:close-circle-linear"></iconify-icon> Close</button>
    </div>
    <div class="spr" id="report"></div>
  </div>

    const up = cefrIdx(avg(fi)) - cefrIdx(avg(en));
    const band = (s) => s >= 71 ? "advanced" : s >= 51 ? "upper-intermediate" : s >= 41 ? "intermediate" : s >= 31 ? "developing" : "basic";
    const chg = (d) => d >= 30 ? `a major +${d} gain` : d >= 15 ? `a strong +${d} gain` : d >= 5 ? `a solid +${d} gain` : d >= 1 ? `a slight +${d} gain` : d === 0 ? "no change" : `a ${d} change`;
    const sht = (d) => d > 0 ? `+${d}` : d < 0 ? `${d}` : "±0";
    const o = SK.map((k) => ({ name: SKFULL[k], f: Number(fi[k]) || 0, d: (Number(fi[k]) || 0) - (Number(en[k]) || 0) })).sort((a, b) => b.f - a.f);
    const s1 = up >= 1
      ? `Advanced from ${eL} to ${xL} over the program, with a +${g}-point overall improvement.`
      : g >= 1 ? `Made steady overall progress (+${g} points), consolidating a ${xL} level.`
        : `Maintained a stable ${xL} level across the four skills.`;
    const s2 = `${o[0].name} was the strongest skill, reaching ${o[0].f}/100 (${band(o[0].f)}) with ${chg(o[0].d)}; ${o[1].name} followed at ${o[1].f} (${band(o[1].f)}, ${sht(o[1].d)}) and ${o[2].name} at ${o[2].f} (${band(o[2].f)}, ${sht(o[2].d)}).`;
    const s3 = `${o[3].name}, at ${o[3].f} (${band(o[3].f)}, ${sht(o[3].d)}), ${o[3].d >= 10 ? "improved well and " : o[3].d >= 1 ? "showed modest growth and " : ""}is the main area for continued focus.`;
    return `${s1} ${s2} ${s3}`;
  }

  const MON = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
  function fmtDate(iso) {
    if (!iso) return "—";
    const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(iso); if (!m) return esc(iso);
    return `${MON[+m[2] - 1]} ${+m[3]}, ${m[1]}`;
  }

  // ── 진입 ──
  async function unlock(password, silent) {
    entryErr.textContent = ""; entryBtn.disabled = true; entryBtnLabel.textContent = "확인 중...";
    try {
      data = await decrypt(BLOB, password);
      try { sessionStorage.setItem(SS_KEY, password); } catch (_) {}
      entryGate.style.display = "none"; board.style.display = "block"; build();
      return true;
    } catch (e) {
      if (silent) { try { sessionStorage.removeItem(SS_KEY); } catch (_) {} }
      else { entryErr.textContent = "비밀번호가 올바르지 않습니다."; entryPw.value = ""; entryPw.focus(); }
      return false;
    } finally { entryBtn.disabled = false; entryBtnLabel.textContent = "확인"; }
  }

  function build() {
    flat = (data.students || []).map((s, i) => {
      const e = sum(s.entrance), x = sum(s.final);
      return { i, ...s, eTot: e, xTot: x, grow: x - e, eIdx: cefrIdx(avg(s.entrance)), xIdx: cefrIdx(avg(s.final)) };
    });
    $("program-line").textContent = data.school || SCHOOL;
    $("sum-count").innerHTML = flat.length + '<span class="unit">명</span>';
    const avgGrow = flat.length ? Math.round(flat.reduce((a, s) => a + s.grow, 0) / flat.length) : 0;
    $("sum-grow").innerHTML = (avgGrow >= 0 ? "+" : "") + avgGrow;
    $("sum-up").innerHTML = flat.filter((s) => s.xIdx > s.eIdx).length + '<span class="unit">명</span>';
    renderList();
  }

  function growSpan(d, plus) { return d > 0 ? `<span class="grow-up">+${d}</span>` : d < 0 ? `<span class="grow-down">${d}</span>` : `<span class="grow-flat">${plus ? "±0" : "0"}</span>`; }

  function renderList() {
    const q = query.trim().toLowerCase();
    let rows = flat.filter((s) => !q || (s.name || "").toLowerCase().includes(q) || (s.sub || "").toLowerCase().includes(q) || (s.nationality || "").toLowerCase().includes(q));
    rows.sort((a, b) => {
      let av, bv;
      switch (sortKey) {
        case "name": return (a.name || "").localeCompare(b.name || "") * sortDir;
        case "nat": return (a.nationality || "").localeCompare(b.nationality || "") * sortDir;
        case "entrance": av = a.eTot; bv = b.eTot; break;
        case "final": av = a.xTot; bv = b.xTot; break;
        case "lvl": av = a.xIdx; bv = b.xIdx; break;
        default: av = a.grow; bv = b.grow;
      }
      return (av - bv) * sortDir;
    });
    const body = $("list-body");
    if (!rows.length) { body.innerHTML = '<tr><td colspan="6" style="color:var(--text-faint);padding:30px">결과 없음</td></tr>'; return; }
    body.innerHTML = rows.map((s) => {
      const up = s.xIdx > s.eIdx;
      const lvl = `<span class="lvl-pill ${cefrClass(avg(s.entrance))}">${cefrLabel(avg(s.entrance))}</span><span class="arrow-to">→</span><span class="lvl-pill ${cefrClass(avg(s.final))}">${cefrLabel(avg(s.final))}</span>`;
      return `<tr data-i="${s.i}">
        <td class="name">${esc(s.name)}${s.sub ? `<span class="sub">${esc(s.sub)}</span>` : ""}</td>
        <td style="color:var(--text-dim)">${esc(s.nationality || "–")}</td>
        <td>${s.eTot}<span style="color:var(--text-faint)">/400</span></td>
        <td><b>${s.xTot}</b><span style="color:var(--text-faint)">/400</span></td>
        <td>${growSpan(s.grow)}</td>
        <td>${lvl}${up ? ' <iconify-icon icon="solar:arrow-up-bold" style="color:#16a34a;font-size:0.85em;vertical-align:-1px"></iconify-icon>' : ""}</td>
      </tr>`;
    }).join("");
    body.querySelectorAll("tr[data-i]").forEach((tr) => tr.addEventListener("click", () => openReport(+tr.dataset.i)));
  }

  // ── 레이더 차트 (SVG) ──
  function radarSVG(en, fi) {
    const cx = 200, cy = 152, R = 110;
    const axes = [{ k: "RC", dx: 0, dy: -1 }, { k: "WR", dx: 1, dy: 0 }, { k: "LC", dx: 0, dy: 1 }, { k: "SP", dx: -1, dy: 0 }];
    const pt = (a, v) => [cx + a.dx * R * v / 100, cy + a.dy * R * v / 100];
    const polyPts = (t) => axes.map((a) => pt(a, Number(t[a.k]) || 0).map((n) => n.toFixed(1)).join(",")).join(" ");
    let rings = "";
    [25, 50, 75, 100].forEach((lvl) => { rings += `<polygon points="${axes.map((a) => pt(a, lvl).map((n) => n.toFixed(1)).join(",")).join(" ")}" fill="none" stroke="#e2e8f0" stroke-width="1"/>`; });
    const aLines = axes.map((a) => { const [x, y] = pt(a, 100); return `<line x1="${cx}" y1="${cy}" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}" stroke="#e2e8f0" stroke-width="1"/>`; }).join("");
    const ringLabels = [25, 50, 75, 100].map((lvl) => `<text x="${cx + 4}" y="${(cy - R * lvl / 100 + 3).toFixed(1)}" font-size="8" fill="#cbd5e1">${lvl}</text>`).join("");
    const labels = `
      <text x="${cx}" y="${cy - R - 12}" text-anchor="middle" font-size="13" font-weight="700" fill="#475569">Reading</text>
      <text x="${cx + R + 10}" y="${cy + 4}" text-anchor="start" font-size="13" font-weight="700" fill="#475569">Writing</text>
      <text x="${cx}" y="${cy + R + 22}" text-anchor="middle" font-size="13" font-weight="700" fill="#475569">Listening</text>
      <text x="${cx - R - 10}" y="${cy + 4}" text-anchor="end" font-size="13" font-weight="700" fill="#475569">Speaking</text>`;
    return `<svg viewBox="0 0 400 320" role="img" aria-label="EF-SET radar chart">
      ${rings}${aLines}${ringLabels}
      <polygon points="${polyPts(en)}" fill="${EN}22" stroke="${EN}" stroke-width="2"/>
      <polygon points="${polyPts(fi)}" fill="${FI}22" stroke="${FI}" stroke-width="2"/>
      ${labels}
    </svg>`;
  }

  // ── 그룹 막대 차트 (SVG) ──
  function barSVG(en, fi) {
    const x0 = 44, xR = 432, yTop = 26, yBot = 250;
    const yFor = (v) => yBot - (v / 100) * (yBot - yTop);
    const gw = (xR - x0) / 4, bw = 22, gap = 6, pad = (gw - (2 * bw + gap)) / 2;
    let grid = "", bars = "", xlabels = "";
    [0, 25, 50, 75, 100].forEach((v) => {
      const y = yFor(v);
      grid += `<line x1="${x0}" y1="${y.toFixed(1)}" x2="${xR}" y2="${y.toFixed(1)}" stroke="#eef2f7" stroke-width="1"/>`;
      grid += `<text x="${x0 - 8}" y="${(y + 4).toFixed(1)}" text-anchor="end" font-size="11" fill="#94a3b8">${v}</text>`;
    });
    SK.forEach((k, i) => {
      const gx = x0 + i * gw + pad;
      const ev = Number(en[k]) || 0, xv = Number(fi[k]) || 0;
      const eh = (ev / 100) * (yBot - yTop), xh = (xv / 100) * (yBot - yTop);
      bars += `<rect x="${gx.toFixed(1)}" y="${(yBot - eh).toFixed(1)}" width="${bw}" height="${eh.toFixed(1)}" fill="${EN}" rx="2"/>`;
      bars += `<rect x="${(gx + bw + gap).toFixed(1)}" y="${(yBot - xh).toFixed(1)}" width="${bw}" height="${xh.toFixed(1)}" fill="${FI}" rx="2"/>`;
      xlabels += `<text x="${(gx + bw + gap / 2).toFixed(1)}" y="${yBot + 20}" text-anchor="middle" font-size="12.5" font-weight="700" fill="#475569">${SKFULL[k]}</text>`;
    });
    return `<svg viewBox="0 0 460 290" role="img" aria-label="EF-SET bar chart">
      ${grid}<line x1="${x0}" y1="${yTop}" x2="${x0}" y2="${yBot}" stroke="#cbd5e1" stroke-width="1"/>
      <line x1="${x0}" y1="${yBot}" x2="${xR}" y2="${yBot}" stroke="#cbd5e1" stroke-width="1"/>
      ${bars}${xlabels}
    </svg>`;
  }

  function openReport(i) {
    const s = flat[i];
    const en = s.entrance || {}, fi = s.final || {};
    const eAvg = avg(en), xAvg = avg(fi);
    const scoreCells = (t) => SK.map((k) => `<td>${Number(t[k]) || 0}</td>`).join("");
    const changeCells = SK.map((k) => { const d = (Number(fi[k]) || 0) - (Number(en[k]) || 0); return `<td class="${d >= 0 ? "pos" : "neg"}">${d > 0 ? "+" + d : d}</td>`; }).join("");
    const dTot = s.xTot - s.eTot;

    const genderCell = `<span class="${s.gender === "M" ? "on" : "off"}">M</span> · <span class="${s.gender === "F" ? "on" : "off"}">F</span>`;

    $("report").innerHTML = `
      <div class="spr-head">
        <img class="spr-logo" src="assets/brand/lcic-logo.jpg" alt="Lapulapu Cebu International College">
        <div>
          <div class="spr-eyebrow">${esc(data.school || SCHOOL)}</div>
          <div class="spr-title">English Achievement Report</div>
        </div>
      </div>
      <div class="spr-rule"></div>

      <table class="info-tbl"><tbody>
        <tr>
          <td class="lbl">Name</td><td class="val">${esc(s.name)}${s.sub ? ` <span style="color:#94a3b8">(${esc(s.sub)})</span>` : ""}</td>
          <td class="lbl">Gender</td><td class="val gender">${genderCell}</td>
          <td class="lbl">Nationality</td><td class="val">${esc(s.nationality || "—")}</td>
        </tr>
        <tr>
          <td class="lbl">Date of Birth</td><td class="val">${fmtDate(s.dob)}</td>
          <td class="lbl">Center</td><td class="val" colspan="3">LCIC-CELS</td>
        </tr>
        <tr>
          <td class="lbl">Start Date</td><td class="val">${fmtDate(s.startDate)}</td>
          <td class="lbl">End Date</td><td class="val">${fmtDate(s.endDate)}</td>
          <td class="lbl">Period of Stay</td><td class="val">4 weeks</td>
        </tr>
      </tbody></table>

      <div class="sect-head">CEFR Proficiency Assessment Result</div>
      <table class="score-tbl">
        <thead><tr><th></th>${SK.map((k) => `<th>${SKHEAD[k]}</th>`).join("")}<th>Total /400</th><th>CEFR</th></tr></thead>
        <tbody>
          <tr><th>Entrance</th>${scoreCells(en)}<td class="tot">${s.eTot}</td><td><span class="lvl-pill ${cefrClass(eAvg)}">${cefrLabel(eAvg)}</span></td></tr>
          <tr><th>Final Test</th>${scoreCells(fi)}<td class="tot">${s.xTot}</td><td><span class="lvl-pill ${cefrClass(xAvg)}">${cefrLabel(xAvg)}</span></td></tr>
          <tr class="change"><th>Change</th>${changeCells}<td class="tot ${dTot >= 0 ? "pos" : "neg"}">${dTot > 0 ? "+" + dTot : dTot}</td><td></td></tr>
        </tbody>
      </table>
      <div class="charts">
        <div class="chart-box">${radarSVG(en, fi)}<div class="chart-legend"><span><span class="lg en"></span>Entrance</span><span><span class="lg fi"></span>Final</span></div></div>
        <div class="chart-box">${barSVG(en, fi)}<div class="chart-legend"><span><span class="lg en"></span>Entrance</span><span><span class="lg fi"></span>Final</span></div></div>
      </div>

      <div class="comment-box">
        <div class="comment-head">Comment</div>
        <div class="comment-body">${esc(s.comment || autoComment(en, fi))}</div>
      </div>

      <hr class="tor-divider">
      <div class="tor-closed">(TRANSCRIPT CLOSED. ANY ENTRY BELOW THIS LINE IS NULL AND VOID.)</div>

      <div class="tor-signs"><div class="sig-block">
        <div class="sig-by">Approved by:</div>
        <div class="sig-col">
          <div class="sig-space"></div>
          <div class="sig-line"></div>
          <div class="sig-name">MAKR RYEN ANDERSON</div>
          <div class="sig-title">LCIC CELS DIRECTOR</div>
        </div>
      </div></div>

      <div class="tor-foot2">
        <div class="tor-tag">&ldquo;Bridging Communities through Education Excellence&rdquo;</div>
        <div class="tor-seal-area">
          <img class="tor-seal" src="assets/brand/lcic-logo.png" alt="">
          <div class="tor-date">DATE:&nbsp;${fmtDate(s.issued || s.endDate)}</div>
          <div class="tor-novalid">NOT VALID WITHOUT SCHOOL SEAL</div>
        </div>
      </div>
`;

    $("detail").classList.add("open");
    document.body.style.overflow = "hidden";
    $("detail").scrollTop = 0;
    $("rc-close").onclick = closeReport;
    $("rc-print").onclick = () => window.print();
  }
  function closeReport() { $("detail").classList.remove("open"); document.body.style.overflow = ""; }

  // ── 이벤트 ──
  entryForm.addEventListener("submit", (e) => { e.preventDefault(); unlock(entryPw.value, false); });
  $("search").addEventListener("input", (e) => { query = e.target.value; renderList(); });
  document.querySelectorAll("th[data-sort]").forEach((th) => {
    th.addEventListener("click", () => {
      const k = th.dataset.sort;
      if (sortKey === k) sortDir *= -1; else { sortKey = k; sortDir = (k === "name" || k === "nat") ? 1 : -1; }
      document.querySelectorAll("th .arrow").forEach((a) => a.textContent = "");
      th.querySelector(".arrow").textContent = sortDir > 0 ? "▲" : "▼";
      renderList();
    });
  });
  $("detail").addEventListener("click", (e) => { if (e.target.id === "detail" || e.target.classList.contains("detail-inner")) closeReport(); });
  document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeReport(); });

  (function init() { try { const ssp = sessionStorage.getItem(SS_KEY); if (ssp) unlock(ssp, true); } catch (_) {} })();
</script>
</body>
</html>
