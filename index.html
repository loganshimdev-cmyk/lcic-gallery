<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LCIC Photo Gallery</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f0f0f; color: #fff; }

  /* Header */
  .header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    padding: 40px 20px 20px;
    text-align: center;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .header h1 { font-size: 2rem; font-weight: 300; letter-spacing: 4px; margin-bottom: 8px; }
  .header p { color: #8899aa; font-size: 0.9rem; margin-bottom: 20px; }

  /* Category Tabs */
  .tabs {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;
    max-width: 900px; margin: 0 auto;
  }
  .tab {
    padding: 8px 18px; border-radius: 25px; cursor: pointer;
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
    font-size: 0.85rem; transition: all 0.3s; color: #aaa;
  }
  .tab:hover { background: rgba(255,255,255,0.15); color: #fff; }
  .tab.active { background: #e94560; border-color: #e94560; color: #fff; font-weight: 600; }
  .tab .count { font-size: 0.7rem; opacity: 0.7; margin-left: 4px; }

  /* Gallery Grid */
  .gallery {
    max-width: 1400px; margin: 30px auto; padding: 0 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }

  /* Category Section Label */
  .category-label {
    grid-column: 1 / -1;
    font-size: 1.3rem; font-weight: 300; letter-spacing: 2px;
    padding: 20px 0 10px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    margin-top: 10px;
    color: #e94560;
  }
  .category-label:first-child { margin-top: 0; }

  /* Photo Card */
  .card {
    position: relative; border-radius: 12px; overflow: hidden;
    background: #1a1a1a; cursor: pointer;
    transition: transform 0.3s, box-shadow 0.3s;
    aspect-ratio: 4/3;
  }
  .card:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(0,0,0,0.6); }
  .card img {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform 0.5s;
    image-orientation: from-image;
  }
  .card:hover img { transform: scale(1.05); }
  .card .label { display: none; }

  /* Lightbox */
  .lightbox {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.95); z-index: 1000;
    justify-content: center; align-items: center; flex-direction: column;
  }
  .lightbox.active { display: flex; }
  .lightbox img {
    max-width: 90vw; max-height: 80vh; object-fit: contain;
    border-radius: 8px; box-shadow: 0 0 40px rgba(0,0,0,0.8);
  }
  .lightbox .info {
    margin-top: 16px; text-align: center; color: #aaa; font-size: 0.9rem;
  }
  .lightbox .close {
    position: absolute; top: 20px; right: 30px; font-size: 2.5rem;
    color: #fff; cursor: pointer; opacity: 0.7; transition: opacity 0.2s;
    background: none; border: none;
  }
  .lightbox .close:hover { opacity: 1; }
  .lightbox .nav {
    position: absolute; top: 50%; transform: translateY(-50%);
    font-size: 3rem; color: #fff; cursor: pointer; opacity: 0.5;
    transition: opacity 0.2s; background: none; border: none; padding: 20px;
  }
  .lightbox .nav:hover { opacity: 1; }
  .lightbox .nav.prev { left: 10px; }
  .lightbox .nav.next { right: 10px; }
  .lightbox .counter {
    position: absolute; top: 24px; left: 30px; color: #888; font-size: 0.9rem;
  }

  /* Loading placeholder */
  .card img { background: #222; }
  .card .loading-spinner {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 30px; height: 30px; border: 3px solid #333; border-top-color: #e94560;
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

  /* Responsive */
  @media (max-width: 768px) {
    .gallery { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
    .header h1 { font-size: 1.4rem; }
    .tab { padding: 6px 12px; font-size: 0.75rem; }
  }
</style>
</head>

// Build categories
const categories = ["All", ...new Set(photos.map(p => p.cat))];
const tabsEl = document.getElementById("tabs");
const galleryEl = document.getElementById("gallery");

// Render tabs
categories.forEach(cat => {
  const count = cat === "All" ? photos.length : photos.filter(p => p.cat === cat).length;
  const tab = document.createElement("div");
  tab.className = "tab" + (cat === "All" ? " active" : "");
  tab.innerHTML = `${cat}<span class="count">(${count})</span>`;
  tab.onclick = () => filterCategory(cat);
  tabsEl.appendChild(tab);
});

let currentFilter = "All";
let visiblePhotos = [...photos];
let currentIndex = 0;

function filterCategory(cat) {
  currentFilter = cat;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  [...tabsEl.children].find(t => t.textContent.startsWith(cat)).classList.add("active");
  renderGallery();
}

function renderGallery() {
  visiblePhotos = currentFilter === "All" ? [...photos] : photos.filter(p => p.cat === currentFilter);
  galleryEl.innerHTML = "";

  let lastCat = "";
  visiblePhotos.forEach((photo, i) => {
    // Category label for "All" view
    if (currentFilter === "All" && photo.cat !== lastCat) {
      const label = document.createElement("div");
      label.className = "category-label";
      label.textContent = photo.cat;
      galleryEl.appendChild(label);
      lastCat = photo.cat;
    }

    const card = document.createElement("div");
    card.className = "card";
    const thumbSrc = "https://rzsmcysgijeshiiuyqjn.supabase.co/storage/v1/object/public/lcic-gallery/thumbs/" + photo.src;
    card.innerHTML = `
      <div class="loading-spinner"></div>
      <img data-src="${encodeURI(thumbSrc)}" alt="${photo.name}" loading="lazy" onload="this.previousElementSibling.style.display='none'">
      <div class="label">${photo.name}</div>
    `;
    card.onclick = () => openLightbox(i);
    galleryEl.appendChild(card);
  });
}

// Lightbox
const lightbox = document.getElementById("lightbox");
const lbImg = document.getElementById("lb-img");
const lbInfo = document.getElementById("lb-info");
const lbCounter = document.getElementById("lb-counter");

function openLightbox(index) {
  currentIndex = index;
  updateLightbox();
  lightbox.classList.add("active");
  document.body.style.overflow = "hidden";
}

function closeLightbox() {
  lightbox.classList.remove("active");
  document.body.style.overflow = "";
}

function updateLightbox() {
  const photo = visiblePhotos[currentIndex];
  lbImg.src = encodeURI("https://rzsmcysgijeshiiuyqjn.supabase.co/storage/v1/object/public/lcic-gallery/photos/" + photo.src);
  lbInfo.textContent = photo.cat;
  lbCounter.textContent = `${currentIndex + 1} / ${visiblePhotos.length}`;
}

document.getElementById("lb-close").onclick = closeLightbox;
document.getElementById("lb-prev").onclick = () => {
  currentIndex = (currentIndex - 1 + visiblePhotos.length) % visiblePhotos.length;
  updateLightbox();
};
document.getElementById("lb-next").onclick = () => {
  currentIndex = (currentIndex + 1) % visiblePhotos.length;
  updateLightbox();
};

// Keyboard navigation
document.addEventListener("keydown", e => {
  if (!lightbox.classList.contains("active")) return;
  if (e.key === "Escape") closeLightbox();
  if (e.key === "ArrowLeft") { currentIndex = (currentIndex - 1 + visiblePhotos.length) % visiblePhotos.length; updateLightbox(); }
  if (e.key === "ArrowRight") { currentIndex = (currentIndex + 1) % visiblePhotos.length; updateLightbox(); }
});

// Click outside image to close
lightbox.addEventListener("click", e => { if (e.target === lightbox) closeLightbox(); });

// Lazy load with IntersectionObserver
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const img = entry.target;
      if (img.dataset.src) {
        img.src = img.dataset.src;
        img.removeAttribute("data-src");
      }
      observer.unobserve(img);
    }
  });
}, { rootMargin: "200px" });

function observeImages() {
  document.querySelectorAll("img[data-src]").forEach(img => observer.observe(img));
}

// Override renderGallery to also observe
const _origRender = renderGallery;
renderGallery = function() { _origRender(); observeImages(); };

// Initial render
renderGallery();
</script>
