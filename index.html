<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LCIC · Lipa City Colleges International Campus</title>
<script src="assets/background.js"></script>
<link rel="stylesheet" href="assets/shared.css">
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
<style>
  /* On the homepage we let the campus photo show through more strongly */
  body[data-page="home"]::after {
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(233, 69, 96, 0.18), transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(15, 52, 96, 0.25), transparent 60%),
      linear-gradient(180deg, rgba(5, 5, 5, 0.35) 0%, rgba(5, 5, 5, 0.7) 100%);
  }
  body[data-page="home"]::before {
    filter: brightness(0.55) saturate(1.2);
  }

  .hero {
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 120px 24px 80px;
  }

  .hero h1 {
    margin-top: 28px;
    font-size: clamp(2.6rem, 6.4vw, 4.6rem);
    font-weight: 700;
    letter-spacing: -0.025em;
    line-height: 1.12;
    text-wrap: balance;
  }

  .hero .subhead {
    margin-top: 22px;
    max-width: 620px;
    font-size: clamp(0.98rem, 1.6vw, 1.15rem);
    color: #d0d0d0;
    line-height: 1.7;
  }

  .hero .ctas {
    margin-top: 44px;
    display: inline-flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
  }

  .hero .ctas .btn-primary,
  .hero .ctas .btn-ghost {
    padding: 16px 32px;
    font-size: 0.95rem;
  }

  .footer-strip {
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    color: var(--text-faint);
    font-size: 0.78rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    opacity: 0.65;
  }
  .footer-strip iconify-icon { font-size: 14px; }

  @media (max-width: 640px) {
    .hero { padding: 100px 18px 80px; }
    .hero .ctas { flex-direction: column; width: 100%; max-width: 320px; }
    .hero .ctas .btn-primary,
    .hero .ctas .btn-ghost { justify-content: center; width: 100%; }
    .footer-strip { font-size: 0.7rem; bottom: 20px; }
  }
</style>
</head>
<body data-page="home">

<nav class="nav-pill">
  <a href="index.html" class="active"><iconify-icon icon="solar:home-2-bold-duotone" inline></iconify-icon> 홈</a>
  <a href="gallery.html"><iconify-icon icon="solar:gallery-bold-duotone" inline></iconify-icon> 갤러리</a>
  <a href="notice.html"><iconify-icon icon="solar:bell-bold" inline></iconify-icon> 공지사항</a>
  <a href="faq.html"><iconify-icon icon="solar:question-circle-bold-duotone" inline></iconify-icon> 궁금한 사항</a>
</nav>

<main class="hero">
  <div class="fade-up">
    <span class="eyebrow"><span class="dot"></span> LCIC · LIPA CITY COLLEGES INTERNATIONAL CAMPUS</span>
  </div>

  <h1 class="fade-up delay-1">LCIC에 오신 것을 환영합니다</h1>

  <p class="subhead fade-up delay-2">
    캠퍼스 안내, 최신 공지, 자주 묻는 질문 —<br>
    LCIC 어학연수에 필요한 모든 정보를 한곳에서 확인하세요.
  </p>

  <div class="ctas fade-up delay-3">
    <a href="gallery.html" class="btn-primary">
      <iconify-icon icon="solar:gallery-bold-duotone" inline></iconify-icon>
      갤러리 둘러보기
    </a>
    <a href="notice.html" class="btn-ghost">
      <iconify-icon icon="solar:bell-bold" inline></iconify-icon>
      공지사항 보기
    </a>
    <a href="faq.html" class="btn-ghost">
      <iconify-icon icon="solar:question-circle-bold-duotone" inline></iconify-icon>
      궁금한 사항
    </a>
  </div>
</main>

<div class="footer-strip fade-up delay-4">
  <iconify-icon icon="solar:map-point-bold"></iconify-icon>
  Lipa City · Batangas · Philippines
</div>

</body>
</html>
