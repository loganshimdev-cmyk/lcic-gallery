<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive">
<title>학생 현황 관리 · LCIC</title>
<link rel="icon" type="image/png" href="assets/brand/lcic-logo.png">
<script src="assets/background.js?v=8"></script>
<link rel="stylesheet" href="assets/shared.css?v=13">
<script src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
<style>
  .login-card {
    max-width: 420px; margin: 120px auto 0; padding: 40px 36px;
    background: var(--bg-elev); border: 1px solid var(--hairline);
    border-radius: 28px; box-shadow: var(--shadow-lg);
  }
  .login-card h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; }
  .login-card p { color: var(--text-dim); font-size: 0.88rem; margin-bottom: 24px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 0.78rem; color: var(--text-dim); margin-bottom: 7px; }

  .admin-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 18px; }
  .admin-head h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.02em; }
  .admin-head .meta { color: var(--text-dim); font-size: 0.85rem; margin-top: 4px; }
  .toolbar { display: flex; gap: 8px; align-items: center; }

  /* 탭 */
  .tabs { display: flex; gap: 6px; margin-bottom: 22px; border-bottom: 1px solid var(--hairline); }
  .tab-btn { background: none; border: none; border-bottom: 2px solid transparent; margin-bottom: -1px;
    padding: 11px 16px; font-size: 0.95rem; font-weight: 700; color: var(--text-faint); cursor: pointer; font-family: inherit;
    display: inline-flex; align-items: center; gap: 7px; }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent-deep); border-bottom-color: var(--accent); }
  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  .stat-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 18px; }
  .stat-card { flex: 1; min-width: 150px; background: var(--bg-elev); border: 1px solid var(--hairline);
    border-radius: 16px; padding: 18px 20px; box-shadow: var(--shadow-sm); }
  .stat-card .n { font-size: 2rem; font-weight: 800; letter-spacing: -0.02em; color: var(--accent-deep); }
  .stat-card .l { font-size: 0.82rem; color: var(--text-dim); margin-top: 2px; }
  .search-row { margin-bottom: 14px; }
  .search-row input { max-width: 320px; }

  .table-wrap { background: var(--bg-elev); border: 1px solid var(--hairline); border-radius: 18px; overflow: auto; box-shadow: var(--shadow-sm); }
  table { width: 100%; border-collapse: collapse; font-size: 0.86rem; }
  th, td { padding: 12px 14px; text-align: left; border-bottom: 1px solid var(--hairline); vertical-align: top; }
  th { font-size: 0.74rem; letter-spacing: 0.04em; color: var(--text-faint); text-transform: uppercase; position: sticky; top: 0; background: var(--bg-elev); white-space: nowrap; }
  tbody tr:hover { background: var(--accent-tint); }
  tbody tr.done { opacity: 0.55; }
  td.muted { color: var(--text-faint); white-space: nowrap; }
  td.nm { font-weight: 600; white-space: nowrap; }
  td.corr { min-width: 240px; white-space: pre-wrap; line-height: 1.5; }
  .cat-pill { display: inline-block; font-size: 0.72rem; font-weight: 700; padding: 3px 9px; border-radius: 999px; background: var(--accent-soft); color: var(--accent-deep); }
  .ok-pill { display: inline-block; font-size: 0.74rem; font-weight: 700; padding: 3px 10px; border-radius: 999px; background: rgba(22,163,74,0.12); color: #15803d; }
  .act-btn { background: none; border: 1px solid var(--hairline-strong); color: var(--text-dim); cursor: pointer; font-size: 0.78rem; font-weight: 600; padding: 6px 10px; border-radius: 9px; font-family: inherit; white-space: nowrap; }
  .act-btn:hover { border-color: var(--accent); color: var(--accent-deep); }
  .act-btn.done-btn.is-done { color: #15803d; border-color: rgba(22,163,74,0.4); background: rgba(22,163,74,0.08); }
  .del-btn { background: none; border: none; color: var(--text-faint); cursor: pointer; font-size: 18px; padding: 4px; border-radius: 8px; }
  .del-btn:hover { color: #dc2626; background: rgba(220,38,38,0.1); }
  .user-chip { display: inline-flex; align-items: center; gap: 6px; font-size: 0.82rem; color: var(--text-dim); }
  a.mail { color: var(--accent-deep); text-decoration: none; }
  a.mail:hover { text-decoration: underline; }
</style>
</head>
<body>

<main class="container-app" style="padding: 40px 20px 120px;">
  <!-- 로그인 -->
  <div id="login-view">
    <div class="login-card">
      <h2>관리자 로그인</h2>
      <p>학생 현황은 관리자만 열람할 수 있습니다.</p>
      <form id="login-form">
        <div class="field">
          <label>이메일</label>
          <input class="input" type="email" id="email" required autocomplete="username">
        </div>
        <div class="field">
          <label>비밀번호</label>
          <input class="input" type="password" id="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-primary" id="login-btn" style="width:100%; margin-top:6px;">
          <iconify-icon icon="solar:login-3-bold-duotone" inline></iconify-icon> 로그인
        </button>
      </form>
    </div>
  </div>

  <!-- 관리 화면 -->
  <div id="admin-view" class="hidden">
    <div class="admin-head">
      <div>
        <h1>학생 현황 관리</h1>
        <div class="meta" id="count-meta"></div>
      </div>
      <div class="toolbar">
        <span class="user-chip"><iconify-icon icon="solar:user-circle-bold-duotone"></iconify-icon> <span id="user-email"></span></span>
        <button class="btn-ghost" id="refresh-btn"><iconify-icon icon="solar:refresh-bold" inline></iconify-icon> 새로고침</button>
        <button class="btn-ghost" id="logout-btn"><iconify-icon icon="solar:logout-3-bold-duotone" inline></iconify-icon> 로그아웃</button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="reports"><iconify-icon icon="solar:danger-triangle-bold-duotone"></iconify-icon> 정정 신고</button>
      <button class="tab-btn" data-tab="course"><iconify-icon icon="solar:notebook-bookmark-bold-duotone"></iconify-icon> 수강신청 현황</button>
      <button class="tab-btn" data-tab="views"><iconify-icon icon="solar:eye-bold-duotone"></iconify-icon> 확인 현황</button>
      <button class="tab-btn" data-tab="buddy"><iconify-icon icon="solar:users-group-rounded-bold-duotone"></iconify-icon> 버디 신청</button>
    </div>

    <!-- 탭 1: 정정 신고 -->
    <div class="tab-pane active" id="pane-reports">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>접수일시</th><th>학생</th><th>이메일</th><th>항목</th>
              <th>현재 등록값</th><th>학생이 알려준 올바른 정보</th><th>첨부</th><th>상태</th><th></th>
            </tr>
          </thead>
          <tbody id="report-rows">
            <tr><td colspan="9" class="muted" style="text-align:center; padding:50px;">
              <iconify-icon icon="svg-spinners:ring-resize" inline style="font-size:22px;"></iconify-icon>
            </td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- 탭 2: 수강신청 현황 -->
    <div class="tab-pane" id="pane-course">
      <div class="stat-row">
        <div class="stat-card"><div class="n" id="stat-students">–</div><div class="l">수강신청 완료 보고 학생</div></div>
        <div class="stat-card"><div class="n" id="stat-rows">–</div><div class="l">총 보고 건수</div></div>
      </div>
      <div class="search-row">
        <input class="input" type="search" id="course-search" placeholder="이름·이메일 검색">
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>최근 보고</th><th>학생</th><th>이메일</th><th>상태</th><th></th></tr>
          </thead>
          <tbody id="course-rows">
            <tr><td colspan="5" class="muted" style="text-align:center; padding:50px;">
              <iconify-icon icon="svg-spinners:ring-resize" inline style="font-size:22px;"></iconify-icon>
            </td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- 탭 3: 확인 현황 (status.html 로그인=본인 확인) -->
    <div class="tab-pane" id="pane-views">
      <div class="stat-row">
        <div class="stat-card"><div class="n" id="stat-viewed">–</div><div class="l">준비현황 확인한 학생</div></div>
        <div class="stat-card"><div class="n" id="stat-viewrows">–</div><div class="l">총 확인 기록</div></div>
      </div>
      <div class="search-row">
        <input class="input" type="search" id="view-search" placeholder="이름·이메일 검색">
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>최근 확인</th><th>학생</th><th>이메일</th><th>상태</th><th></th></tr>
          </thead>
          <tbody id="view-rows">
            <tr><td colspan="5" class="muted" style="text-align:center; padding:50px;">
              <iconify-icon icon="svg-spinners:ring-resize" inline style="font-size:22px;"></iconify-icon>
            </td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- 탭 4: 버디 신청 -->
    <div class="tab-pane" id="pane-buddy">
      <div class="stat-row">
        <div class="stat-card"><div class="n" id="stat-buddy-students">–</div><div class="l">보고한 학생</div></div>
        <div class="stat-card"><div class="n" id="stat-buddy-week">–</div><div class="l">이번 주 미제출</div></div>
        <div class="stat-card"><div class="n" id="stat-buddy-rows">–</div><div class="l">총 제출 건수</div></div>
      </div>
      <div class="search-row">
        <input class="input" type="search" id="buddy-search" placeholder="이름·이메일 검색">
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr id="buddy-head"><th>학생</th><th>이메일</th><th>대학</th></tr></thead>
          <tbody id="buddy-rows">
            <tr><td colspan="3" class="muted" style="text-align:center; padding:50px;">
              <iconify-icon icon="svg-spinners:ring-resize" inline style="font-size:22px;"></iconify-icon>
            </td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script type="module">
import { supabase } from "./assets/supabase.js?v=4";

const $ = (id) => document.getElementById(id);
const toast = $("toast");
function showToast(msg, type = "") { toast.textContent = msg; toast.className = `toast show ${type}`; setTimeout(() => toast.classList.remove("show"), 2800); }
const esc = (s) => (s == null ? "" : String(s)).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
function fmtTime(iso) {
  if (!iso) return "";
  const d = new Date(iso); const p = (n) => String(n).padStart(2, "0");
  return `${d.getFullYear()}.${p(d.getMonth() + 1)}.${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}

let activeTab = "reports";

// ---- Auth ----
const clearAdminSession = () => { try { localStorage.removeItem("lcic-admin-auth"); } catch (_) {} };
const withTimeout = (promise, ms) => Promise.race([promise, new Promise((res) => setTimeout(() => res({ __timeout: true }), ms))]);

// 인증 상태는 onAuthStateChange 의 session 으로만 화면을 바꾼다.
// (클릭마다 getSession 을 호출하지 않으므로, 일시적 지연으로 튕겨 로그아웃되지 않는다.)
let loadedOnce = false;
function applySession(session) {
  if (session) {
    $("login-view").classList.add("hidden");
    $("admin-view").classList.remove("hidden");
    $("user-email").textContent = session.user.email;
    if (!loadedOnce) { loadedOnce = true; loadActive(); }   // 데이터는 처음 1번만 (토큰 갱신마다 재로딩 방지)
  } else {
    loadedOnce = false;
    $("admin-view").classList.add("hidden");
    $("login-view").classList.remove("hidden");
  }
}
supabase.auth.onAuthStateChange((_event, session) => applySession(session));

$("login-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = $("login-btn");
  const reset = () => { btn.disabled = false; btn.innerHTML = '<iconify-icon icon="solar:login-3-bold-duotone" inline></iconify-icon> 로그인'; };
  btn.disabled = true; btn.innerHTML = '<iconify-icon icon="svg-spinners:ring-resize" inline></iconify-icon> 로그인 중…';
  const r = await withTimeout(
    supabase.auth.signInWithPassword({ email: $("email").value.trim(), password: $("password").value }), 9000);
  if (r && r.__timeout) {   // 9초 내 응답 없으면 깨진 세션 비우고 재시도 안내
    clearAdminSession(); reset();
    showToast("세션이 멈춰 자동 복구했습니다. 한 번 더 로그인해 주세요.", "error");
    return;
  }
  reset();
  if (r.error) { showToast(`로그인 실패: ${r.error.message}`, "error"); return; }
  $("password").value = "";
  // 로그인 성공 → onAuthStateChange(SIGNED_IN) 가 applySession 호출
});
$("logout-btn").addEventListener("click", async () => { await supabase.auth.signOut(); applySession(null); });
$("refresh-btn").addEventListener("click", loadActive);

// ---- Tabs ----
document.querySelectorAll(".tab-btn").forEach((b) => {
  b.addEventListener("click", () => {
    activeTab = b.dataset.tab;
    document.querySelectorAll(".tab-btn").forEach((x) => x.classList.toggle("active", x === b));
    $("pane-reports").classList.toggle("active", activeTab === "reports");
    $("pane-course").classList.toggle("active", activeTab === "course");
    $("pane-views").classList.toggle("active", activeTab === "views");
    $("pane-buddy").classList.toggle("active", activeTab === "buddy");
    loadActive();
  });
});
function loadActive() {
  if (activeTab === "course") loadCourse();
  else if (activeTab === "views") loadViews();
  else if (activeTab === "buddy") loadBuddy();
  else loadReports();
}
function selectTab(name) {
  const b = document.querySelector(`.tab-btn[data-tab="${name}"]`);
  if (b) b.click();
}
// course-status.html → status-reports.html#course 리다이렉트 지원
if (location.hash === "#course") { activeTab = "course";
  document.querySelectorAll(".tab-btn").forEach((x) => x.classList.toggle("active", x.dataset.tab === "course"));
  $("pane-reports").classList.remove("active"); $("pane-course").classList.add("active");
}

// ================= 탭 1: 정정 신고 =================
let reportCache = [];
async function loadReports() {
  $("report-rows").innerHTML = `<tr><td colspan="9" class="muted" style="text-align:center; padding:50px;"><iconify-icon icon="svg-spinners:ring-resize" inline style="font-size:22px;"></iconify-icon></td></tr>`;
  const { data, error } = await supabase.from("status_reports").select("*").order("created_at", { ascending: false });
  if (error) { showToast(`불러오기 실패: ${error.message}`, "error"); return; }
  reportCache = data || [];
  const open = reportCache.filter((r) => !r.resolved).length;
  $("count-meta").textContent = `정정 신고 ${reportCache.length}건 · 미처리 ${open}건`;
  if (!reportCache.length) {
    $("report-rows").innerHTML = `<tr><td colspan="9" class="muted" style="text-align:center; padding:60px;">아직 접수된 신고가 없습니다.</td></tr>`;
    return;
  }
  $("report-rows").innerHTML = reportCache.map((r) => {
    const mail = r.student_email ? `<a class="mail" href="mailto:${esc(r.student_email)}">${esc(r.student_email)}</a>` : "";
    const files = Array.isArray(r.file_paths) ? r.file_paths : (r.file_path ? [r.file_path] : []);
    const fileCell = files.length
      ? files.map((fp, i) => `<button class="act-btn file-btn" data-file="${esc(fp)}" style="margin:2px 2px 2px 0;"><iconify-icon icon="solar:paperclip-2-bold" inline></iconify-icon> ${files.length > 1 ? `#${i + 1}` : "첨부 보기"}</button>`).join("")
      : '<span class="muted">—</span>';
    return `<tr class="${r.resolved ? "done" : ""}">
      <td class="muted">${esc(fmtTime(r.created_at))}</td>
      <td class="nm">${esc(r.student_name || "")}</td>
      <td>${mail}</td>
      <td><span class="cat-pill">${esc(r.category || "")}</span></td>
      <td class="muted">${esc(r.on_file || "")}</td>
      <td class="corr">${esc(r.correction || "")}</td>
      <td>${fileCell}</td>
      <td><button class="act-btn done-btn ${r.resolved ? "is-done" : ""}" data-id="${esc(r.id)}" data-done="${r.resolved ? 1 : 0}">${r.resolved ? "✓ 처리완료" : "처리하기"}</button></td>
      <td><button class="del-btn" title="삭제" data-del="${esc(r.id)}"><iconify-icon icon="solar:trash-bin-trash-bold-duotone"></iconify-icon></button></td>
    </tr>`;
  }).join("");

  document.querySelectorAll("#pane-reports .done-btn").forEach((btn) => {
    btn.addEventListener("click", async () => {
      const next = btn.dataset.done === "1" ? false : true;
      const { error } = await supabase.from("status_reports").update({ resolved: next }).eq("id", btn.dataset.id);
      if (error) { showToast(`업데이트 실패: ${error.message}`, "error"); return; }
      loadReports();
    });
  });
  document.querySelectorAll("#pane-reports .file-btn").forEach((btn) => {
    btn.addEventListener("click", async () => {
      const orig = btn.innerHTML;
      btn.disabled = true; btn.innerHTML = '<iconify-icon icon="svg-spinners:ring-resize" inline></iconify-icon> 여는 중…';
      const { data, error } = await supabase.storage.from("status-reports").createSignedUrl(btn.dataset.file, 300);
      btn.disabled = false; btn.innerHTML = orig;
      if (error || !data) { showToast(`첨부 열기 실패: ${error ? error.message : "오류"}`, "error"); return; }
      window.open(data.signedUrl, "_blank", "noopener");
    });
  });
  document.querySelectorAll("#pane-reports .del-btn").forEach((btn) => {
    btn.addEventListener("click", async () => {
      if (!confirm("이 신고를 삭제할까요? 되돌릴 수 없습니다.")) return;
      const { error } = await supabase.from("status_reports").delete().eq("id", btn.dataset.del);
      if (error) { showToast(`삭제 실패: ${error.message}`, "error"); return; }
      showToast("삭제되었습니다.", "success");
      loadReports();
    });
  });
}

// ================= 탭 2: 수강신청 현황 =================
let courseStudents = [];
$("course-search").addEventListener("input", renderCourse);
async function loadCourse() {
  $("course-rows").innerHTML = `<tr><td colspan="5" class="muted" style="text-align:center; padding:50px;"><iconify-icon icon="svg-spinners:ring-resize" inline style="font-size:22px;"></iconify-icon></td></tr>`;
  const { data, error } = await supabase.from("course_registrations").select("*").order("created_at", { ascending: false });
  if (error) { showToast(`불러오기 실패: ${error.message}`, "error"); return; }
  const rows = data || [];
  const byEmail = new Map();
  for (const r of rows) {
    const key = (r.student_email || "").trim().toLowerCase();
    if (!byEmail.has(key)) byEmail.set(key, { ...r, _ids: [r.id] });
    else byEmail.get(key)._ids.push(r.id);
  }
  courseStudents = [...byEmail.values()];
  $("stat-students").textContent = courseStudents.length;
  $("stat-rows").textContent = rows.length;
  $("count-meta").textContent = `수강신청 완료 ${courseStudents.length}명 · 총 ${rows.length}건`;
  renderCourse();
}
function renderCourse() {
  const q = ($("course-search").value || "").trim().toLowerCase();
  const list = q
    ? courseStudents.filter((s) => (s.student_name || "").toLowerCase().includes(q) || (s.student_email || "").toLowerCase().includes(q))
    : courseStudents;
  if (!list.length) {
    $("course-rows").innerHTML = `<tr><td colspan="5" class="muted" style="text-align:center; padding:60px;">${courseStudents.length ? "검색 결과가 없습니다." : "아직 수강신청 완료 보고가 없습니다."}</td></tr>`;
    return;
  }
  $("course-rows").innerHTML = list.map((s) => {
    const mail = s.student_email ? `<a class="mail" href="mailto:${esc(s.student_email)}">${esc(s.student_email)}</a>` : "";
    return `<tr>
      <td class="muted">${esc(fmtTime(s.created_at))}</td>
      <td class="nm">${esc(s.student_name || "")}</td>
      <td>${mail}</td>
      <td><span class="ok-pill">✓ 완료</span></td>
      <td><button class="del-btn" title="이 학생 보고 삭제" data-ids="${esc((s._ids || []).join(","))}"><iconify-icon icon="solar:trash-bin-trash-bold-duotone"></iconify-icon></button></td>
    </tr>`;
  }).join("");
  document.querySelectorAll("#pane-course .del-btn").forEach((btn) => {
    btn.addEventListener("click", async () => {
      if (!confirm("이 학생의 수강신청 보고를 삭제할까요?")) return;
      const ids = (btn.dataset.ids || "").split(",").filter(Boolean);
      const { error } = await supabase.from("course_registrations").delete().in("id", ids);
      if (error) { showToast(`삭제 실패: ${error.message}`, "error"); return; }
      showToast("삭제되었습니다.", "success");
      loadCourse();
    });
  });
}

// ================= 탭 3: 확인 현황 =================
let viewStudents = [];
$("view-search").addEventListener("input", renderViews);
async function loadViews() {
  $("view-rows").innerHTML = `<tr><td colspan="5" class="muted" style="text-align:center; padding:50px;"><iconify-icon icon="svg-spinners:ring-resize" inline style="font-size:22px;"></iconify-icon></td></tr>`;
  const { data, error } = await supabase.from("status_views").select("*").order("viewed_at", { ascending: false });
  if (error) { showToast(`불러오기 실패: ${error.message}`, "error"); return; }
  const rows = data || [];
  const byEmail = new Map();
  for (const r of rows) {
    const key = (r.student_email || "").trim().toLowerCase();
    if (!byEmail.has(key)) byEmail.set(key, { ...r, _ids: [r.id] });
    else byEmail.get(key)._ids.push(r.id);
  }
  viewStudents = [...byEmail.values()];
  $("stat-viewed").textContent = viewStudents.length;
  $("stat-viewrows").textContent = rows.length;
  $("count-meta").textContent = `확인한 학생 ${viewStudents.length}명 · 총 ${rows.length}회`;
  renderViews();
}
function renderViews() {
  const q = ($("view-search").value || "").trim().toLowerCase();
  const list = q
    ? viewStudents.filter((s) => (s.student_name || "").toLowerCase().includes(q) || (s.student_email || "").toLowerCase().includes(q))
    : viewStudents;
  if (!list.length) {
    $("view-rows").innerHTML = `<tr><td colspan="5" class="muted" style="text-align:center; padding:60px;">${viewStudents.length ? "검색 결과가 없습니다." : "아직 확인한 학생이 없습니다."}</td></tr>`;
    return;
  }
  $("view-rows").innerHTML = list.map((s) => {
    const mail = s.student_email ? `<a class="mail" href="mailto:${esc(s.student_email)}">${esc(s.student_email)}</a>` : "";
    return `<tr>
      <td class="muted">${esc(fmtTime(s.viewed_at))}</td>
      <td class="nm">${esc(s.student_name || "")}</td>
      <td>${mail}</td>
      <td><span class="ok-pill">✓ 확인함</span></td>
      <td><button class="del-btn" title="이 학생 확인기록 삭제" data-ids="${esc((s._ids || []).join(","))}"><iconify-icon icon="solar:trash-bin-trash-bold-duotone"></iconify-icon></button></td>
    </tr>`;
  }).join("");
  document.querySelectorAll("#pane-views .del-btn").forEach((btn) => {
    btn.addEventListener("click", async () => {
      if (!confirm("이 학생의 확인 기록을 삭제할까요?")) return;
      const ids = (btn.dataset.ids || "").split(",").filter(Boolean);
      const { error } = await supabase.from("status_views").delete().in("id", ids);
      if (error) { showToast(`삭제 실패: ${error.message}`, "error"); return; }
      showToast("삭제되었습니다.", "success");
      loadViews();
    });
  });
}

// ================= 탭 4: 버디 신청 =================
// thisWeek = 데이터에 존재하는 가장 큰 week_no(관리자 통계의 '진행 중 주차' 기준)
let buddyData = { students: [], weeks: [], thisWeek: 0 };
$("buddy-search").addEventListener("input", renderBuddy);
async function loadBuddy() {
  $("buddy-rows").innerHTML = `<tr><td colspan="3" class="muted" style="text-align:center; padding:50px;"><iconify-icon icon="svg-spinners:ring-resize" inline style="font-size:22px;"></iconify-icon></td></tr>`;
  const { data, error } = await supabase.from("buddy_checkins").select("*").order("created_at", { ascending: false });
  if (error) { showToast(`불러오기 실패: ${error.message}`, "error"); return; }
  const rows = data || [];
  const weeks = [...new Set(rows.map((r) => r.week_no).filter((n) => n != null))].sort((a, b) => a - b);
  const byEmail = new Map();
  for (const r of rows) {
    const key = (r.student_email || "").trim().toLowerCase();
    if (!byEmail.has(key)) byEmail.set(key, { name: r.student_name || "", email: r.student_email || "", uni: r.university || "", cells: {} });
    const st = byEmail.get(key);
    if (!st.name && r.student_name) st.name = r.student_name;
    // 같은 주차 재제출이면 최신(파일경로) 유지
    if (!st.cells[r.week_no]) st.cells[r.week_no] = r.file_path || "";
  }
  buddyData = { students: [...byEmail.values()], weeks, thisWeek: weeks.length ? Math.max(...weeks) : 0 };
  $("stat-buddy-students").textContent = buddyData.students.length;
  $("stat-buddy-rows").textContent = rows.length;
  const tw = buddyData.thisWeek;
  const missing = tw ? buddyData.students.filter((s) => !s.cells[tw]).length : 0;
  $("stat-buddy-week").textContent = tw ? missing : "–";
  $("count-meta").textContent = `버디 보고 ${buddyData.students.length}명 · 총 ${rows.length}건`;
  // 헤더 주차 컬럼 구성
  const head = $("buddy-head");
  head.innerHTML = `<th>학생</th><th>이메일</th><th>대학</th>` + weeks.map((w) => `<th>${w}주차</th>`).join("");
  renderBuddy();
}
function renderBuddy() {
  const q = ($("buddy-search").value || "").trim().toLowerCase();
  const weeks = buddyData.weeks;
  const list = q ? buddyData.students.filter((s) => (s.name || "").toLowerCase().includes(q) || (s.email || "").toLowerCase().includes(q)) : buddyData.students;
  if (!list.length) {
    $("buddy-rows").innerHTML = `<tr><td colspan="${3 + weeks.length}" class="muted" style="text-align:center; padding:60px;">${buddyData.students.length ? "검색 결과가 없습니다." : "아직 버디 신청 보고가 없습니다."}</td></tr>`;
    return;
  }
  $("buddy-rows").innerHTML = list.map((s) => {
    const mail = s.email ? `<a class="mail" href="mailto:${esc(s.email)}">${esc(s.email)}</a>` : "";
    const cells = weeks.map((w) => {
      const fp = s.cells[w];
      return fp
        ? `<td><button class="act-btn buddy-file-btn" data-file="${esc(fp)}"><iconify-icon icon="solar:gallery-bold" inline></iconify-icon> 보기</button></td>`
        : `<td class="muted">—</td>`;
    }).join("");
    return `<tr><td class="nm">${esc(s.name || "")}</td><td>${mail}</td><td class="muted">${esc(s.uni || "")}</td>${cells}</tr>`;
  }).join("");
  document.querySelectorAll("#pane-buddy .buddy-file-btn").forEach((b) => {
    b.addEventListener("click", async () => {
      const orig = b.innerHTML; b.disabled = true; b.innerHTML = '<iconify-icon icon="svg-spinners:ring-resize" inline></iconify-icon> 여는 중…';
      const { data, error } = await supabase.storage.from("status-reports").createSignedUrl(b.dataset.file, 300);
      b.disabled = false; b.innerHTML = orig;
      if (error || !data) { showToast(`첨부 열기 실패: ${error ? error.message : "오류"}`, "error"); return; }
      window.open(data.signedUrl, "_blank", "noopener");
    });
  });
}

// 초기 상태는 onAuthStateChange 의 INITIAL_SESSION 이벤트가 잡아준다.
// (혹시 이벤트가 늦거나 누락돼도) 안전망으로 한 번 더 확인.
(async () => {
  const r = await withTimeout(supabase.auth.getSession(), 6000);
  if (r && !r.__timeout) applySession(r.data && r.data.session);
})();
</script>
