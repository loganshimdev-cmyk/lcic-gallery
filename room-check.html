<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dorm Room Inspection · LCIC</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="assets/brand/lcic-logo.png">
<link rel="stylesheet" href="assets/shared.css?v=8">
<style>
  main { max-width: 1200px; margin: 0 auto; padding: 28px 22px 96px; }
  .auth-view { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; padding: 24px; box-sizing: border-box; }
  .login-card { width: 100%; max-width: 400px; padding: 38px 32px; border-radius: 26px; }
  .login-card h2 { margin-bottom: 6px; }
  .field { margin-bottom: 16px; }
  .field label { display:block; font-size:.78rem; color:var(--text-dim); margin-bottom:8px; }
  .hidden { display:none !important; }

  .topbar { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:22px; flex-wrap:wrap; }
  .topbar .title { font-size:1.15rem; font-weight:700; letter-spacing:-.01em; }
  .who { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .gender-badge { font-size:.72rem; font-weight:700; padding:3px 10px; border-radius:999px; text-transform:uppercase; letter-spacing:.03em; }
  .gender-badge.male   { background:rgba(37,99,235,.12); color:#1d4ed8; }
  .gender-badge.female { background:rgba(219,39,119,.12); color:#be185d; }
  .gender-badge.admin  { background:rgba(15,23,42,.08); color:var(--text-dim); }

  .pw-hint { display:flex; align-items:center; gap:12px; justify-content:space-between; background:var(--accent-tint); border:1px solid var(--accent-soft); color:var(--text-dim); font-size:.85rem; padding:11px 15px; border-radius:12px; margin-bottom:16px; }
  .pw-hint b { color:var(--text); }
  .pw-hint button { flex-shrink:0; border:none; background:none; color:var(--text-faint); font-size:1rem; cursor:pointer; padding:2px 6px; }
  .summary-bar { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:18px; }
  .chip { display:inline-flex; align-items:center; gap:8px; padding:9px 15px; border-radius:14px; background:var(--bg-elev); border:1px solid var(--hairline); font-size:.85rem; cursor:pointer; transition:border-color .15s, box-shadow .15s; }
  .chip:hover { border-color:var(--accent); }
  .chip.active { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
  .chip b { font-size:1rem; font-weight:700; }
  .chip .dot { width:9px; height:9px; border-radius:50%; }
  .dot.ok { background:#16a34a; } .dot.issue { background:#dc2626; } .dot.none { background:#94a3b8; } .dot.all { background:var(--accent); }

  .filters { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:18px; }
  .filters input, .filters select { padding:10px 13px; border:1px solid var(--hairline); border-radius:12px; background:var(--bg-elev); color:var(--text); font-family:inherit; font-size:.88rem; }
  .filters input { flex:1; min-width:160px; }
  .filters input:focus, .filters select:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }

  .rooms { display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:14px; }
  .room { background:var(--bg-elev); border:1px solid var(--hairline); border-radius:16px; padding:16px 18px; cursor:pointer; transition:box-shadow .18s, transform .18s, border-color .18s; }
  .room:hover { box-shadow:0 5px 16px rgba(15,23,42,.10); transform:translateY(-1px); }
  .room .rnum { font-size:1.25rem; font-weight:700; letter-spacing:-.01em; }
  .room .rmeta { font-size:.78rem; color:var(--text-faint); margin-top:2px; }
  .room .status { display:inline-flex; align-items:center; gap:6px; margin-top:12px; font-size:.78rem; font-weight:600; padding:5px 11px; border-radius:999px; }
  .status.s-none  { background:rgba(148,163,184,.14); color:#64748b; }
  .status.s-ok    { background:rgba(22,163,74,.12);  color:#15803d; }
  .status.s-issue { background:rgba(220,38,38,.10);  color:#b91c1c; }
  .status.s-occupied { background:rgba(217,119,6,.12); color:#b45309; }
  .dot.occupied { background:#d97706; }
  .room.occupied { border-color:rgba(217,119,6,.35); }
  .status.s-resolved { background:rgba(13,148,136,.12); color:#0f766e; }
  .dot.resolved { background:#0d9488; }
  .room.resolved { border-color:rgba(13,148,136,.30); }
  .gender-badge.handler { background:rgba(13,148,136,.12); color:#0f766e; }
  .issue-card.done { opacity:.7; }
  .resolved-line { margin-top:8px; font-size:.8rem; color:#0f766e; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .link-btn { border:none; background:none; color:var(--accent); cursor:pointer; font-size:.78rem; text-decoration:underline; padding:0; font-family:inherit; }
  .room .last { font-size:.72rem; color:var(--text-faint); margin-top:8px; }
  .room.issue { border-color:rgba(220,38,38,.35); }
  .empty { text-align:center; color:var(--text-faint); padding:60px 20px; }

  /* modal */
  .modal-bg { position:fixed; inset:0; background:rgba(15,23,42,.45); backdrop-filter:blur(3px); display:flex; align-items:flex-end; justify-content:center; z-index:9000; animation:fade .2s ease; }
  @media (min-width:720px){ .modal-bg { align-items:center; padding:20px; } }
  @keyframes fade { from { opacity:0; } to { opacity:1; } }
  .modal { background:#fff; width:100%; max-width:560px; max-height:92vh; overflow:auto; border-radius:24px 24px 0 0; padding:26px 22px 0; box-shadow:0 -8px 40px rgba(15,23,42,.22); animation:pop .22s cubic-bezier(.16,1,.3,1); }
  @media (min-width:720px){ .modal { border-radius:22px; padding:28px 28px 0; } }
  @keyframes pop { from { transform:translateY(16px); opacity:.6; } to { transform:none; opacity:1; } }
  .modal h3 { font-size:1.35rem; font-weight:700; letter-spacing:-.01em; }
  .modal .sub { color:var(--text-dim); font-size:.85rem; margin:3px 0 14px; }
  .cluster-note { background:var(--accent-tint); border:1px solid var(--accent-soft); color:var(--text-dim); font-size:.8rem; line-height:1.5; padding:10px 13px; border-radius:12px; margin-bottom:18px; }
  .cluster-note b { color:var(--text); }

  .check-item { border:1px solid var(--hairline); border-radius:14px; padding:14px 15px; margin-bottom:12px; transition:border-color .18s, background .18s; }
  .check-item.problem { border-color:rgba(220,38,38,.4); background:rgba(220,38,38,.03); }
  .check-item .clabel { font-size:.9rem; font-weight:600; line-height:1.4; margin-bottom:10px; }
  .seg { display:inline-flex; border:1px solid var(--hairline); border-radius:10px; overflow:hidden; }
  .seg button { border:none; background:var(--bg-elev); padding:7px 18px; font-size:.82rem; font-weight:700; cursor:pointer; color:var(--text-dim); font-family:inherit; }
  .seg button.on.ok { background:#16a34a; color:#fff; }
  .seg button.on.problem { background:#dc2626; color:#fff; }
  .detail { width:100%; margin-top:11px; padding:10px 12px; border:1px solid var(--hairline); border-radius:10px; font-family:inherit; font-size:.88rem; background:#fff; box-sizing:border-box; resize:vertical; min-height:56px; }
  .detail:focus { outline:none; border-color:#dc2626; box-shadow:0 0 0 3px rgba(220,38,38,.12); }

  .gnote { width:100%; padding:12px 14px; border:1px solid var(--hairline); border-radius:12px; font-family:inherit; font-size:.9rem; box-sizing:border-box; resize:vertical; min-height:64px; background:#f8fafc; }
  .gnote:focus { outline:none; border-color:var(--accent); background:#fff; box-shadow:0 0 0 3px var(--accent-soft); }

  .save-bar { position:sticky; bottom:0; background:#fff; padding:16px 0; margin-top:8px; display:flex; flex-direction:column; gap:9px; border-top:1px solid var(--hairline); }
  .save-row { display:flex; gap:10px; }
  .save-row .btn-primary { flex:1; }
  .occ-btn { width:100%; padding:11px; border-radius:12px; border:1px solid rgba(217,119,6,.45); background:rgba(217,119,6,.07); color:#b45309; font-weight:700; font-size:.9rem; font-family:inherit; cursor:pointer; }
  .occ-btn:hover { background:rgba(217,119,6,.13); }

  /* read-only report */
  .rep-item { display:flex; gap:10px; padding:11px 0; border-top:1px solid var(--hairline); font-size:.88rem; }
  .rep-item .mark { flex-shrink:0; width:22px; height:22px; border-radius:7px; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:.8rem; }
  .rep-item .mark.ok { background:rgba(22,163,74,.12); color:#16a34a; }
  .rep-item .mark.problem { background:rgba(220,38,38,.12); color:#dc2626; }
  .rep-item .rd { color:var(--text-dim); font-size:.82rem; margin-top:3px; white-space:pre-wrap; }

  .toast { position:fixed; top:24px; bottom:auto; height:auto; width:max-content; left:50%; transform:translateX(-50%); background:#111; color:#fff; font-weight:600; font-size:.92rem; padding:12px 22px; border-radius:13px; box-shadow:0 8px 24px rgba(0,0,0,.25); opacity:0; transition:opacity .25s; pointer-events:none; z-index:100000; max-width:90vw; text-align:center; }
  .toast.show { opacity:1; }
  .toast.error { background:#dc2626; } .toast.success { background:#059669; }

  /* ---- admin dashboard ---- */
  #admin-dash { margin-bottom:22px; }
  .dash-head { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:14px; flex-wrap:wrap; }
  .dash-title { font-size:1.05rem; font-weight:700; display:inline; }
  .print-date { color:var(--text-faint); font-size:.8rem; margin-left:10px; }
  .charts { display:grid; grid-template-columns:repeat(auto-fit, minmax(240px, 1fr)); gap:14px; margin-bottom:18px; }
  .chart-card { background:var(--bg-elev); border:1px solid var(--hairline); border-radius:16px; padding:16px 18px; }
  .chart-title { font-size:.85rem; font-weight:700; color:var(--text-dim); margin-bottom:14px; }
  .donut { width:132px; height:132px; border-radius:50%; margin:2px auto 14px; display:flex; align-items:center; justify-content:center; }
  .donut-hole { width:94px; height:94px; border-radius:50%; background:var(--bg-elev); display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .donut-hole b { font-size:1.5rem; font-weight:800; letter-spacing:-.02em; }
  .donut-hole span { font-size:.72rem; color:var(--text-faint); }
  .chart-legend { display:flex; flex-direction:column; gap:5px; font-size:.78rem; color:var(--text-dim); }
  .chart-legend i.dot { display:inline-block; width:9px; height:9px; border-radius:3px; margin-right:6px; vertical-align:middle; }
  .bar-row { display:flex; align-items:center; gap:10px; margin-bottom:9px; font-size:.8rem; }
  .bar-label { width:96px; flex-shrink:0; color:var(--text-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .bar-track { flex:1; height:9px; background:var(--hairline); border-radius:6px; overflow:hidden; }
  .bar-fill { display:block; height:100%; background:var(--accent); border-radius:6px; }
  .bar-fill.red { background:#dc2626; }
  .bar-val { width:52px; text-align:right; flex-shrink:0; color:var(--text-faint); font-variant-numeric:tabular-nums; }

  .panel { background:var(--bg-elev); border:1px solid var(--hairline); border-radius:16px; padding:16px 18px; margin-bottom:16px; }
  .panel h4 { font-size:.9rem; font-weight:700; margin-bottom:12px; }
  .ins-table { display:flex; flex-direction:column; }
  .ins-row { display:grid; grid-template-columns:1.4fr .7fr .6fr .6fr .6fr .6fr 1.4fr; gap:8px; align-items:center; padding:8px 4px; border-top:1px solid var(--hairline); font-size:.82rem; font-variant-numeric:tabular-nums; }
  .ins-row.head { border-top:none; color:var(--text-faint); font-size:.72rem; text-transform:uppercase; letter-spacing:.03em; }
  .ins-row .uname { font-weight:600; }
  .ins-row .has { color:#dc2626; font-weight:700; }
  .pbar { position:relative; height:16px; background:var(--hairline); border-radius:8px; overflow:hidden; display:flex; align-items:center; }
  .pbar-fill { position:absolute; left:0; top:0; height:100%; background:var(--accent); border-radius:8px; }
  .pbar em { position:relative; margin-left:8px; font-style:normal; font-size:.7rem; color:var(--text); z-index:1; }

  .issue-card { border-top:1px solid var(--hairline); padding:11px 0; }
  .issue-head { display:flex; gap:10px; align-items:baseline; flex-wrap:wrap; margin-bottom:5px; }
  .issue-head b { font-size:1rem; }
  .issue-head span { font-size:.76rem; color:var(--text-faint); }
  .issue-item { font-size:.82rem; color:var(--text-dim); padding:2px 0 2px 2px; }
  .muted { color:var(--text-faint); font-size:.85rem; }
  .print-only { display:none; }

  @media print {
    body { background:#fff; }
    .topbar .who, #pw-hint, .filters, #rooms, #empty, #summary-bar, #print-btn, .toast { display:none !important; }
    main { max-width:none; padding:0; }
    #admin-dash { display:block !important; margin:0; }
    .chart-card, .panel, .issue-card, .ins-row { break-inside:avoid; }
    .chart-card, .panel { border-color:#ddd; box-shadow:none; }
    .print-only { display:inline; }
    .donut { print-color-adjust:exact; -webkit-print-color-adjust:exact; }
    .bar-fill, .pbar-fill, .donut { -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  }
</style>
</head>
<body>

<!-- Login -->
<div id="login-view" class="auth-view hidden">
  <div class="login-card glass">
    <h2>Dorm Inspection</h2>
    <p style="color:var(--text-dim); font-size:.88rem; margin-bottom:22px;">Sign in with your inspector account.</p>
    <form id="login-form">
      <div class="field"><label>Username</label><input id="username" class="input" type="text" autocomplete="username" required placeholder="e.g. john"></div>
      <div class="field"><label>Password</label><input id="password" class="input" type="password" autocomplete="current-password" required></div>
      <button class="btn-primary" type="submit" style="width:100%;">Sign in</button>
    </form>
  </div>
</div>

<!-- First-login name registration -->
<div id="register-view" class="auth-view hidden">
  <div class="login-card glass">
    <h2>Welcome 👋</h2>
    <p style="color:var(--text-dim); font-size:.88rem; margin-bottom:22px;">Please enter your name so your work is credited.</p>
    <form id="register-form">
      <div class="field"><label>Your name</label><input id="reg-name" class="input" type="text" required placeholder="e.g. Juan Dela Cruz"></div>
      <button class="btn-primary" type="submit" style="width:100%;">Start</button>
    </form>
  </div>
</div>

<!-- App -->
<main id="app-view" class="hidden">
  <div class="topbar">
    <div class="title">Dorm Room Inspection</div>
    <div class="who">
      <span id="me-name" style="font-size:.9rem; color:var(--text-dim);"></span>
      <span id="me-badge" class="gender-badge"></span>
      <button id="refresh-btn" class="btn-ghost" style="font-size:.78rem;">↻ Refresh</button>
      <button id="pw-btn" class="btn-ghost" style="font-size:.78rem;">Password</button>
      <button id="logout-btn" class="btn-ghost" style="font-size:.78rem;">Sign out</button>
    </div>
  </div>

  <div id="pw-hint" class="pw-hint hidden">
    <span>🔑 First time here? Please set your own password using the <b>Password</b> button above.</span>
    <button id="pw-hint-x" title="Dismiss">✕</button>
  </div>

  <div id="summary-bar" class="summary-bar"></div>

  <div id="handler-view" class="hidden"></div>

  <div id="admin-dash" class="hidden">
    <div class="dash-head">
      <div><h3 class="dash-title">Inspection Dashboard</h3><span id="print-date" class="print-date"></span></div>
      <button id="print-btn" class="btn-ghost">🖨 Print report</button>
    </div>
    <div id="charts" class="charts"></div>
    <div id="inspectors" class="panel"></div>
    <div id="issues-list" class="panel"></div>
  </div>

  <div class="filters" id="filters">
    <input id="f-search" type="text" placeholder="Search room number or building…">
    <select id="f-building"><option value="">All buildings</option></select>
    <select id="f-gender" class="hidden">
      <option value="">All genders</option>
      <option value="male">Male</option>
      <option value="female">Female</option>
    </select>
    <select id="f-status">
      <option value="">All statuses</option>
      <option value="none">Not inspected</option>
      <option value="ok">OK</option>
      <option value="issue">Issues (open)</option>
      <option value="resolved">Resolved</option>
      <option value="occupied">Occupied</option>
    </select>
  </div>

  <div id="rooms" class="rooms"></div>
  <div id="empty" class="empty hidden">No rooms match your filters.</div>
</main>

<div id="modal-root"></div>
<div class="toast" id="toast"></div>

<script type="module">
import {
  myInspector, login, logout, changePassword, setInspectorName,
  listRooms, listInspections, latestByRoom, saveInspection, CHECK_ITEMS,
  resolveIssue, reopenIssue,
} from "./assets/room-check-data.js?v=7";
import { formatDate } from "./assets/supabase.js?v=4";

const $ = (id) => document.getElementById(id);
const root = $("modal-root");
const toast = $("toast");
function showToast(msg, type = "") {
  toast.textContent = msg; toast.className = `toast show ${type}`;
  setTimeout(() => toast.classList.remove("show"), 2400);
}

let me = null;
let rooms = [];
let latest = new Map();          // room_id -> latest inspection
const filters = { q: "", building: "", gender: "", status: "", showResolved: false };

// ---- status helpers ---------------------------------------------------------
function statusOf(room) {
  const rec = latest.get(room.id);
  if (!rec) return "none";
  if (rec.status === "occupied") return "occupied";
  if (rec.has_issues) return rec.resolved ? "resolved" : "issue";
  return "ok";
}
const STATUS_LABEL = { none: "Not inspected", ok: "OK", issue: "Issues", occupied: "Occupied", resolved: "Resolved" };

// ---- auth flow --------------------------------------------------------------
function show(view) {
  $("login-view").classList.toggle("hidden", view !== "login");
  $("register-view").classList.toggle("hidden", view !== "register");
  $("app-view").classList.toggle("hidden", view !== "app");
}

async function boot() {
  me = myInspector();
  if (!me) { show("login"); return; }
  if (!me.name) { show("register"); return; }
  show("app");
  $("me-name").textContent = me.name;
  const g = me.role === "admin" ? "admin" : me.role === "handler" ? "handler" : (me.gender || "admin");
  $("me-badge").textContent = me.role === "admin" ? "Admin" : me.role === "handler" ? "Handler" : (me.gender || "");
  $("me-badge").className = `gender-badge ${g}`;
  $("f-gender").classList.toggle("hidden", me.role !== "admin");
  $("pw-hint").classList.toggle("hidden", me.role === "admin" || !!localStorage.getItem("lcic-dorm-pw-hint"));
  await loadData();
}

async function loadData() {
  [rooms] = await Promise.all([listRooms(me)]);
  const inspections = await listInspections();
  latest = latestByRoom(inspections);
  // building filter options
  const buildings = [...new Set(rooms.map((r) => r.building).filter(Boolean))].sort();
  $("f-building").innerHTML = `<option value="">All buildings</option>` +
    buildings.map((b) => `<option value="${esc(b)}">${esc(b)}</option>`).join("");
  render();
}

// ---- rendering --------------------------------------------------------------
function render() {
  const handler = me && me.role === "handler";
  $("handler-view").classList.toggle("hidden", !handler);
  $("summary-bar").classList.toggle("hidden", handler);
  $("filters").classList.toggle("hidden", handler);
  $("rooms").classList.toggle("hidden", handler);
  if (handler) {
    $("admin-dash").classList.add("hidden");
    $("empty").classList.add("hidden");
    renderHandlerView();
    return;
  }
  renderSummary();
  renderAdminDashboard();
  renderRooms();
}

// ---- handler view (issue resolution) ----------------------------------------
function renderHandlerView() {
  const open = [], done = [];
  for (const r of rooms) {
    const rec = latest.get(r.id);
    if (rec && rec.has_issues) (rec.resolved ? done : open).push({ r, rec });
  }
  const cardHtml = ({ r, rec }, resolved) => {
    const probs = (rec.items || []).filter((i) => i.status === "problem");
    return `<div class="issue-card ${resolved ? "done" : ""}">
      <div class="issue-head"><b>${esc(r.room_number)}</b>
        <span>${esc(r.building)}${r.floor ? " · Floor " + r.floor : ""} · found by ${esc(rec.inspector_name || "")} · ${formatDate(rec.inspected_at)}</span></div>
      ${probs.map((pp) => `<div class="issue-item">⚠️ <b>${esc(SHORT[pp.key] || pp.key)}</b>${pp.detail ? ` — ${esc(pp.detail)}` : ""}</div>`).join("")}
      ${rec.general_note ? `<div class="issue-item" style="color:var(--text-faint)">📝 ${esc(rec.general_note)}</div>` : ""}
      ${resolved
        ? `<div class="resolved-line">✅ Resolved by ${esc(rec.resolved_by || "")} · ${formatDate(rec.resolved_at)}${rec.resolution_note ? ` — ${esc(rec.resolution_note)}` : ""} <button class="link-btn" data-reopen="${rec.id}">Reopen</button></div>`
        : `<div style="margin-top:9px;"><button class="btn-primary resolve-btn" data-id="${rec.id}" data-room="${esc(r.room_number)}">✅ Mark resolved</button></div>`}
    </div>`;
  };
  $("handler-view").innerHTML = `
    <div class="dash-head"><div><h3 class="dash-title">Issues to fix</h3></div>
      <label style="font-size:.82rem; color:var(--text-dim); display:flex; align-items:center; gap:6px;">
        <input type="checkbox" id="show-resolved" ${filters.showResolved ? "checked" : ""}> Show resolved</label></div>
    <div class="panel"><h4>Open (${open.length})</h4>
      ${open.length ? open.map((x) => cardHtml(x, false)).join("") : `<div class="muted">No open issues 🎉</div>`}</div>
    ${filters.showResolved ? `<div class="panel"><h4>Resolved (${done.length})</h4>
      ${done.length ? done.map((x) => cardHtml(x, true)).join("") : `<div class="muted">None yet.</div>`}</div>` : ""}`;
  $("show-resolved").addEventListener("change", (e) => { filters.showResolved = e.target.checked; renderHandlerView(); });
  $("handler-view").querySelectorAll(".resolve-btn").forEach((b) =>
    b.addEventListener("click", () => openResolve(b.dataset.id, b.dataset.room)));
  $("handler-view").querySelectorAll("[data-reopen]").forEach((b) =>
    b.addEventListener("click", async () => {
      try { await reopenIssue(b.dataset.reopen); showToast("Reopened", "success"); await loadData(); }
      catch (err) { showToast(err.message || "Failed", "error"); }
    }));
}

function openResolve(inspectionId, roomNum) {
  root.innerHTML = `<div class="modal-bg"><div class="modal" style="max-width:420px;">
    <h3 style="font-size:1.15rem;">Resolve — Room ${esc(roomNum)}</h3>
    <div class="sub">What did you fix? (optional)</div>
    <textarea id="res-note" class="gnote" placeholder="e.g. Replaced aircon remote, fixed door lock"></textarea>
    <div class="save-bar"><div class="save-row">
      <button id="res-cancel" class="btn-ghost">Cancel</button>
      <button id="res-save" class="btn-primary">✅ Mark resolved</button>
    </div></div>
  </div></div>`;
  const close = () => (root.innerHTML = "");
  root.querySelector("#res-cancel").onclick = close;
  root.querySelector(".modal-bg").onclick = (e) => { if (e.target.classList.contains("modal-bg")) close(); };
  root.querySelector("#res-save").onclick = async () => {
    const btn = root.querySelector("#res-save"); btn.disabled = true;
    try {
      await resolveIssue(inspectionId, root.querySelector("#res-note").value);
      close(); showToast("Issue resolved", "success"); await loadData();
    } catch (err) { btn.disabled = false; showToast(err.message || "Failed", "error"); }
  };
}

// ---- admin dashboard --------------------------------------------------------
const SHORT = { aircon:"Aircon", electrical:"Electrical", openings:"Doors/Win/Safe",
                furniture:"Furniture", structure:"Walls/Floor", other:"Clean/Other" };
const cap = (s) => (s ? s.charAt(0).toUpperCase() + s.slice(1) : s);

function donutCard(title, inspected, occupied, total, issues, resolved) {
  const handled = inspected + occupied;
  const pct = total ? Math.round(handled / total * 100) : 0;
  const dI = total ? inspected / total * 360 : 0;
  const dO = total ? occupied / total * 360 : 0;
  const g = `conic-gradient(var(--accent) 0 ${dI}deg, #d97706 ${dI}deg ${dI + dO}deg, var(--hairline) ${dI + dO}deg 360deg)`;
  return `<div class="chart-card"><div class="chart-title">${title}</div>
    <div class="donut" style="background:${g}">
      <div class="donut-hole"><b>${pct}%</b><span>${handled}/${total}</span></div>
    </div>
    <div class="chart-legend">
      <span><i class="dot" style="background:var(--accent)"></i>Inspected ${inspected}</span>
      <span><i class="dot" style="background:#d97706"></i>Occupied ${occupied}</span>
      <span><i class="dot" style="background:var(--hairline-strong)"></i>Remaining ${total - handled}</span>
      <span><i class="dot" style="background:#dc2626"></i>Open issues ${issues}</span>
      <span><i class="dot" style="background:#0d9488"></i>Resolved ${resolved}</span>
    </div></div>`;
}
function barsCard(title, rows) {
  return `<div class="chart-card"><div class="chart-title">${title}</div>
    ${rows.map((r) => { const p = r.total ? Math.round(r.inspected / r.total * 100) : 0;
      return `<div class="bar-row"><span class="bar-label">${esc(r.label)}</span>
        <span class="bar-track"><span class="bar-fill" style="width:${p}%"></span></span>
        <span class="bar-val">${r.inspected}/${r.total}</span></div>`; }).join("")}
  </div>`;
}
function catCard(title, cats) {
  const max = Math.max(1, ...cats.map((c) => c.count));
  return `<div class="chart-card"><div class="chart-title">${title}</div>
    ${cats.map((c) => { const p = Math.round(c.count / max * 100);
      return `<div class="bar-row"><span class="bar-label">${esc(c.short)}</span>
        <span class="bar-track"><span class="bar-fill red" style="width:${p}%"></span></span>
        <span class="bar-val">${c.count}</span></div>`; }).join("")}
  </div>`;
}

function renderAdminDashboard() {
  const isAdmin = me && me.role === "admin";
  $("admin-dash").classList.toggle("hidden", !isAdmin);
  if (!isAdmin) return;

  const total = rooms.length;
  let inspected = 0, openIssues = 0, resolvedIssues = 0, occupied = 0;
  const buildings = {}, insMap = {};
  const cats = CHECK_ITEMS.map((ci) => ({ key: ci.key, short: SHORT[ci.key] || ci.key, count: 0 }));
  const cix = Object.fromEntries(cats.map((c, i) => [c.key, i]));

  for (const r of rooms) {
    const rec = latest.get(r.id);
    const b = r.building || "—";
    buildings[b] ??= { inspected: 0, occupied: 0, total: 0 };
    buildings[b].total++;
    const u = r.assigned_username;
    if (u) { insMap[u] ??= { assigned: 0, inspected: 0, issues: 0, occupied: 0 }; insMap[u].assigned++; }
    if (!rec) continue;
    if (rec.status === "occupied") {
      occupied++; buildings[b].occupied++; if (u) insMap[u].occupied++;
    } else {
      inspected++; buildings[b].inspected++;
      if (u) insMap[u].inspected++;
      if (rec.has_issues) {
        if (u) insMap[u].issues++;
        if (rec.resolved) resolvedIssues++; else openIssues++;
        (rec.items || []).forEach((it) => { if (it.status === "problem" && it.key in cix) cats[cix[it.key]].count++; });
      }
    }
  }

  $("charts").innerHTML =
    donutCard("Overall progress", inspected, occupied, total, openIssues, resolvedIssues) +
    barsCard("Progress by building", Object.entries(buildings).sort().map(([label, v]) => ({ label, inspected: v.inspected + v.occupied, total: v.total }))) +
    catCard("Issues by item", cats);

  const inspectors = Object.keys(insMap).sort();
  $("inspectors").innerHTML = `<h4>Per-inspector progress</h4>
    <div class="ins-table">
      <div class="ins-row head"><span>Inspector</span><span>Assigned</span><span>Done</span><span>Occ.</span><span>Left</span><span>Issues</span><span>Progress</span></div>
      ${inspectors.map((u) => { const v = insMap[u]; const handled = v.inspected + (v.occupied || 0); const p = v.assigned ? Math.round(handled / v.assigned * 100) : 0;
        return `<div class="ins-row"><span class="uname">${esc(cap(u))}</span><span>${v.assigned}</span><span>${v.inspected}</span><span>${v.occupied || 0}</span><span>${v.assigned - v.inspected - (v.occupied || 0)}</span><span class="${v.issues ? "has" : ""}">${v.issues}</span>
          <span class="pbar"><span class="pbar-fill" style="width:${p}%"></span><em>${p}%</em></span></div>`; }).join("")}
    </div>`;

  const issueRooms = rooms.filter((r) => latest.get(r.id)?.has_issues)
    .sort((a, b) => (latest.get(a.id).resolved ? 1 : 0) - (latest.get(b.id).resolved ? 1 : 0));
  $("issues-list").innerHTML = `<h4>Issues found (${openIssues} open · ${resolvedIssues} resolved)</h4>` +
    (issueRooms.length ? issueRooms.map((r) => { const rec = latest.get(r.id);
      const probs = (rec.items || []).filter((i) => i.status === "problem");
      return `<div class="issue-card ${rec.resolved ? "done" : ""}"><div class="issue-head"><b>${esc(r.room_number)}</b>
        <span>${esc(r.building)} · ${esc(rec.inspector_name || "")} · ${formatDate(rec.inspected_at)}</span></div>
        ${probs.map((pp) => `<div class="issue-item">⚠️ ${esc(SHORT[pp.key] || pp.key)}${pp.detail ? ` — ${esc(pp.detail)}` : ""}</div>`).join("")}
        ${rec.resolved ? `<div class="resolved-line">✅ Resolved by ${esc(rec.resolved_by || "")} · ${formatDate(rec.resolved_at)}${rec.resolution_note ? ` — ${esc(rec.resolution_note)}` : ""}</div>` : ""}</div>`;
    }).join("") : `<div class="muted">No issues reported yet.</div>`);

  const pd = $("print-date");
  if (pd && !pd.textContent) pd.textContent = new Date().toLocaleDateString();
}

function renderSummary() {
  const total = rooms.length;
  let ok = 0, issue = 0, none = 0, occ = 0, resolved = 0;
  for (const r of rooms) {
    const s = statusOf(r);
    if (s === "ok") ok++; else if (s === "issue") issue++;
    else if (s === "resolved") resolved++;
    else if (s === "occupied") occ++; else none++;
  }
  const chip = (key, dot, label, n) =>
    `<div class="chip ${filters.status === key ? "active" : ""}" data-status="${key}">
       <span class="dot ${dot}"></span><b>${n}</b> ${label}</div>`;
  $("summary-bar").innerHTML =
    chip("", "all", "Total", total) +
    chip("ok", "ok", "OK", ok) +
    chip("issue", "issue", "Issues", issue) +
    chip("resolved", "resolved", "Resolved", resolved) +
    chip("occupied", "occupied", "Occupied", occ) +
    chip("none", "none", "Not inspected", none);
  $("summary-bar").querySelectorAll(".chip").forEach((c) =>
    c.addEventListener("click", () => {
      filters.status = c.dataset.status;
      $("f-status").value = c.dataset.status;
      render();
    }));
}

function filtered() {
  return rooms.filter((r) => {
    if (filters.building && r.building !== filters.building) return false;
    if (filters.gender && r.gender !== filters.gender) return false;
    if (filters.status && statusOf(r) !== filters.status) return false;
    if (filters.q) {
      const hay = `${r.room_number} ${r.building || ""}`.toLowerCase();
      if (!hay.includes(filters.q.toLowerCase())) return false;
    }
    return true;
  });
}

function renderRooms() {
  const list = filtered();
  $("empty").classList.toggle("hidden", list.length > 0);
  $("rooms").innerHTML = list.map((r) => {
    const s = statusOf(r);
    const rec = latest.get(r.id);
    const typeShort = r.room_type === "quad" ? "4-person" : "Single";
    const meta = [r.building, typeShort].filter(Boolean).join(" · ");
    const last = rec ? `Last: ${formatDate(rec.inspected_at)} · ${esc(rec.inspector_name || "")}` : "";
    return `<div class="room ${s === "issue" ? "issue" : s === "occupied" ? "occupied" : s === "resolved" ? "resolved" : ""}" data-id="${r.id}">
      <div class="rnum">${esc(r.room_number)}</div>
      <div class="rmeta">${esc(meta) || "&nbsp;"}</div>
      <div class="status s-${s}"><span class="dot ${s === "none" ? "none" : s}"></span>${STATUS_LABEL[s]}</div>
      <div class="last">${esc(last)}</div>
    </div>`;
  }).join("");
  $("rooms").querySelectorAll(".room").forEach((el) =>
    el.addEventListener("click", () => openRoom(el.dataset.id)));
}

// ---- open a room: inspectors edit, admins view report -----------------------
function openRoom(roomId) {
  const room = rooms.find((r) => r.id === roomId);
  if (!room) return;
  if (me.role === "admin") openReport(room);
  else openInspectForm(room);
}

// ---- inspection form (create / re-inspect) ----------------------------------
function openInspectForm(room) {
  const prev = latest.get(room.id);
  const prevItems = prev && Array.isArray(prev.items) ? prev.items : [];
  const state = CHECK_ITEMS.map((ci) => {
    const p = prevItems.find((x) => x.key === ci.key);
    return { key: ci.key, label: ci.label, status: p ? p.status : "ok", detail: p ? (p.detail || "") : "" };
  });
  let gnote = prev ? (prev.general_note || "") : "";

  const typeLabel = room.room_type === "quad" ? "4-person room" : "Single room";
  const meta = [room.building, room.floor ? `Floor ${room.floor}` : null, typeLabel].filter(Boolean).join(" · ");
  root.innerHTML = `<div class="modal-bg"><div class="modal">
    <h3>Room ${esc(room.room_number)}</h3>
    <div class="sub">${esc(meta)}${prev ? " · re-inspecting" : ""}</div>
    <div id="items"></div>
    <label style="font-size:.78rem; color:var(--text-dim); display:block; margin:6px 0 8px;">General note (optional)</label>
    <textarea id="gnote" class="gnote" placeholder="Anything else about this cluster…">${esc(gnote)}</textarea>
    <div class="save-bar">
      <button id="occupied" class="occ-btn">🚪 Someone inside — can't check now</button>
      <div class="save-row">
        <button id="cancel" class="btn-ghost">Cancel</button>
        <button id="save" class="btn-primary">Save inspection</button>
      </div>
    </div>
  </div></div>`;

  const itemsEl = root.querySelector("#items");
  function drawItems() {
    itemsEl.innerHTML = state.map((it, i) => `
      <div class="check-item ${it.status === "problem" ? "problem" : ""}" data-i="${i}">
        <div class="clabel">${esc(it.label)}</div>
        <div class="seg">
          <button type="button" class="ok ${it.status === "ok" ? "on" : ""}" data-set="ok">OK</button>
          <button type="button" class="problem ${it.status === "problem" ? "on" : ""}" data-set="problem">Problem</button>
        </div>
        ${it.status === "problem"
          ? `<textarea class="detail" placeholder="Describe the problem…">${esc(it.detail)}</textarea>`
          : ""}
      </div>`).join("");
    itemsEl.querySelectorAll(".check-item").forEach((row) => {
      const i = +row.dataset.i;
      row.querySelectorAll(".seg button").forEach((b) =>
        b.addEventListener("click", () => {
          state[i].status = b.dataset.set;
          drawItems();
        }));
      const d = row.querySelector(".detail");
      if (d) d.addEventListener("input", () => { state[i].detail = d.value; });
    });
  }
  drawItems();

  const close = () => (root.innerHTML = "");
  root.querySelector("#cancel").onclick = close;
  root.querySelector(".modal-bg").onclick = (e) => {
    if (e.target.classList.contains("modal-bg")) close();
  };
  root.querySelector("#save").onclick = async () => {
    const btn = root.querySelector("#save");
    btn.disabled = true;
    try {
      const items = state.map((it) => ({
        key: it.key, label: it.label, status: it.status,
        detail: it.status === "problem" ? (it.detail || "").trim() : "",
      }));
      await saveInspection({ room_id: room.id, items, general_note: root.querySelector("#gnote").value });
      close();
      showToast("Inspection saved", "success");
      await loadData();
    } catch (err) {
      btn.disabled = false;
      showToast(err.message || "Save failed", "error");
    }
  };
  root.querySelector("#occupied").onclick = async () => {
    const btn = root.querySelector("#occupied");
    btn.disabled = true;
    try {
      await saveInspection({ room_id: room.id, items: [], general_note: root.querySelector("#gnote").value, status: "occupied" });
      close();
      showToast("Marked as occupied — check again later", "success");
      await loadData();
    } catch (err) {
      btn.disabled = false;
      showToast(err.message || "Save failed", "error");
    }
  };
}

// ---- read-only report (admin) ----------------------------------------------
function openReport(room) {
  const rec = latest.get(room.id);
  const typeLabel = room.room_type === "quad" ? "4-person room" : "Single room";
  const meta = [room.building, room.floor ? `Floor ${room.floor}` : null, typeLabel,
                room.assigned_username ? `Assigned: ${room.assigned_username}` : null].filter(Boolean).join(" · ");
  let body;
  if (!rec) {
    body = `<div class="empty" style="padding:40px 10px;">Not inspected yet.</div>`;
  } else if (rec.status === "occupied") {
    const gnote = rec.general_note ? `<div class="rd" style="margin-top:10px;"><b>Note:</b> ${esc(rec.general_note)}</div>` : "";
    body = `<div style="font-size:.82rem; color:var(--text-faint); margin-bottom:10px;">
        ${formatDate(rec.inspected_at)} by ${esc(rec.inspector_name || "")}</div>
      <div class="status s-occupied" style="display:inline-flex; gap:6px;"><span class="dot occupied"></span>Occupied — could not inspect</div>${gnote}`;
  } else {
    const items = Array.isArray(rec.items) ? rec.items : [];
    const rows = items.map((it) => `
      <div class="rep-item">
        <div class="mark ${it.status === "problem" ? "problem" : "ok"}">${it.status === "problem" ? "!" : "✓"}</div>
        <div>
          <div>${esc(it.label)}</div>
          ${it.status === "problem" && it.detail ? `<div class="rd">${esc(it.detail)}</div>` : ""}
        </div>
      </div>`).join("");
    const gnote = rec.general_note ? `<div class="rd" style="margin-top:14px;"><b>Note:</b> ${esc(rec.general_note)}</div>` : "";
    body = `<div style="font-size:.82rem; color:var(--text-faint); margin-bottom:6px;">
        Inspected ${formatDate(rec.inspected_at)} by ${esc(rec.inspector_name || "")}
      </div>${rows}${gnote}`;
  }
  root.innerHTML = `<div class="modal-bg"><div class="modal">
    <h3>Room ${esc(room.room_number)}</h3>
    <div class="sub">${esc(meta)}</div>
    ${body}
    <div class="save-bar"><button id="close" class="btn-primary" style="flex:1;">Close</button></div>
  </div></div>`;
  const close = () => (root.innerHTML = "");
  root.querySelector("#close").onclick = close;
  root.querySelector(".modal-bg").onclick = (e) => {
    if (e.target.classList.contains("modal-bg")) close();
  };
}

// ---- change password --------------------------------------------------------
$("pw-btn").addEventListener("click", () => {
  root.innerHTML = `<div class="modal-bg"><div class="modal" style="max-width:400px;">
    <h3 style="font-size:1.15rem;">Change password</h3>
    <div style="height:16px;"></div>
    <input id="pw-old" class="input" type="password" placeholder="Current password" style="margin-bottom:10px;">
    <input id="pw-new" class="input" type="password" placeholder="New password (6+ chars)" style="margin-bottom:10px;">
    <input id="pw-new2" class="input" type="password" placeholder="Confirm new password">
    <div class="save-bar"><button id="pw-cancel" class="btn-ghost">Cancel</button><button id="pw-save" class="btn-primary">Change</button></div>
  </div></div>`;
  const close = () => (root.innerHTML = "");
  root.querySelector("#pw-cancel").onclick = close;
  root.querySelector(".modal-bg").onclick = (e) => { if (e.target.classList.contains("modal-bg")) close(); };
  root.querySelector("#pw-save").onclick = async () => {
    const oldP = root.querySelector("#pw-old").value;
    const p1 = root.querySelector("#pw-new").value, p2 = root.querySelector("#pw-new2").value;
    if (p1.length < 6) return showToast("At least 6 characters", "error");
    if (p1 !== p2) return showToast("Passwords do not match", "error");
    try { await changePassword(oldP, p1); close(); showToast("Password changed", "success"); }
    catch (err) { showToast(err.message || "Failed", "error"); }
  };
});

// ---- events -----------------------------------------------------------------
$("login-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  try {
    await login($("username").value, $("password").value);
    $("password").value = "";
    await boot();
  } catch (err) { showToast(`Sign in failed: ${err.message}`, "error"); }
});
$("register-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const name = $("reg-name").value.trim();
  if (!name) return;
  try { await setInspectorName(name); await boot(); }
  catch (err) { showToast(err.message || "Failed", "error"); }
});
$("logout-btn").addEventListener("click", () => { logout(); me = null; show("login"); });
$("pw-hint-x").addEventListener("click", () => {
  localStorage.setItem("lcic-dorm-pw-hint", "1");
  $("pw-hint").classList.add("hidden");
});
$("print-btn").addEventListener("click", () => window.print());
$("refresh-btn").addEventListener("click", async () => {
  const b = $("refresh-btn"); b.disabled = true;
  try { await loadData(); showToast("Updated", "success"); } finally { b.disabled = false; }
});
// auto-refresh: on tab focus / return, and every 60s while idle (skip if a modal is open)
document.addEventListener("visibilitychange", () => { if (!document.hidden && me) loadData(); });
window.addEventListener("focus", () => { if (me) loadData(); });
setInterval(() => { if (me && !root.innerHTML && document.visibilityState === "visible") loadData(); }, 60000);

$("f-search").addEventListener("input", (e) => { filters.q = e.target.value; renderRooms(); });
$("f-building").addEventListener("change", (e) => { filters.building = e.target.value; renderRooms(); });
$("f-gender").addEventListener("change", (e) => { filters.gender = e.target.value; renderRooms(); });
$("f-status").addEventListener("change", (e) => { filters.status = e.target.value; render(); });

function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

boot();
</script>
