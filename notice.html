  <a href="procedure.html"><iconify-icon icon="solar:list-check-bold-duotone" inline></iconify-icon> <span data-i18n-en="Admissions" data-i18n-zh="入學申請" data-i18n-ja="入学案内">입학 절차</span></a>
  <a href="curriculum.html"><iconify-icon icon="solar:notebook-bold-duotone" inline></iconify-icon> <span data-i18n-en="Curriculum" data-i18n-zh="課程介紹" data-i18n-ja="カリキュラム">커리큘럼</span></a>
  <a href="life-guide.html"><iconify-icon icon="solar:book-bookmark-bold-duotone" inline></iconify-icon> <span data-i18n-en="Life Guide" data-i18n-zh="生活指南" data-i18n-ja="生活ガイド">생활백서</span></a>

<header style="padding: 140px 20px 60px; text-align: center;">
  <div class="fade-up">
    <span class="eyebrow"><span class="dot"></span> NOTICE BOARD</span>
  </div>
  <h1 class="headline fade-up delay-1" style="margin-top: 24px;" data-i18n-en="Notices" data-i18n-zh="公告" data-i18n-ja="お知らせ">공지사항</h1>
  <p class="subhead fade-up delay-2" data-i18n-en="Announcements for LCIC students, gathered in one place." data-i18n-zh="LCIC 學生需要知道的訊息,集中在這裡。" data-i18n-ja="LCIC 学生向けのお知らせを、こちらにまとめています。">LCIC 학생을 위한 안내 사항을 한곳에 모았습니다.</p>
</header>

<main class="container-narrow" style="padding-bottom: 120px;">
  <div id="list" class="fade-up delay-3" style="display: flex; flex-direction: column; gap: 14px;">
    <div style="text-align:center; padding: 60px 20px; color: var(--text-faint);">
      <iconify-icon icon="svg-spinners:ring-resize" inline style="font-size: 24px;"></iconify-icon>
    </div>
  </div>
</main>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="close-btn" id="modal-close" aria-label="닫기" data-i18n-en-attr="aria-label|Close" data-i18n-zh-attr="aria-label|關閉" data-i18n-ja-attr="aria-label|閉じる">
      <iconify-icon icon="solar:close-circle-linear"></iconify-icon>
    </button>
    <div id="modal-pin" style="margin-bottom: 12px;"></div>
    <h2 id="modal-title" style="font-size: 1.6rem; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 8px; padding-right: 30px;"></h2>
    <div id="modal-meta" style="color: var(--text-faint); font-size: 0.85rem; margin-bottom: 24px;"></div>
    <div id="modal-body" style="white-space: pre-wrap; color: var(--text); line-height: 1.8; font-size: 0.95rem;"></div>
  </div>
</div>

<script type="module">
import { supabase, formatDate } from "./assets/supabase.js?v=2";

const listEl = document.getElementById("list");
const modal = document.getElementById("modal");
const modalTitle = document.getElementById("modal-title");
const modalMeta = document.getElementById("modal-meta");
const modalBody = document.getElementById("modal-body");
const modalPin = document.getElementById("modal-pin");

document.getElementById("modal-close").onclick = closeModal;
modal.addEventListener("click", (e) => { if (e.target === modal) closeModal(); });
document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeModal(); });

function closeModal() {
  modal.classList.remove("active");
  document.body.style.overflow = "";
}

const lang = () => (window.lcicLang && window.lcicLang.current) || "ko";
const isEn = () => lang() === "en";
const isZh = () => lang() === "zh";
const isJa = () => lang() === "ja";
const t = (ko, en, zh, ja) => {
  const cur = lang();
  if (cur === "ja") return (ja !== undefined && ja !== "") ? ja : ((zh !== undefined && zh !== "") ? zh : (en || ko));
  if (cur === "zh") return (zh !== undefined && zh !== "") ? zh : (en || ko);
  if (cur === "en") return en || ko;
  return ko;
};

// Prefer the active-language column (`<base>_ja`, `<base>_zh`, or `<base>_en`)
// and fall back silently through the other translations to Korean — so admins
// can fill translations into the DB row-by-row without breaking the page.
function pickField(row, base) {
  if (!row) return "";
  const tryKey = (key) => {
    const v = row[key];
    return (v !== undefined && v !== null && String(v).trim() !== "") ? v : null;
  };
  if (isJa()) {
    return tryKey(base + "_ja") || tryKey(base + "_zh") || tryKey(base + "_en") || (row[base] ?? "");
  }
  if (isZh()) {
    return tryKey(base + "_zh") || tryKey(base + "_en") || (row[base] ?? "");
  }
  if (isEn()) {
    return tryKey(base + "_en") || (row[base] ?? "");
  }
  return row[base] ?? "";
}

function openModal(notice) {
  modalTitle.textContent = pickField(notice, "title");
  modalMeta.textContent = formatDate(notice.created_at);
  modalBody.textContent = pickField(notice, "body");
  modalPin.innerHTML = notice.pinned
    ? `<span class="pin-badge"><iconify-icon icon="solar:pin-bold" inline></iconify-icon> ${t("고정 공지", "Pinned notice", "置頂公告", "固定のお知らせ")}</span>`
    : "";
  modal.classList.add("active");
  document.body.style.overflow = "hidden";
}

function emptyState(msg, icon = "solar:inbox-bold-duotone") {
  return `<div style="text-align:center; padding: 80px 20px; color: var(--text-faint);">
    <iconify-icon icon="${icon}" style="font-size: 48px; opacity: 0.5;"></iconify-icon>
    <div style="margin-top: 16px;">${msg}</div>
  </div>`;
}

let cachedNotices = null;

async function loadNotices() {
  const { data, error } = await supabase
    .from("notices")
    .select("*")
    .order("pinned", { ascending: false })
    .order("created_at", { ascending: false });

  if (error) {
    listEl.innerHTML = emptyState(t(`불러오기 실패: ${error.message}`, `Failed to load: ${error.message}`, `載入失敗:${error.message}`, `読み込みに失敗しました:${error.message}`), "solar:danger-triangle-bold-duotone");
    return;
  }
  if (!data || data.length === 0) {
    listEl.innerHTML = emptyState(t("아직 등록된 공지가 없습니다.", "No notices have been posted yet.", "目前還沒有任何公告。", "まだ登録されているお知らせはありません。"));
    return;
  }

  cachedNotices = data;
  renderNotices();
}

function renderNotices() {
  if (!cachedNotices) return;
  listEl.innerHTML = "";
  const pinnedLabel = t("고정", "Pinned", "置頂", "固定");
  cachedNotices.forEach((n, i) => {
    const card = document.createElement("article");
    card.className = "bezel fade-up";
    card.style.animationDelay = `${0.04 * i}s`;
    card.style.cursor = "pointer";

    const inner = document.createElement("div");
    inner.className = "bezel-inner";
    inner.innerHTML = `
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px;">
        <div style="display:flex; gap:8px; align-items:center;">
          ${n.pinned ? `<span class="pin-badge"><iconify-icon icon="solar:pin-bold" inline></iconify-icon> ${pinnedLabel}</span>` : ''}
          <span style="color: var(--text-faint); font-size: 0.78rem; letter-spacing: 0.05em;">${formatDate(n.created_at)}</span>
        </div>
        <iconify-icon icon="solar:arrow-right-linear" style="color: var(--text-faint); font-size: 18px;"></iconify-icon>
      </div>
      <h3 style="font-size: 1.05rem; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 8px;"></h3>
      <p style="color: var(--text-dim); font-size: 0.9rem; line-height: 1.6;
                display:-webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;"></p>
    `;
    inner.querySelector("h3").textContent = pickField(n, "title");
    inner.querySelector("p").textContent = pickField(n, "body");
    card.appendChild(inner);
    card.onclick = () => openModal(n);
    listEl.appendChild(card);
  });
}

document.addEventListener("lcic:langchange", () => {
  if (cachedNotices) renderNotices();
});

loadNotices();
</script>
<script src="assets/back-to-top.js?v=1"></script>
</body>
</html>
